topic: "Pronominaladverbien"
level: "B1"
questions:
  - type: "multiple_choice"
    question: "Qual pergunta combina com a resposta: Ich freue mich auf den Kurs?"
    options:
      - "Worauf freust du dich?"
      - "Woran freust du dich?"
      - "Womit freust du dich?"
    answer: "Worauf freust du dich?"
  - type: "multiple_choice"
    question: "Qual frase retoma corretamente eine Lösung?"
    options:
      - "Wir suchen damit."
      - "Wir suchen danach."
      - "Wir suchen dafür."
    answer: "Wir suchen danach."
  - type: "multiple_choice"
    question: "Qual opção está correta para uma pessoa?"
    options:
      - "Ich spreche damit."
      - "Ich spreche daran."
      - "Ich spreche mit ihr."
    answer: "Ich spreche mit ihr."
  - type: "multiple_choice"
    question: "Qual pergunta usa mit corretamente?"
    options:
      - "Womit fährst du ins Büro?"
      - "Woran fährst du ins Büro?"
      - "Wofür fährst du ins Büro?"
    answer: "Womit fährst du ins Büro?"
  - type: "multiple_choice"
    question: "Qual resposta corresponde a Wofür ist diese Quittung?"
    options:
      - "Sie ist daran."
      - "Sie ist dafür."
      - "Sie ist damit."
    answer: "Sie ist dafür."
  - type: "multiple_choice"
    question: "Qual frase tem o r de ligação necessário?"
    options:
      - "Ich denke dan."
      - "Ich denke damit."
      - "Ich denke daran."
    answer: "Ich denke daran."
  - type: "fill_blank"
    question: "Ich erinnere mich an den Film. Ich erinnere mich ___."
    answer: "daran"
  - type: "fill_blank"
    question: "Timo lernt mit einem Wörterbuch. Er lernt ___."
    answer: "damit"
  - type: "fill_blank"
    question: "Wir diskutieren über den Plan. Wir diskutieren ___."
    answer: "darüber"
  - type: "fill_blank"
    question: "Klara kämpft für bessere Arbeitszeiten. Sie kämpft ___."
    answer: "dafür"
  - type: "transformation"
    question: "Reescreva com um da-compound: Ich warte auf die Entscheidung."
    answer: "Ich warte darauf."
  - type: "transformation"
    question: "Reescreva com uma pergunta wo-compound: Du arbeitest mit welchem Gerät?"
    answer: "Womit arbeitest du?"
  - type: "correction"
    question: "Corrija: Ich denke an meinen Bruder. Ich denke daran."
    answer: "Ich denke an meinen Bruder. Ich denke an ihn."
  - type: "correction"
    question: "Corrija: Womit interessierst du dich?"
    answer: "Wofür interessierst du dich?"
  - type: "translation"
    question: "Traduza: Eu sou a favor disso."
    answer: "Ich bin dafür."
  - type: "translation"
    question: "Traduza: No que você está trabalhando?"
    answer: "Woran arbeitest du?"
