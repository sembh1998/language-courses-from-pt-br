topic: Orações relativas no nominativo
level: B1
cards:
  - front: der Mann, der...
    back: o homem que...
    example: Der Mann, der dort steht, ist mein Chef.
    example_translation: O homem que está ali é meu chefe.
  - front: die Frau, die...
    back: a mulher que...
    example: Die Frau, die lacht, ist meine Tante.
    example_translation: A mulher que ri é minha tia.
  - front: das Kind, das...
    back: a criança que...
    example: Das Kind, das singt, ist sechs Jahre alt.
    example_translation: A criança que canta tem seis anos.
  - front: die Menschen, die...
    back: as pessoas que...
    example: Die Menschen, die hier arbeiten, sind freundlich.
    example_translation: As pessoas que trabalham aqui são simpáticas.
  - front: der Kollege, der...
    back: o colega que...
    example: Der Kollege, der mich anruft, ist neu im Team.
    example_translation: O colega que me liga é novo na equipe.
  - front: die Wohnung, die...
    back: o apartamento que...
    example: Die Wohnung, die frei ist, liegt zentral.
    example_translation: O apartamento que está livre fica no centro.
  - front: das Auto, das...
    back: o carro que...
    example: Das Auto, das vor dem Haus steht, gehört Anna.
    example_translation: O carro que está na frente da casa pertence à Anna.
  - front: die Kurse, die...
    back: os cursos que...
    example: Die Kurse, die am Abend beginnen, sind voll.
    example_translation: Os cursos que começam à noite estão lotados.
  - front: Relativsatz im Nominativ
    back: oração relativa em que o pronome relativo é sujeito
    example: Ich mag den Lehrer, der gut erklärt.
    example_translation: Eu gosto do professor que explica bem.
  - front: Verb am Ende
    back: verbo conjugado no fim da oração relativa
    example: Die Frau, die in Hamburg wohnt, besucht uns.
    example_translation: A mulher que mora em Hamburgo nos visita.
