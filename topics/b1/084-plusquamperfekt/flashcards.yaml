topic: Plusquamperfekt
level: B1
cards:
  - front: "hatte gemacht"
    back: "tinha feito"
    example: "Ich hatte die Arbeit gemacht."
    example_translation: "Eu tinha feito o trabalho."
  - front: "war gegangen"
    back: "tinha ido; tinha ido embora"
    example: "Lena war schon gegangen."
    example_translation: "Lena já tinha ido embora."
  - front: "nachdem"
    back: "depois que; introduz uma ação anterior"
    example: "Nachdem ich gelernt hatte, machte ich eine Pause."
    example_translation: "Depois que eu tinha estudado, fiz uma pausa."
  - front: "schon"
    back: "já"
    example: "Der Film hatte schon begonnen."
    example_translation: "O filme já tinha começado."
  - front: "war angekommen"
    back: "tinha chegado"
    example: "Der Gast war früh angekommen."
    example_translation: "O convidado tinha chegado cedo."
  - front: "hatte gesehen"
    back: "tinha visto"
    example: "Ich hatte den Fehler gesehen."
    example_translation: "Eu tinha visto o erro."
  - front: "hatte vergessen"
    back: "tinha esquecido"
    example: "Sie hatte den Schlüssel vergessen."
    example_translation: "Ela tinha esquecido a chave."
  - front: "war abgefahren"
    back: "tinha partido; tinha saído"
    example: "Der Zug war schon abgefahren."
    example_translation: "O trem já tinha partido."
  - front: "hatte reserviert"
    back: "tinha reservado"
    example: "Wir hatten ein Zimmer reserviert."
    example_translation: "Nós tínhamos reservado um quarto."
  - front: "bevor"
    back: "antes que; antes de"
    example: "Ich hatte bezahlt, bevor wir gingen."
    example_translation: "Eu tinha pago antes de irmos embora."
