topic: "Konjunktiv II: Cortesia"
level: B1
cards:
  - front: "Ich hätte gern ..."
    back: "Eu gostaria de ..."
    example: "Ich hätte gern einen Kaffee."
    example_translation: "Eu gostaria de um café."
  - front: "Könnten Sie ...?"
    back: "O(a) senhor(a) poderia ...?"
    example: "Könnten Sie das bitte wiederholen?"
    example_translation: "O(a) senhor(a) poderia repetir isso, por favor?"
  - front: "Könntest du ...?"
    back: "Você poderia ...?"
    example: "Könntest du mir kurz helfen?"
    example_translation: "Você poderia me ajudar rapidinho?"
  - front: "Würden Sie bitte ...?"
    back: "O(a) senhor(a) faria o favor de ...?"
    example: "Würden Sie bitte hier warten?"
    example_translation: "O(a) senhor(a) faria o favor de esperar aqui?"
  - front: "ich würde gern"
    back: "eu gostaria de"
    example: "Ich würde gern Deutsch üben."
    example_translation: "Eu gostaria de praticar alemão."
  - front: "ich hätte"
    back: "eu teria; eu gostaria de ter"
    example: "Ich hätte gern ein Zimmer."
    example_translation: "Eu gostaria de um quarto."
  - front: "ich wäre"
    back: "eu seria; eu estaria"
    example: "Ich wäre um acht Uhr da."
    example_translation: "Eu estaria lá às oito horas."
  - front: "ich könnte"
    back: "eu poderia"
    example: "Ich könnte am Freitag kommen."
    example_translation: "Eu poderia vir na sexta-feira."
  - front: "Das wäre sehr nett."
    back: "Isso seria muito gentil."
    example: "Könnten Sie mir helfen? Das wäre sehr nett."
    example_translation: "O(a) senhor(a) poderia me ajudar? Isso seria muito gentil."
  - front: "Hätten Sie vielleicht eine Minute Zeit?"
    back: "O(a) senhor(a) teria talvez um minuto?"
    example: "Hätten Sie vielleicht eine Minute Zeit für meine Frage?"
    example_translation: "O(a) senhor(a) teria talvez um minuto para a minha pergunta?"
  - front: "Wäre es möglich, ...?"
    back: "Seria possível ...?"
    example: "Wäre es möglich, den Termin zu verschieben?"
    example_translation: "Seria possível adiar o horário?"
  - front: "Ich wäre Ihnen dankbar."
    back: "Eu ficaria agradecido(a) ao(à) senhor(a)."
    example: "Ich wäre Ihnen für eine Antwort dankbar."
    example_translation: "Eu ficaria agradecido(a) por uma resposta."
