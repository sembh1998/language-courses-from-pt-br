topic: Infinitivo com zu
level: B1
cards:
  - front: "Ich versuche, Deutsch zu lernen."
    back: "Eu tento aprender alemão."
    example: "Ich versuche, jeden Abend Deutsch zu lernen."
    example_translation: "Eu tento aprender alemão toda noite."
  - front: "Es ist wichtig, früh aufzustehen."
    back: "É importante levantar cedo."
    example: "Für die Prüfung ist es wichtig, früh aufzustehen."
    example_translation: "Para a prova, é importante levantar cedo."
  - front: "Zeit haben, etwas zu tun"
    back: "ter tempo para fazer algo"
    example: "Ich habe Zeit, dir zu helfen."
    example_translation: "Eu tenho tempo para ajudar você."
  - front: "Lust haben, etwas zu tun"
    back: "estar com vontade de fazer algo"
    example: "Sie hat Lust, spazieren zu gehen."
    example_translation: "Ela está com vontade de passear."
  - front: "planen, etwas zu tun"
    back: "planejar fazer algo"
    example: "Wir planen, nächste Woche umzuziehen."
    example_translation: "Nós planejamos nos mudar na próxima semana."
  - front: "vergessen, etwas zu tun"
    back: "esquecer de fazer algo"
    example: "Er vergisst, das Licht auszumachen."
    example_translation: "Ele esquece de apagar a luz."
  - front: "aufstehen → aufzustehen"
    back: "levantar-se → levantar-se com zu"
    example: "Es ist schwer, am Montag aufzustehen."
    example_translation: "É difícil levantar na segunda-feira."
  - front: "einkaufen → einzukaufen"
    back: "fazer compras → fazer compras com zu"
    example: "Ich habe vor, nach der Arbeit einzukaufen."
    example_translation: "Eu pretendo fazer compras depois do trabalho."
  - front: "mitkommen → mitzukommen"
    back: "ir junto → ir junto com zu"
    example: "Hast du Lust, mitzukommen?"
    example_translation: "Você está com vontade de ir junto?"
  - front: "müssen + infinitivo sem zu"
    back: "müssen usa infinitivo sem zu"
    example: "Ich muss heute lernen."
    example_translation: "Eu preciso estudar hoje."
