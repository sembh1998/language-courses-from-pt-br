topic: Infinitivo com zu
level: B1
exercises:
  - type: "fill_blank"
    instruction: "Complete com zu ou com a forma correta com zu."
    items:
      - question: "Ich versuche, ruhig ___ bleiben."
        answer: "zu"
      - question: "Es ist schön, dich wieder ___ sehen."
        answer: "zu"
      - question: "Wir haben keine Zeit, lange ___ warten."
        answer: "zu"
      - question: "Ich plane, morgen früh ___ (aufstehen)."
        answer: "aufzustehen"
      - question: "Sie hat vor, nach der Arbeit ___ (einkaufen)."
        answer: "einzukaufen"
      - question: "Hast du Lust, am Samstag ___ (mitkommen)?"
        answer: "mitzukommen"
  - type: "multiple_choice"
    instruction: "Escolha a frase correta."
    items:
      - question: "Qual frase expressa corretamente: 'Eu tento dormir cedo'?"
        options:
          - "Ich versuche, früh zu schlafen."
          - "Ich versuche, zu früh schlafen."
          - "Ich versuche früh schlafen zu."
        answer: "Ich versuche, früh zu schlafen."
      - question: "Qual frase está correta com um verbo separável?"
        options:
          - "Es ist schwer, zu aufstehen."
          - "Es ist schwer, aufzustehen."
          - "Es ist schwer, auf zu stehen."
        answer: "Es ist schwer, aufzustehen."
      - question: "Qual frase usa corretamente um verbo modal?"
        options:
          - "Ich muss heute zu arbeiten."
          - "Ich muss, heute zu arbeiten."
          - "Ich muss heute arbeiten."
        answer: "Ich muss heute arbeiten."
      - question: "Qual frase está correta para 'É importante beber água'?"
        options:
          - "Es ist wichtig, Wasser zu trinken."
          - "Es ist wichtig, zu Wasser trinken."
          - "Es ist wichtig Wasser trinken zu."
        answer: "Es ist wichtig, Wasser zu trinken."
      - question: "Qual frase está correta?"
        options:
          - "Ich habe keine Zeit, zu heute kochen."
          - "Ich habe keine Zeit, heute zu kochen."
          - "Ich habe keine Zeit heute kochen zu."
        answer: "Ich habe keine Zeit, heute zu kochen."
      - question: "Qual frase mostra corretamente 'esquecer de trancar'?"
        options:
          - "Er vergisst, zu die Tür abschließen."
          - "Er vergisst, die Tür zu abschließen."
          - "Er vergisst, die Tür abzuschließen."
        answer: "Er vergisst, die Tür abzuschließen."
  - type: "transformation"
    instruction: "Reescreva combinando as duas ideias com infinitivo com zu."
    items:
      - question: "Ich lerne kochen. Ich versuche es."
        answer: "Ich versuche, kochen zu lernen."
      - question: "Du kommst pünktlich. Das ist wichtig."
        answer: "Es ist wichtig, pünktlich zu kommen."
      - question: "Wir fahren früher los. Wir planen das."
        answer: "Wir planen, früher loszufahren."
      - question: "Mara ruft ihre Mutter an. Sie vergisst es nicht."
        answer: "Mara vergisst nicht, ihre Mutter anzurufen."
      - question: "Ich helfe dir. Ich habe Zeit."
        answer: "Ich habe Zeit, dir zu helfen."
  - type: "correction"
    instruction: "Corrija a posição de zu nas frases."
    items:
      - question: "Ich versuche, zu Deutsch lernen."
        answer: "Ich versuche, Deutsch zu lernen."
      - question: "Es ist gesund, zu viel schlafen."
        answer: "Es ist gesund, viel zu schlafen."
      - question: "Sie hat Lust, zu mitkommen."
        answer: "Sie hat Lust, mitzukommen."
      - question: "Wir haben vor, morgen zu einkaufen."
        answer: "Wir haben vor, morgen einzukaufen."
      - question: "Ich muss, zu Hause bleiben."
        answer: "Ich muss zu Hause bleiben."
  - type: "translation"
    instruction: "Traduza para o alemão usando infinitivo com zu quando necessário."
    items:
      - question: "Eu tento chegar no horário."
        answer: "Ich versuche, pünktlich anzukommen."
      - question: "É difícil trabalhar sem pausa."
        answer: "Es ist schwer, ohne Pause zu arbeiten."
      - question: "Nós temos vontade de assistir a um filme."
        answer: "Wir haben Lust, einen Film zu sehen."
      - question: "Ela pretende levantar mais cedo."
        answer: "Sie hat vor, früher aufzustehen."
      - question: "Você tem tempo para me ajudar?"
        answer: "Hast du Zeit, mir zu helfen?"
  - type: "short_answer"
    instruction: "Responda em alemão com uma frase curta usando infinitivo com zu."
    items:
      - question: "Was versuchst du diese Woche zu lernen?"
        answer: "Ich versuche, mehr Deutsch zu lernen."
      - question: "Was ist für deine Gesundheit wichtig?"
        answer: "Es ist wichtig, genug zu schlafen."
      - question: "Wozu hast du am Wochenende Lust?"
        answer: "Ich habe Lust, Freunde zu treffen."
      - question: "Was hast du morgen vor?"
        answer: "Ich habe vor, früh aufzustehen."
