topic: Um...zu
level: B1
cards:
  - front: um ... zu
    back: para + infinitivo; usado para finalidade com o mesmo sujeito
    example: Ich lerne Deutsch, um in Deutschland zu arbeiten.
    example_translation: Eu estudo alemão para trabalhar na Alemanha.
  - front: zu arbeiten
    back: trabalhar; forma com zu
    example: Er macht eine Ausbildung, um später als Mechaniker zu arbeiten.
    example_translation: Ele faz uma formação profissional para trabalhar depois como mecânico.
  - front: zu sein
    back: ser ou estar; forma com zu
    example: Sie schläft früh, um morgen fit zu sein.
    example_translation: Ela dorme cedo para estar bem amanhã.
  - front: die Prüfung zu bestehen
    back: passar na prova
    example: Max lernt jeden Abend, um die Prüfung zu bestehen.
    example_translation: Max estuda todas as noites para passar na prova.
  - front: sich zu bewerben
    back: candidatar-se
    example: Lara schreibt einen Lebenslauf, um sich zu bewerben.
    example_translation: Lara escreve um currículo para se candidatar.
  - front: anzurufen
    back: ligar; forma com zu de um verbo separável
    example: Ich nehme mein Handy, um meinen Bruder anzurufen.
    example_translation: Eu pego meu celular para ligar para meu irmão.
  - front: einzukaufen
    back: fazer compras; forma com zu de um verbo separável
    example: Wir fahren zum Markt, um einzukaufen.
    example_translation: Nós vamos ao mercado para fazer compras.
  - front: aufzustehen
    back: levantar-se; forma com zu de um verbo separável
    example: Ben stellt den Wecker, um früh aufzustehen.
    example_translation: Ben ajusta o despertador para levantar cedo.
  - front: damit
    back: para que; usado frequentemente quando há sujeitos diferentes
    example: Ich erkläre die Regel, damit du sie verstehst.
    example_translation: Eu explico a regra para que você a entenda.
  - front: um pünktlich zu sein
    back: para ser pontual
    example: Nina nimmt den früheren Zug, um pünktlich zu sein.
    example_translation: Nina pega o trem mais cedo para ser pontual.
