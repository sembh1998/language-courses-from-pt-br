topic: Prefixos e sufixos comuns
level: B1
cards:
  - front: "-ung"
    back: "sufixo que geralmente forma substantivos femininos de ação ou resultado"
    example: "Die Einladung kommt per E-Mail."
    example_translation: "O convite chega por e-mail."
  - front: "-heit"
    back: "sufixo que geralmente forma substantivos femininos de qualidade ou estado"
    example: "Freiheit ist ein wichtiges Thema."
    example_translation: "Liberdade é um tema importante."
  - front: "-keit"
    back: "sufixo que geralmente forma substantivos femininos de qualidade ou possibilidade"
    example: "Es gibt eine gute Möglichkeit."
    example_translation: "Há uma boa possibilidade."
  - front: "-schaft"
    back: "sufixo que geralmente forma substantivos femininos de relação, grupo ou estado"
    example: "Ihre Freundschaft ist sehr stark."
    example_translation: "A amizade deles é muito forte."
  - front: "-bar"
    back: "sufixo de adjetivo com ideia de possível de ser feito"
    example: "Der Text ist lesbar."
    example_translation: "O texto é legível."
  - front: "-los"
    back: "sufixo de adjetivo com ideia de sem algo"
    example: "Er war lange arbeitslos."
    example_translation: "Ele ficou desempregado por muito tempo."
  - front: "-voll"
    back: "sufixo de adjetivo com ideia de cheio de algo"
    example: "Sie ist hoffnungsvoll."
    example_translation: "Ela está esperançosa."
  - front: "be-"
    back: "prefixo comum em verbos, muitas vezes ligado a agir sobre um objeto"
    example: "Wir beantworten die Nachricht."
    example_translation: "Nós respondemos à mensagem."
  - front: "ver-"
    back: "prefixo comum em verbos, frequentemente ligado a mudança, resultado ou erro"
    example: "Die Stadt verändert sich schnell."
    example_translation: "A cidade muda rapidamente."
  - front: "ent-"
    back: "prefixo comum em verbos, muitas vezes ligado a remover ou descobrir"
    example: "Die Forscher entdecken eine Lösung."
    example_translation: "Os pesquisadores descobrem uma solução."
  - front: "hoffnungslos"
    back: "sem esperança"
    example: "Die Situation ist schwierig, aber nicht hoffnungslos."
    example_translation: "A situação é difícil, mas não sem esperança."
  - front: "hoffnungsvoll"
    back: "esperançoso"
    example: "Nach dem Gespräch war er hoffnungsvoll."
    example_translation: "Depois da conversa, ele estava esperançoso."
