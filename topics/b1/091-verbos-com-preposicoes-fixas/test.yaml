topic: "Verbos com preposições fixas"
level: "B1"
questions:
  - type: "multiple_choice"
    question: "Qual opção está correta?"
    options:
      - "Nina wartet auf den Handwerker."
      - "Nina wartet über den Handwerker."
      - "Nina wartet von dem Handwerker."
    answer: "Nina wartet auf den Handwerker."
  - type: "multiple_choice"
    question: "Qual frase usa träumen corretamente?"
    options:
      - "Ben träumt auf einem Motorrad."
      - "Ben träumt von einem Motorrad."
      - "Ben träumt an ein Motorrad."
    answer: "Ben träumt von einem Motorrad."
  - type: "multiple_choice"
    question: "Qual pergunta combina com sprechen über?"
    options:
      - "Woran sprecht ihr?"
      - "Wovon sprecht ihr?"
      - "Worüber sprecht ihr?"
    answer: "Worüber sprecht ihr?"
  - type: "multiple_choice"
    question: "Qual frase mostra alegria por algo futuro?"
    options:
      - "Ich freue mich auf den Deutschkurs nächste Woche."
      - "Ich freue mich von den Deutschkurs nächste Woche."
      - "Ich freue mich an den Deutschkurs nächste Woche."
    answer: "Ich freue mich auf den Deutschkurs nächste Woche."
  - type: "multiple_choice"
    question: "Qual opção usa denken an corretamente?"
    options:
      - "Ich denke über meinen Bruder."
      - "Ich denke an meinen Bruder."
      - "Ich denke von meinem Bruder."
    answer: "Ich denke an meinen Bruder."
  - type: "multiple_choice"
    question: "Qual frase usa sich freuen über corretamente?"
    options:
      - "Sara freut sich auf die Hilfe, die sie gestern bekommen hat."
      - "Sara freut über die Hilfe, die sie gestern bekommen hat."
      - "Sara freut sich über die Hilfe, die sie gestern bekommen hat."
    answer: "Sara freut sich über die Hilfe, die sie gestern bekommen hat."
  - type: "fill_blank"
    question: "Markus spricht ___ seine Erfahrungen in Berlin."
    answer: "über"
  - type: "fill_blank"
    question: "Ich freue mich ___ deinen Anruf. Danke!"
    answer: "über"
  - type: "fill_blank"
    question: "Die Kinder freuen sich ___ die Sommerferien."
    answer: "auf"
  - type: "fill_blank"
    question: "Bitte denk ___ die Tickets."
    answer: "an"
  - type: "case_choice"
    question: "Complete: Frau Klein wartet auf ___ Taxi."
    answer: "das"
  - type: "case_choice"
    question: "Complete: Omar träumt von ___ besseren Zukunft."
    answer: "einer"
  - type: "correction"
    question: "Corrija: Lisa freut sich von die Blumen."
    answer: "Lisa freut sich über die Blumen."
  - type: "translation"
    question: "Traduza: Nós estamos falando sobre a reunião."
    answer: "Wir sprechen über das Meeting."
