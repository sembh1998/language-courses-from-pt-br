topic: "Verbos com preposições fixas"
level: "B1"
cards:
  - front: "warten auf + Akkusativ"
    back: "esperar por"
    example: "Wir warten auf den Zug."
    example_translation: "Nós esperamos pelo trem."
  - front: "träumen von + Dativ"
    back: "sonhar com"
    example: "Lena träumt von einem eigenen Café."
    example_translation: "Lena sonha com um café próprio."
  - front: "denken an + Akkusativ"
    back: "pensar em"
    example: "Denk bitte an den Schlüssel."
    example_translation: "Pense, por favor, na chave."
  - front: "sprechen über + Akkusativ"
    back: "falar sobre"
    example: "Wir sprechen über die Prüfung."
    example_translation: "Nós falamos sobre a prova."
  - front: "sich freuen auf + Akkusativ"
    back: "ficar animado por algo futuro"
    example: "Ich freue mich auf meinen Urlaub."
    example_translation: "Estou animado pelas minhas férias."
  - front: "sich freuen über + Akkusativ"
    back: "ficar feliz com algo presente ou passado"
    example: "Er freut sich über das Lob."
    example_translation: "Ele fica feliz com o elogio."
  - front: "Worauf wartest du?"
    back: "Pelo que você está esperando?"
    example: "Ich warte auf eine Antwort."
    example_translation: "Eu espero por uma resposta."
  - front: "Wovon träumst du?"
    back: "Com o que você sonha?"
    example: "Ich träume von einem ruhigen Leben."
    example_translation: "Eu sonho com uma vida tranquila."
  - front: "Woran denkst du?"
    back: "Em que você está pensando?"
    example: "Ich denke an unser Gespräch."
    example_translation: "Eu penso na nossa conversa."
  - front: "Worüber sprecht ihr?"
    back: "Sobre o que vocês estão falando?"
    example: "Wir sprechen über neue Projekte."
    example_translation: "Nós falamos sobre novos projetos."
