topic: Verbos com mudança de vogal
level: A1
cards:
  - front: geben → du gibst
    back: dar → você dá
    example: Du gibst mir Wasser.
    example_translation: Você me dá água.
  - front: geben → er gibt
    back: dar → ele dá
    example: Er gibt Anna ein Buch.
    example_translation: Ele dá um livro para Anna.
  - front: nehmen → du nimmst
    back: pegar; tomar → você pega; toma
    example: Du nimmst den Zug.
    example_translation: Você pega o trem.
  - front: nehmen → sie nimmt
    back: pegar; tomar → ela pega; toma
    example: Sie nimmt Kaffee.
    example_translation: Ela toma café.
  - front: sprechen → du sprichst
    back: falar → você fala
    example: Du sprichst sehr gut.
    example_translation: Você fala muito bem.
  - front: essen → er isst
    back: comer → ele come
    example: Er isst einen Apfel.
    example_translation: Ele come uma maçã.
  - front: lesen → du liest
    back: ler → você lê
    example: Du liest eine E-Mail.
    example_translation: Você lê um e-mail.
  - front: sehen → sie sieht
    back: ver → ela vê
    example: Sie sieht den Lehrer.
    example_translation: Ela vê o professor.
  - front: fahren → du fährst
    back: ir de veículo; dirigir → você vai; dirige
    example: Du fährst nach Berlin.
    example_translation: Você vai para Berlim.
  - front: fahren → er fährt
    back: ir de veículo; dirigir → ele vai; dirige
    example: Er fährt mit dem Auto.
    example_translation: Ele vai de carro.
  - front: schlafen → es schläft
    back: dormir → ele/ela dorme
    example: Das Baby schläft.
    example_translation: O bebê dorme.
  - front: tragen → sie trägt
    back: carregar; vestir → ela carrega; veste
    example: Sie trägt eine Jacke.
    example_translation: Ela veste uma jaqueta.
