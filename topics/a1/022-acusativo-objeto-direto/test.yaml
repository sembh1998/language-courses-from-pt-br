topic: "Acusativo: objeto direto"
level: "A1"
questions:
  - type: "fill_blank"
    question: "Nina sieht ___ Vater."
    answer: "den"
  - type: "fill_blank"
    question: "Paul kauft ___ Tisch."
    answer: "den"
  - type: "fill_blank"
    question: "Ich brauche ___ Heft."
    answer: "ein"
  - type: "multiple_choice"
    question: "Qual opção completa corretamente: Eva hat ___ Bruder."
    options:
      - "ein"
      - "einen"
      - "eine"
    answer: "einen"
  - type: "translation"
    question: "Traduza: Nós vemos o ônibus."
    answer: "Wir sehen den Bus."
  - type: "correction"
    question: "Corrija: Max liest der Brief."
    answer: "Max liest den Brief."
  - type: "multiple_choice"
    question: "Qual frase está correta para um substantivo feminino?"
    options:
      - "Ich esse einen Banane."
      - "Ich esse den Banane."
      - "Ich esse eine Banane."
    answer: "Ich esse eine Banane."
  - type: "fill_blank"
    question: "Sara macht ___ Foto."
    answer: "das"
  - type: "classification"
    question: "Em 'Leo trinkt einen Tee', o termo 'einen Tee' é..."
    answer: "objeto direto"
  - type: "translation"
    question: "Traduza: Ela tem uma caneta."
    answer: "Sie hat einen Stift."
  - type: "sentence_transformation"
    question: "Transforme para o acusativo: ein Computer"
    answer: "einen Computer"
  - type: "multiple_choice"
    question: "Qual regra básica está correta?"
    options:
      - "No acusativo, die sempre vira den."
      - "No acusativo, das sempre vira der."
      - "No masculino singular, der vira den."
    answer: "No masculino singular, der vira den."
  - type: "fill_blank"
    question: "Wir hören ___ Musik."
    answer: "die"
  - type: "correction"
    question: "Corrija: Julia nimmt ein Regenschirm."
    answer: "Julia nimmt einen Regenschirm."
  - type: "multiple_choice"
    question: "Qual frase usa corretamente o plural no acusativo?"
    options:
      - "Karl findet die Schlüssel."
      - "Karl findet den Schlüssel."
      - "Karl findet der Schlüssel."
    answer: "Karl findet die Schlüssel."
  - type: "fill_blank"
    question: "Ich esse ___ Salat."
    answer: "den"
