topic: "Presente dos verbos regulares"
level: "A1"
cards:
  - front: "ich lerne"
    back: "eu estudo / eu aprendo"
    example: "Ich lerne Deutsch."
    example_translation: "Eu estudo alemão."
  - front: "du lernst"
    back: "você estuda / você aprende"
    example: "Du lernst schnell."
    example_translation: "Você aprende rápido."
  - front: "er lernt"
    back: "ele estuda / ele aprende"
    example: "Er lernt heute."
    example_translation: "Ele estuda hoje."
  - front: "wir lernen"
    back: "nós estudamos / nós aprendemos"
    example: "Wir lernen zusammen."
    example_translation: "Nós estudamos juntos."
  - front: "ihr lernt"
    back: "vocês estudam / vocês aprendem"
    example: "Ihr lernt viel."
    example_translation: "Vocês estudam muito."
  - front: "sie lernen"
    back: "eles/elas estudam / aprendem"
    example: "Sie lernen Deutsch."
    example_translation: "Eles/elas estudam alemão."
  - front: "ich mache"
    back: "eu faço"
    example: "Ich mache eine Übung."
    example_translation: "Eu faço um exercício."
  - front: "du wohnst"
    back: "você mora"
    example: "Du wohnst in Berlin."
    example_translation: "Você mora em Berlim."
  - front: "er spielt"
    back: "ele joga / ele toca"
    example: "Er spielt Fußball."
    example_translation: "Ele joga futebol."
  - front: "Sie wohnen"
    back: "o(a) senhor(a) mora; os(as) senhores(as) moram"
    example: "Sie wohnen in Hamburg."
    example_translation: "O(a) senhor(a) mora em Hamburgo."
