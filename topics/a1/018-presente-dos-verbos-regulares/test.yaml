topic: "Presente dos verbos regulares"
level: "A1"
questions:
  - type: "multiple_choice"
    question: "Qual forma completa a frase: Ich ___ gern Musik?"
    options:
      - "mache"
      - "machst"
      - "macht"
    answer: "mache"
  - type: "fill_blank"
    question: "Complete: Du ___ jeden Tag. (lernen)"
    answer: "lernst"
  - type: "short_answer"
    question: "Qual é a terminação de verbos regulares com wir?"
    answer: "-en"
  - type: "multiple_choice"
    question: "Escolha a forma correta para Maria + wohnen."
    options:
      - "wohne"
      - "wohnt"
      - "wohnst"
    answer: "wohnt"
  - type: "translation"
    question: "Traduza: Nós jogamos tênis."
    answer: "Wir spielen Tennis."
  - type: "fill_blank"
    question: "Complete: Ihr ___ eine Frage. (machen)"
    answer: "macht"
  - type: "multiple_choice"
    question: "Qual frase está correta?"
    options:
      - "Du spiele Gitarre."
      - "Du spielt Gitarre."
      - "Du spielst Gitarre."
    answer: "Du spielst Gitarre."
  - type: "short_answer"
    question: "Conjugue spielen com sie plural."
    answer: "sie spielen"
  - type: "translation"
    question: "Traduza: O senhor mora aqui?"
    answer: "Wohnen Sie hier?"
  - type: "multiple_choice"
    question: "Escolha a forma correta para ihr + wohnen."
    options:
      - "wohnt"
      - "wohnen"
      - "wohnst"
    answer: "wohnt"
  - type: "fill_blank"
    question: "Complete: Paul ___ gern Fußball. (spielen)"
    answer: "spielt"
  - type: "short_answer"
    question: "Qual é o radical de machen?"
    answer: "mach-"
  - type: "multiple_choice"
    question: "Qual forma combina com Sie formal?"
    options:
      - "lernst"
      - "lernen"
      - "lernt"
    answer: "lernen"
  - type: "multiple_choice"
    question: "Qual frase usa a terminação correta para ich?"
    options:
      - "Ich wohnst in Bonn."
      - "Ich wohnt in Bonn."
      - "Ich wohne in Bonn."
    answer: "Ich wohne in Bonn."
