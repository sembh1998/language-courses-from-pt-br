topic: "Presente dos verbos regulares"
level: "A1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com a forma correta do verbo entre parênteses."
    items:
      - question: "Ich ___ Deutsch. (lernen)"
        answer: "lerne"
      - question: "Du ___ in Köln. (wohnen)"
        answer: "wohnst"
      - question: "Anna ___ Tennis. (spielen)"
        answer: "spielt"
      - question: "Wir ___ eine Pause. (machen)"
        answer: "machen"
      - question: "Ihr ___ Musik. (machen)"
        answer: "macht"
      - question: "Sie ___ in München. (wohnen)"
        answer: "wohnen"

  - type: "multiple_choice"
    instruction: "Escolha a forma verbal correta."
    items:
      - question: "ich + spielen"
        options:
          - "spiele"
          - "spielst"
          - "spielt"
        answer: "spiele"
      - question: "du + machen"
        options:
          - "mache"
          - "machst"
          - "macht"
        answer: "machst"
      - question: "wir + wohnen"
        options:
          - "wohnt"
          - "wohnst"
          - "wohnen"
        answer: "wohnen"
      - question: "ihr + lernen"
        options:
          - "lernt"
          - "lernen"
          - "lernst"
        answer: "lernt"
      - question: "er + machen"
        options:
          - "machst"
          - "macht"
          - "machen"
        answer: "macht"
      - question: "sie plural + spielen"
        options:
          - "spielst"
          - "spielt"
          - "spielen"
        answer: "spielen"

  - type: "short_answer"
    instruction: "Escreva a conjugação completa no presente."
    items:
      - question: "lernen: ich, du, er, wir, ihr, sie"
        answer: "ich lerne, du lernst, er lernt, wir lernen, ihr lernt, sie lernen"
      - question: "machen: ich, du, sie, wir, ihr, Sie"
        answer: "ich mache, du machst, sie macht, wir machen, ihr macht, Sie machen"
      - question: "wohnen: ich, du, es, wir, ihr, sie"
        answer: "ich wohne, du wohnst, es wohnt, wir wohnen, ihr wohnt, sie wohnen"

  - type: "translation"
    instruction: "Traduza para o alemão."
    items:
      - question: "Eu moro em Hamburgo."
        answer: "Ich wohne in Hamburg."
      - question: "Você estuda alemão."
        answer: "Du lernst Deutsch."
      - question: "Ele joga futebol."
        answer: "Er spielt Fußball."
      - question: "Nós fazemos a tarefa."
        answer: "Wir machen die Aufgabe."
      - question: "Vocês aprendem rápido."
        answer: "Ihr lernt schnell."

  - type: "fill_blank"
    instruction: "Complete a terminação correta do verbo."
    items:
      - question: "ich lern___"
        answer: "e"
      - question: "du wohn___"
        answer: "st"
      - question: "er spiel___"
        answer: "t"
      - question: "wir mach___"
        answer: "en"
      - question: "ihr lern___"
        answer: "t"
      - question: "Sie wohn___"
        answer: "en"

  - type: "short_answer"
    instruction: "Corrija a forma verbal na frase."
    items:
      - question: "Ich lernen Deutsch."
        answer: "Ich lerne Deutsch."
      - question: "Du wohnen hier."
        answer: "Du wohnst hier."
      - question: "Wir macht Kaffee."
        answer: "Wir machen Kaffee."
      - question: "Ihr spielen Tennis."
        answer: "Ihr spielt Tennis."
      - question: "Sie macht die Übung. (Sie formal)"
        answer: "Sie machen die Übung."
