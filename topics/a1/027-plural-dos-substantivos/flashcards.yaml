topic: Plural dos substantivos
level: A1
cards:
- front: der Tag → die Tage
  back: 'o dia; plural: die Tage'
  example: Zwei Tage sind frei.
  example_translation: Dois dias estão livres.
- front: das Kind → die Kinder
  back: 'a criança; plural: die Kinder'
  example: Die Kinder spielen.
  example_translation: As crianças brincam.
- front: die Frau → die Frauen
  back: 'a mulher; plural: die Frauen'
  example: Die Frauen arbeiten.
  example_translation: As mulheres trabalham.
- front: die Tasche → die Taschen
  back: 'a bolsa; plural: die Taschen'
  example: Die Taschen sind neu.
  example_translation: As bolsas são novas.
- front: das Auto → die Autos
  back: 'o carro; plural: die Autos'
  example: Die Autos sind rot.
  example_translation: Os carros são vermelhos.
- front: der Apfel → die Äpfel
  back: 'a maçã; plural: die Äpfel'
  example: Die Äpfel sind gut.
  example_translation: As maçãs são boas.
- front: der Lehrer → die Lehrer
  back: 'o professor; plural: die Lehrer'
  example: Die Lehrer kommen.
  example_translation: Os professores vêm.
