topic: "Verbos irregulares importantes no presente"
level: "A1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com a forma correta do verbo entre parênteses."
    items:
      - question: "Ich ___ ein Brot. (essen)"
        answer: "esse"
      - question: "Du ___ Deutsch. (sprechen)"
        answer: "sprichst"
      - question: "Lena ___ eine E-Mail. (lesen)"
        answer: "liest"
      - question: "Wir ___ nach Hause. (fahren)"
        answer: "fahren"
      - question: "Ihr ___ den Lehrer. (sehen)"
        answer: "seht"
      - question: "Max ___ den Bus. (nehmen)"
        answer: "nimmt"
      - question: "Die Katze ___ viel. (schlafen)"
        answer: "schläft"

  - type: "multiple_choice"
    instruction: "Escolha a forma verbal correta."
    items:
      - question: "du + sehen"
        options:
          - "siehst"
          - "sehst"
          - "seht"
        answer: "siehst"
      - question: "er + fahren"
        options:
          - "fahrt"
          - "fährt"
          - "fährst"
        answer: "fährt"
      - question: "sie singular + nehmen"
        options:
          - "nehmt"
          - "nimmst"
          - "nimmt"
        answer: "nimmt"
      - question: "wir + sprechen"
        options:
          - "sprechen"
          - "spricht"
          - "sprichst"
        answer: "sprechen"
      - question: "ihr + essen"
        options:
          - "isst"
          - "esst"
          - "essen"
        answer: "esst"
      - question: "du + schlafen"
        options:
          - "schlafst"
          - "schlaft"
          - "schläfst"
        answer: "schläfst"
      - question: "ich + lesen"
        options:
          - "lese"
          - "liest"
          - "lest"
        answer: "lese"

  - type: "short_answer"
    instruction: "Escreva a conjugação completa no presente."
    items:
      - question: "sprechen: ich, du, er, wir, ihr, sie"
        answer: "ich spreche, du sprichst, er spricht, wir sprechen, ihr sprecht, sie sprechen"
      - question: "essen: ich, du, sie, wir, ihr, Sie"
        answer: "ich esse, du isst, sie isst, wir essen, ihr esst, Sie essen"
      - question: "fahren: ich, du, er, wir, ihr, sie"
        answer: "ich fahre, du fährst, er fährt, wir fahren, ihr fahrt, sie fahren"
      - question: "nehmen: ich, du, es, wir, ihr, sie"
        answer: "ich nehme, du nimmst, es nimmt, wir nehmen, ihr nehmt, sie nehmen"

  - type: "translation"
    instruction: "Traduza para o alemão."
    items:
      - question: "Você lê um livro."
        answer: "Du liest ein Buch."
      - question: "Ela come pão."
        answer: "Sie isst Brot."
      - question: "Nós vemos um filme."
        answer: "Wir sehen einen Film."
      - question: "Ele vai para Berlim."
        answer: "Er fährt nach Berlin."
      - question: "Vocês dormem bem."
        answer: "Ihr schlaft gut."
      - question: "Eu pego o ônibus."
        answer: "Ich nehme den Bus."

  - type: "fill_blank"
    instruction: "Complete apenas a forma de du."
    items:
      - question: "sprechen -> du ___"
        answer: "sprichst"
      - question: "lesen -> du ___"
        answer: "liest"
      - question: "sehen -> du ___"
        answer: "siehst"
      - question: "essen -> du ___"
        answer: "isst"
      - question: "fahren -> du ___"
        answer: "fährst"
      - question: "schlafen -> du ___"
        answer: "schläfst"
      - question: "nehmen -> du ___"
        answer: "nimmst"

  - type: "short_answer"
    instruction: "Corrija a forma verbal na frase."
    items:
      - question: "Du sprechst sehr leise."
        answer: "Du sprichst sehr leise."
      - question: "Er leset die Zeitung."
        answer: "Er liest die Zeitung."
      - question: "Wir fähren morgen."
        answer: "Wir fahren morgen."
      - question: "Ihr schläft lange."
        answer: "Ihr schlaft lange."
      - question: "Sie nehmt Tee. (sie singular)"
        answer: "Sie nimmt Tee."
      - question: "Du seht das Auto."
        answer: "Du siehst das Auto."

  - type: "fill_blank"
    instruction: "Escolha mentalmente o sujeito e complete a frase com a forma correta."
    items:
      - question: "Der Mann ___ im Café Kaffee. (nehmen)"
        answer: "nimmt"
      - question: "Meine Schwester ___ acht Stunden. (schlafen)"
        answer: "schläft"
      - question: "Ich ___ gern Reis. (essen)"
        answer: "esse"
      - question: "Frau Müller, ___ Sie Französisch? (sprechen)"
        answer: "sprechen"
      - question: "Die Kinder ___ ein Bild. (sehen)"
        answer: "sehen"
      - question: "Du ___ mit dem Zug. (fahren)"
        answer: "fährst"
