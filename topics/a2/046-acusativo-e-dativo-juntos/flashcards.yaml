topic: "Acusativo e dativo juntos"
level: "A2"
cards:
  - front: "Ich gebe dir das Buch."
    back: "Eu te dou o livro."
    example: "Ich gebe dir das Buch heute."
    example_translation: "Eu te dou o livro hoje."
  - front: "dem Mann den Schlüssel"
    back: "ao homem a chave"
    example: "Ich gebe dem Mann den Schlüssel."
    example_translation: "Eu dou a chave ao homem."
  - front: "meiner Freundin eine Nachricht"
    back: "à minha amiga uma mensagem"
    example: "Ich schicke meiner Freundin eine Nachricht."
    example_translation: "Eu envio uma mensagem à minha amiga."
  - front: "mir den Weg erklären"
    back: "explicar o caminho para mim"
    example: "Kannst du mir den Weg erklären?"
    example_translation: "Você pode me explicar o caminho?"
  - front: "ihm das Foto zeigen"
    back: "mostrar a foto a ele"
    example: "Sie zeigt ihm das Foto."
    example_translation: "Ela mostra a foto a ele."
  - front: "ihr einen Kaffee kaufen"
    back: "comprar um café para ela"
    example: "Er kauft ihr einen Kaffee."
    example_translation: "Ele compra um café para ela."
  - front: "ihr die Tasche"
    back: "a bolsa para ela; pronome antes do substantivo"
    example: "Ich bringe ihr die Tasche."
    example_translation: "Eu levo a bolsa para ela."
  - front: "es mir geben"
    back: "dar isso a mim; com dois pronomes, acusativo antes do dativo"
    example: "Kannst du es mir geben?"
    example_translation: "Você pode me dar isso?"
  - front: "ihn / ihm"
    back: "ihn = acusativo masculino; ihm = dativo masculino ou neutro"
    example: "Ich sehe ihn und helfe ihm."
    example_translation: "Eu o vejo e ajudo ele."
  - front: "uns die Regel erklären"
    back: "explicar a regra para nós"
    example: "Die Lehrerin erklärt uns die Regel."
    example_translation: "A professora nos explica a regra."
