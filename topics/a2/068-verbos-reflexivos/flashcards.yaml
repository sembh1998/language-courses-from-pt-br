topic: "Verbos Reflexivos"
level: "A2"
cards:
  - front: "ich → mich"
    back: "eu → me"
    example: "Ich wasche mich."
    example_translation: "Eu me lavo."
  - front: "du → dich"
    back: "você → se/te"
    example: "Du interessierst dich für Musik."
    example_translation: "Você se interessa por música."
  - front: "er/sie/es → sich"
    back: "ele/ela/isso → se"
    example: "Sie freut sich."
    example_translation: "Ela fica feliz."
  - front: "wir → uns"
    back: "nós → nos"
    example: "Wir freuen uns auf Samstag."
    example_translation: "Nós estamos felizes pelo sábado que virá."
  - front: "ihr → euch"
    back: "vocês → se"
    example: "Ihr wascht euch schnell."
    example_translation: "Vocês se lavam rapidamente."
  - front: "sich waschen"
    back: "lavar-se"
    example: "Das Kind wäscht sich."
    example_translation: "A criança se lava."
  - front: "sich freuen auf"
    back: "ficar feliz por algo futuro"
    example: "Ich freue mich auf die Party."
    example_translation: "Eu estou feliz pela festa que virá."
  - front: "sich freuen über"
    back: "ficar feliz com algo presente ou passado"
    example: "Er freut sich über den Brief."
    example_translation: "Ele fica feliz com a carta."
  - front: "sich interessieren für"
    back: "interessar-se por"
    example: "Wir interessieren uns für Kunst."
    example_translation: "Nós nos interessamos por arte."
  - front: "Ich interessiere mich nicht für ..."
    back: "Eu não me interesso por ..."
    example: "Ich interessiere mich nicht für Autos."
    example_translation: "Eu não me interesso por carros."
