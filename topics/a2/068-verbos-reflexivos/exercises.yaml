topic: "Verbos Reflexivos"
level: "A2"
exercises:
  - type: "fill_blank"
    instruction: "Complete com o pronome reflexivo correto."
    items:
      - question: "Ich wasche ___ nach dem Sport."
        answer: "mich"
      - question: "Du freust ___ auf den Besuch."
        answer: "dich"
      - question: "Lisa interessiert ___ für Tiere."
        answer: "sich"
      - question: "Wir freuen ___ über die gute Note."
        answer: "uns"
      - question: "Ihr wascht ___ vor dem Essen."
        answer: "euch"

  - type: "multiple_choice"
    instruction: "Escolha a frase correta."
    items:
      - question: "Qual frase significa 'Eu me interesso por livros'?"
        options:
          - "Ich interessiere mich für Bücher."
          - "Ich interessiere sich für Bücher."
          - "Ich interessiere mir für Bücher."
        answer: "Ich interessiere mich für Bücher."
      - question: "Qual frase está correta para 'vocês se lavam'?"
        options:
          - "Ihr wascht sich."
          - "Ihr wascht euch."
          - "Ihr wascht uns."
        answer: "Ihr wascht euch."
      - question: "Qual frase usa corretamente 'wir'?"
        options:
          - "Wir freuen sich."
          - "Wir freuen euch."
          - "Wir freuen uns."
        answer: "Wir freuen uns."

  - type: "fill_blank"
    instruction: "Complete com a preposição correta: auf, über ou für."
    items:
      - question: "Ich freue mich ___ das Konzert morgen."
        answer: "auf"
      - question: "Er freut sich ___ das Geschenk."
        answer: "über"
      - question: "Interessierst du dich ___ Deutsch?"
        answer: "für"
      - question: "Wir freuen uns ___ die Ferien nächste Woche."
        answer: "auf"

  - type: "translation"
    instruction: "Traduza para o alemão."
    items:
      - question: "Eu me lavo de manhã."
        answer: "Ich wasche mich am Morgen."
      - question: "Ela fica feliz com a mensagem."
        answer: "Sie freut sich über die Nachricht."
      - question: "Nós nos interessamos por música."
        answer: "Wir interessieren uns für Musik."
      - question: "Você se interessa por cinema?"
        answer: "Interessierst du dich für Kino?"

  - type: "transformation"
    instruction: "Reescreva a frase usando a pessoa indicada."
    items:
      - question: "Ich wasche mich. → du"
        answer: "Du wäschst dich."
      - question: "Du freust dich auf Freitag. → wir"
        answer: "Wir freuen uns auf Freitag."
      - question: "Wir interessieren uns für Politik. → er"
        answer: "Er interessiert sich für Politik."
      - question: "Sie freuen sich über den Kaffee. → ihr"
        answer: "Ihr freut euch über den Kaffee."

  - type: "correction"
    instruction: "Corrija o erro na frase alemã."
    items:
      - question: "Ich freue sich auf den Abend."
        answer: "Ich freue mich auf den Abend."
      - question: "Wir interessieren sich für Sprachen."
        answer: "Wir interessieren uns für Sprachen."
      - question: "Du wäschst mich nach der Arbeit."
        answer: "Du wäschst dich nach der Arbeit."
      - question: "Anna freut sich für die Blumen."
        answer: "Anna freut sich über die Blumen."
