topic: "Verbos Reflexivos"
level: "A2"
questions:
  - type: "multiple_choice"
    question: "Qual pronome completa: Ich setze ___ auf den Stuhl."
    options:
      - "mich"
      - "dich"
      - "sich"
    answer: "mich"
  - type: "multiple_choice"
    question: "Como dizer que Tom se interessa por futebol?"
    options:
      - "Tom interessiert dich für Fußball."
      - "Tom interessiert sich für Fußball."
      - "Tom interessiert uns für Fußball."
    answer: "Tom interessiert sich für Fußball."
  - type: "multiple_choice"
    question: "Escolha a frase correta com 'ihr'."
    options:
      - "Ihr freut sich auf die Pause."
      - "Ihr freut uns auf die Pause."
      - "Ihr freut euch auf die Pause."
    answer: "Ihr freut euch auf die Pause."
  - type: "fill_blank"
    question: "Mara freut ___ über den Anruf."
    answer: "sich"
  - type: "fill_blank"
    question: "Wir waschen ___ nach dem Training."
    answer: "uns"
  - type: "fill_blank"
    question: "Freust du dich ___ deinen Geburtstag morgen?"
    answer: "auf"
  - type: "fill_blank"
    question: "Ich interessiere mich ___ alte Städte."
    answer: "für"
  - type: "translation"
    question: "Traduza: Eles se alegram com a visita."
    answer: "Sie freuen sich über den Besuch."
  - type: "translation"
    question: "Traduza: Eu me interesso por tecnologia."
    answer: "Ich interessiere mich für Technik."
  - type: "translation"
    question: "Traduza: Você se lava à noite?"
    answer: "Wäschst du dich am Abend?"
  - type: "transformation"
    question: "Reescreva com 'wir': Ich freue mich auf das Essen."
    answer: "Wir freuen uns auf das Essen."
  - type: "correction"
    question: "Corrija: Eva interessiert mich für Theater."
    answer: "Eva interessiert sich für Theater."
  - type: "correction"
    question: "Corrija: Wir freuen euch über die Hilfe."
    answer: "Wir freuen uns über die Hilfe."
  - type: "multiple_choice"
    question: "Qual opção completa: Die Kinder waschen ___ die Hände."
    options:
      - "uns"
      - "euch"
      - "sich"
    answer: "sich"
