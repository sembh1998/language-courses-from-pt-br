topic: Infinitivo com zu
level: B1
questions:
  - type: "multiple_choice"
    question: "Marque a opção gramatical para a situação de Laura no trabalho."
    options:
      - "Laura versucht, konzentriert zu arbeiten."
      - "Laura versucht, zu konzentriert arbeiten."
      - "Laura versucht konzentriert arbeiten zu."
    answer: "Laura versucht, konzentriert zu arbeiten."
  - type: "multiple_choice"
    question: "Qual opção forma corretamente o infinitivo com zu de anrufen?"
    options:
      - "zu anrufen"
      - "anzurufen"
      - "an zu rufen"
    answer: "anzurufen"
  - type: "multiple_choice"
    question: "Em uma frase com können, qual forma do segundo verbo aparece?"
    options:
      - "Tim kann, zu schwimmen."
      - "Tim kann schwimmen zu."
      - "Tim kann schwimmen."
    answer: "Tim kann schwimmen."
  - type: "multiple_choice"
    question: "Qual frase expressa corretamente: 'Ela não tem vontade de sair'?"
    options:
      - "Sie hat keine Lust, auszugehen."
      - "Sie hat keine Lust, zu ausgehen."
      - "Sie hat keine Lust ausgehen zu."
    answer: "Sie hat keine Lust, auszugehen."
  - type: "multiple_choice"
    question: "Para uma placa de proibição, escolha a formulação natural."
    options:
      - "Es ist verboten, zu hier rauchen."
      - "Es ist verboten, hier zu rauchen."
      - "Es ist verboten hier rauchen zu."
    answer: "Es ist verboten, hier zu rauchen."
  - type: "multiple_choice"
    question: "A visita aos amigos deve ser expressa com infinitivo com zu."
    options:
      - "Wir freuen uns, zu dich besuchen."
      - "Wir freuen uns dich besuchen zu."
      - "Wir freuen uns, dich zu besuchen."
    answer: "Wir freuen uns, dich zu besuchen."
  - type: "fill_blank"
    question: "Nina hofft, bald eine Wohnung ___ finden."
    answer: "zu"
  - type: "fill_blank"
    question: "Es ist angenehm, nach der Arbeit ___ (spazieren gehen)."
    answer: "spazieren zu gehen"
  - type: "fill_blank"
    question: "Ich habe vor, heute Abend ___ (aufräumen)."
    answer: "aufzuräumen"
  - type: "fill_blank"
    question: "Vergiss nicht, deine Tasche ___ packen."
    answer: "zu"
  - type: "transformation"
    question: "Kombine: Er macht Sport. Er versucht es regelmäßig."
    answer: "Er versucht, regelmäßig Sport zu machen."
  - type: "transformation"
    question: "Kombine: Ihr seid ehrlich. Das ist wichtig."
    answer: "Es ist wichtig, ehrlich zu sein."
  - type: "correction"
    question: "Corrija: Sara plant, nächste Woche zu umziehen."
    answer: "Sara plant, nächste Woche umzuziehen."
  - type: "translation"
    question: "Traduza: Eu não tenho tempo para esperar."
    answer: "Ich habe keine Zeit, zu warten."
  - type: "translation"
    question: "Traduza: É bom aprender com erros."
    answer: "Es ist gut, aus Fehlern zu lernen."
