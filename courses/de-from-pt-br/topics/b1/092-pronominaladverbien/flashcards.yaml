topic: "Pronominaladverbien"
level: "B1"
cards:
  - front: "darauf"
    back: "nisso; por isso; para isso, quando a preposição é auf"
    example: "Ich freue mich darauf."
    example_translation: "Eu estou ansioso por isso."
  - front: "worauf"
    back: "em quê; sobre o quê; pelo quê, quando a preposição é auf"
    example: "Worauf freust du dich?"
    example_translation: "Pelo que você está ansioso?"
  - front: "daran"
    back: "nisso, quando a preposição é an"
    example: "Bitte denk daran."
    example_translation: "Por favor, pense nisso / lembre-se disso."
  - front: "woran"
    back: "em quê; no que, quando a preposição é an"
    example: "Woran erinnerst du dich?"
    example_translation: "Do que você se lembra?"
  - front: "damit"
    back: "com isso; com esse instrumento ou meio"
    example: "Kann ich damit bezahlen?"
    example_translation: "Posso pagar com isso?"
  - front: "womit"
    back: "com o quê"
    example: "Womit fährst du zur Schule?"
    example_translation: "Com o que você vai para a escola?"
  - front: "dafür"
    back: "por isso; para isso; a favor disso"
    example: "Ich habe keine Zeit dafür."
    example_translation: "Não tenho tempo para isso."
  - front: "wofür"
    back: "para quê; pelo quê"
    example: "Wofür brauchst du den Computer?"
    example_translation: "Para que você precisa do computador?"
  - front: "auf ihn / auf sie"
    back: "por ele / por ela; use para pessoas, não darauf"
    example: "Ich warte auf sie."
    example_translation: "Estou esperando por ela."
  - front: "mit ihm / mit ihr"
    back: "com ele / com ela; use para pessoas, não damit"
    example: "Ich spreche mit ihm."
    example_translation: "Eu falo com ele."
