topic: "Pronominaladverbien"
level: "B1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com o pronominaladverb correto: darauf, daran, damit ou dafür."
    items:
      - question: "Ich warte auf die Bestätigung. Ich warte ___."
        answer: "darauf"
      - question: "Bitte denk an den Termin. Bitte denk ___."
        answer: "daran"
      - question: "Das ist ein neues Programm. Ich arbeite jeden Tag ___."
        answer: "damit"
      - question: "Wir sammeln Geld für das Projekt. Wir sammeln Geld ___."
        answer: "dafür"
      - question: "Lena freut sich auf das Wochenende. Sie freut sich ___."
        answer: "darauf"
      - question: "Der Kurs ist wichtig. Ich interessiere mich ___."
        answer: "dafür"
  - type: "multiple_choice"
    instruction: "Escolha a pergunta correta para cada resposta."
    items:
      - question: "Resposta: Ich warte auf das Ergebnis."
        options:
          - "Worauf wartest du?"
          - "Woran wartest du?"
          - "Womit wartest du?"
        answer: "Worauf wartest du?"
      - question: "Resposta: Ich denke an das Gespräch."
        options:
          - "Wofür denkst du?"
          - "Woran denkst du?"
          - "Womit denkst du?"
        answer: "Woran denkst du?"
      - question: "Resposta: Ich bezahle mit meiner Karte."
        options:
          - "Woran bezahlst du?"
          - "Wofür bezahlst du?"
          - "Womit bezahlst du?"
        answer: "Womit bezahlst du?"
      - question: "Resposta: Ich brauche das Geld für die Miete."
        options:
          - "Wofür brauchst du das Geld?"
          - "Womit brauchst du das Geld?"
          - "Woran brauchst du das Geld?"
        answer: "Wofür brauchst du das Geld?"
      - question: "Resposta: Ich erinnere mich an den Ausflug."
        options:
          - "Womit erinnerst du dich?"
          - "Woran erinnerst du dich?"
          - "Worauf erinnerst du dich?"
        answer: "Woran erinnerst du dich?"
      - question: "Resposta: Ich interessiere mich für Geschichte."
        options:
          - "Womit interessierst du dich?"
          - "Woran interessierst du dich?"
          - "Wofür interessierst du dich?"
        answer: "Wofür interessierst du dich?"
  - type: "transformation"
    instruction: "Reescreva a segunda frase usando um da-compound adequado."
    items:
      - question: "Ich habe eine Einladung bekommen. Ich freue mich auf die Einladung."
        answer: "Ich freue mich darauf."
      - question: "Morgen gibt es eine Prüfung. Ich denke oft an die Prüfung."
        answer: "Ich denke oft daran."
      - question: "Das Team nutzt ein Online-Tool. Das Team plant die Aufgaben mit dem Online-Tool."
        answer: "Das Team plant die Aufgaben damit."
      - question: "Der Verein braucht Hilfe. Viele Leute engagieren sich für die Hilfe."
        answer: "Viele Leute engagieren sich dafür."
      - question: "Die Regeln sind neu. Wir müssen uns an die Regeln gewöhnen."
        answer: "Wir müssen uns daran gewöhnen."
      - question: "Der Vertrag ist fertig. Ich warte auf den Vertrag."
        answer: "Ich warte darauf."
  - type: "correction"
    instruction: "Corrija as frases. Atenção: pessoas não devem ser substituídas por da-compounds."
    items:
      - question: "Ich warte auf Maria. Ich warte darauf."
        answer: "Ich warte auf Maria. Ich warte auf sie."
      - question: "Womit denkst du? Ich denke an meinen Urlaub."
        answer: "Woran denkst du? Ich denke an meinen Urlaub."
      - question: "Ich spreche mit meinem Kollegen. Ich spreche damit."
        answer: "Ich spreche mit meinem Kollegen. Ich spreche mit ihm."
      - question: "Wofür freust du dich? Ich freue mich auf den Besuch."
        answer: "Worauf freust du dich? Ich freue mich auf den Besuch."
      - question: "Ich interessiere mich für den Kurs. Ich interessiere mich daran."
        answer: "Ich interessiere mich für den Kurs. Ich interessiere mich dafür."
  - type: "translation"
    instruction: "Traduza para o alemão usando o composto indicado quando possível."
    items:
      - question: "Estou esperando por isso. Use: darauf"
        answer: "Ich warte darauf."
      - question: "Em que você está pensando? Use: woran"
        answer: "Woran denkst du?"
      - question: "Eu trabalho com isso todos os dias. Use: damit"
        answer: "Ich arbeite jeden Tag damit."
      - question: "Para que você precisa disso? Use: wofür"
        answer: "Wofür brauchst du das?"
      - question: "Eu me interesso por isso. Use: dafür"
        answer: "Ich interessiere mich dafür."
      - question: "Com o que você escreve? Use: womit"
        answer: "Womit schreibst du?"
  - type: "short_answer"
    instruction: "Responda em alemão com uma frase curta usando o composto pedido. As respostas são modelos."
    items:
      - question: "Worauf wartest du? Use uma resposta com darauf."
        answer: "Ich warte auf eine Nachricht. Ich warte darauf."
      - question: "Woran denkst du oft? Use uma resposta com daran."
        answer: "Ich denke oft an meine Pläne. Ich denke oft daran."
      - question: "Womit lernst du Deutsch? Use uma resposta com damit."
        answer: "Ich lerne mit einer App. Ich lerne damit."
      - question: "Wofür sparst du Geld? Use uma resposta com dafür."
        answer: "Ich spare für eine Reise. Ich spare dafür."
