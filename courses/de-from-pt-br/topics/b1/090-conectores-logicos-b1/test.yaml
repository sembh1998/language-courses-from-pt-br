topic: "Conectores lógicos B1"
level: "B1"
questions:
  - type: "multiple_choice"
    question: "Qual opção mostra uma consequência correta?"
    options:
      - "Der Drucker funktioniert nicht. Deshalb rufe ich den Service an."
      - "Der Drucker funktioniert nicht. Trotzdem rufe ich den Service an."
      - "Der Drucker funktioniert nicht. Obwohl rufe ich den Service an."
    answer: "Der Drucker funktioniert nicht. Deshalb rufe ich den Service an."
  - type: "multiple_choice"
    question: "Qual frase usa obwohl corretamente?"
    options:
      - "Obwohl hat Tom keine Zeit, hilft er uns."
      - "Obwohl Tom keine Zeit hat, hilft er uns."
      - "Obwohl Tom hat keine Zeit, hilft er uns."
    answer: "Obwohl Tom keine Zeit hat, hilft er uns."
  - type: "multiple_choice"
    question: "Qual frase expressa acréscimo de informação?"
    options:
      - "Der Laptop ist leicht. Deshalb ist er blau."
      - "Der Laptop ist leicht. Trotzdem ist er blau."
      - "Der Laptop ist leicht. Außerdem ist er schnell."
    answer: "Der Laptop ist leicht. Außerdem ist er schnell."
  - type: "multiple_choice"
    question: "Qual opção organiza uma sequência natural?"
    options:
      - "Zuerst reservieren wir einen Tisch. Danach gehen wir ins Restaurant."
      - "Trotzdem reservieren wir einen Tisch. Schließlich gehen wir ins Restaurant."
      - "Obwohl reservieren wir einen Tisch. Dann gehen wir ins Restaurant."
    answer: "Zuerst reservieren wir einen Tisch. Danach gehen wir ins Restaurant."
  - type: "multiple_choice"
    question: "Qual opção mostra contraste com trotzdem?"
    options:
      - "Die Aufgabe ist leicht. Deshalb macht sie Fehler."
      - "Die Aufgabe ist leicht. Trotzdem macht sie Fehler."
      - "Die Aufgabe ist leicht. Obwohl macht sie Fehler."
    answer: "Die Aufgabe ist leicht. Trotzdem macht sie Fehler."
  - type: "multiple_choice"
    question: "Qual frase tem a posição verbal correta depois de schließlich?"
    options:
      - "Schließlich wir finden den Schlüssel."
      - "Schließlich den Schlüssel finden wir."
      - "Schließlich finden wir den Schlüssel."
    answer: "Schließlich finden wir den Schlüssel."
  - type: "fill_blank"
    question: "Max hat Fieber. ___ bleibt er heute im Bett."
    answer: "Deshalb"
  - type: "fill_blank"
    question: "___ die Wohnung klein ist, gefällt sie mir."
    answer: "Obwohl"
  - type: "fill_blank"
    question: "Die Kollegin ist neu. ___ arbeitet sie schon sehr selbstständig."
    answer: "Trotzdem"
  - type: "fill_blank"
    question: "Wir machen einen Plan. ___ verteilen wir die Aufgaben."
    answer: "Danach"
  - type: "transformation"
    question: "Reescreva com deshalb: Die Straße ist gesperrt. Wir nehmen einen anderen Weg."
    answer: "Die Straße ist gesperrt. Deshalb nehmen wir einen anderen Weg."
  - type: "transformation"
    question: "Reescreva com obwohl: Sara kennt niemanden. Sie geht zur Party."
    answer: "Sara geht zur Party, obwohl sie niemanden kennt."
  - type: "correction"
    question: "Corrija: Außerdem ich brauche neue Batterien."
    answer: "Außerdem brauche ich neue Batterien."
  - type: "translation"
    question: "Traduza: Primeiro envio o formulário. Depois espero a resposta."
    answer: "Zuerst schicke ich das Formular. Dann warte ich auf die Antwort."
  - type: "translation"
    question: "Traduza: Embora o trem esteja atrasado, ficamos calmos."
    answer: "Obwohl der Zug Verspätung hat, bleiben wir ruhig."
