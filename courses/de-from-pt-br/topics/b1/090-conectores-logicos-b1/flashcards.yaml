topic: "Conectores lógicos B1"
level: "B1"
cards:
  - front: "deshalb"
    back: "por isso; portanto"
    example: "Der Zug hat Verspätung. Deshalb warte ich am Bahnhof."
    example_translation: "O trem está atrasado. Por isso espero na estação."
  - front: "trotzdem"
    back: "mesmo assim; apesar disso"
    example: "Ich habe wenig Zeit. Trotzdem helfe ich dir."
    example_translation: "Tenho pouco tempo. Mesmo assim ajudo você."
  - front: "obwohl"
    back: "embora; apesar de que"
    example: "Sie kommt, obwohl sie müde ist."
    example_translation: "Ela vem, embora esteja cansada."
  - front: "außerdem"
    back: "além disso"
    example: "Das Zimmer ist groß. Außerdem ist es hell."
    example_translation: "O quarto é grande. Além disso, é claro."
  - front: "dann"
    back: "então; depois"
    example: "Ich dusche. Dann ziehe ich mich an."
    example_translation: "Eu tomo banho. Depois me visto."
  - front: "danach"
    back: "depois disso"
    example: "Wir besuchen das Museum. Danach trinken wir Kaffee."
    example_translation: "Nós visitamos o museu. Depois disso tomamos café."
  - front: "zuerst"
    back: "primeiro; em primeiro lugar"
    example: "Zuerst suche ich die Adresse."
    example_translation: "Primeiro procuro o endereço."
  - front: "schließlich"
    back: "por fim; finalmente"
    example: "Schließlich findet er eine Lösung."
    example_translation: "Por fim ele encontra uma solução."
  - front: "Obwohl ich krank bin, arbeite ich."
    back: "Embora eu esteja doente, eu trabalho."
    example: "Obwohl ich krank bin, arbeite ich heute von zu Hause."
    example_translation: "Embora eu esteja doente, trabalho hoje de casa."
  - front: "Deshalb lerne ich Deutsch."
    back: "Por isso eu estudo alemão."
    example: "Ich möchte in Deutschland arbeiten. Deshalb lerne ich Deutsch."
    example_translation: "Quero trabalhar na Alemanha. Por isso estudo alemão."
