topic: "Conectores lógicos B1"
level: "B1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com o conector lógico mais adequado: deshalb, trotzdem, obwohl, außerdem, dann, danach, zuerst ou schließlich."
    items:
      - question: "Ich habe morgen eine Prüfung. ___ lerne ich heute Abend."
        answer: "Deshalb"
      - question: "Es ist kalt. ___ trinkt Paul seinen Kaffee draußen."
        answer: "Trotzdem"
      - question: "___ wir wenig Zeit haben, kochen wir selbst."
        answer: "Obwohl"
      - question: "Der Film ist spannend. ___ sind die Schauspieler sehr gut."
        answer: "Außerdem"
      - question: "___ lesen wir den Text, dann diskutieren wir ihn."
        answer: "Zuerst"
      - question: "Wir besuchen Anna. ___ fahren wir nach Hause."
        answer: "Danach"
  - type: "multiple_choice"
    instruction: "Escolha a opção que expressa corretamente a relação lógica indicada."
    items:
      - question: "Relação: consequência. Qual frase está correta?"
        options:
          - "Ich habe Kopfschmerzen. Deshalb nehme ich eine Tablette."
          - "Ich habe Kopfschmerzen. Trotzdem nehme ich eine Tablette."
          - "Ich habe Kopfschmerzen. Obwohl nehme ich eine Tablette."
        answer: "Ich habe Kopfschmerzen. Deshalb nehme ich eine Tablette."
      - question: "Relação: contraste apesar de uma dificuldade. Qual frase está correta?"
        options:
          - "Ich bin müde. Deshalb gehe ich ins Fitnessstudio."
          - "Ich bin müde. Trotzdem gehe ich ins Fitnessstudio."
          - "Ich bin müde. Danach gehe ich ins Fitnessstudio."
        answer: "Ich bin müde. Trotzdem gehe ich ins Fitnessstudio."
      - question: "Relação: acréscimo de informação. Qual frase está correta?"
        options:
          - "Die Wohnung ist teuer. Deshalb liegt sie zentral."
          - "Die Wohnung ist teuer. Obwohl liegt sie zentral."
          - "Die Wohnung ist teuer. Außerdem liegt sie zentral."
        answer: "Die Wohnung ist teuer. Außerdem liegt sie zentral."
      - question: "Relação: ordem temporal. Qual frase está correta?"
        options:
          - "Zuerst kaufe ich ein. Dann koche ich."
          - "Obwohl kaufe ich ein. Deshalb koche ich."
          - "Trotzdem kaufe ich ein. Außerdem koche ich."
        answer: "Zuerst kaufe ich ein. Dann koche ich."
      - question: "Relação: concessão com oração subordinada. Qual frase está correta?"
        options:
          - "Obwohl hat Maria viel Arbeit, besucht sie uns."
          - "Obwohl Maria viel Arbeit hat, besucht sie uns."
          - "Obwohl Maria hat viel Arbeit, besucht sie uns."
        answer: "Obwohl Maria viel Arbeit hat, besucht sie uns."
      - question: "Relação: etapa final. Qual frase está correta?"
        options:
          - "Schließlich kontrolliere ich die Rechnung."
          - "Deshalb kontrolliere ich die Rechnung zuerst."
          - "Obwohl kontrolliere ich die Rechnung."
        answer: "Schließlich kontrolliere ich die Rechnung."
  - type: "transformation"
    instruction: "Una ou reescreva as frases usando o conector indicado."
    items:
      - question: "Ich habe den Bus verpasst. Ich komme zu spät. Use: deshalb"
        answer: "Ich habe den Bus verpasst. Deshalb komme ich zu spät."
      - question: "Lena ist nervös. Sie hält die Präsentation. Use: trotzdem"
        answer: "Lena ist nervös. Trotzdem hält sie die Präsentation."
      - question: "Wir haben wenig Geld. Wir reisen im Sommer. Use: obwohl"
        answer: "Wir reisen im Sommer, obwohl wir wenig Geld haben."
      - question: "Ich schreibe E-Mails. Ich telefoniere mit Kunden. Use: außerdem"
        answer: "Ich schreibe E-Mails. Außerdem telefoniere ich mit Kunden."
      - question: "Ich räume die Küche auf. Ich gehe schlafen. Use: danach"
        answer: "Ich räume die Küche auf. Danach gehe ich schlafen."
  - type: "correction"
    instruction: "Corrija a posição do verbo ou o conector nas frases."
    items:
      - question: "Ich bin krank. Deshalb ich bleibe zu Hause."
        answer: "Ich bin krank. Deshalb bleibe ich zu Hause."
      - question: "Obwohl ich bin müde, gehe ich zur Arbeit."
        answer: "Obwohl ich müde bin, gehe ich zur Arbeit."
      - question: "Es regnet. Obwohl gehe ich joggen."
        answer: "Es regnet. Trotzdem gehe ich joggen."
      - question: "Zuerst ich lese die Nachricht. Dann antworte ich."
        answer: "Zuerst lese ich die Nachricht. Dann antworte ich."
      - question: "Obwohl der Text schwer ist, ich verstehe die Hauptidee."
        answer: "Obwohl der Text schwer ist, verstehe ich die Hauptidee."
  - type: "translation"
    instruction: "Traduza para o alemão usando o conector indicado."
    items:
      - question: "Estou cansado. Por isso vou dormir cedo. Use: deshalb"
        answer: "Ich bin müde. Deshalb gehe ich früh schlafen."
      - question: "O restaurante está cheio. Mesmo assim esperamos. Use: trotzdem"
        answer: "Das Restaurant ist voll. Trotzdem warten wir."
      - question: "Embora eu more longe, venho pontualmente. Use: obwohl"
        answer: "Obwohl ich weit weg wohne, komme ich pünktlich."
      - question: "Primeiro compramos os bilhetes. Depois entramos. Use: zuerst, dann"
        answer: "Zuerst kaufen wir die Tickets. Dann gehen wir hinein."
      - question: "O curso é útil. Além disso, ele é barato. Use: außerdem"
        answer: "Der Kurs ist nützlich. Außerdem ist er günstig."
  - type: "short_answer"
    instruction: "Responda em alemão com uma frase curta usando o conector pedido."
    items:
      - question: "Warum lernst du Deutsch? Use: deshalb"
        answer: "Ich möchte besser kommunizieren. Deshalb lerne ich Deutsch."
      - question: "Was machst du zuerst am Arbeitstag? Use: zuerst"
        answer: "Zuerst lese ich meine E-Mails."
      - question: "Was machst du trotz schlechten Wetters? Use: trotzdem"
        answer: "Es regnet. Trotzdem gehe ich spazieren."
      - question: "Was machst du nach dem Deutschkurs? Use: danach"
        answer: "Nach dem Deutschkurs koche ich. Danach entspanne ich mich."
