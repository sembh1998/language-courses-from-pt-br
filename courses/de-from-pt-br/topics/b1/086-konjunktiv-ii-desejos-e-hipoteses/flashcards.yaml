topic: "Konjunktiv II: Desejos e hipóteses"
level: B1
cards:
  - front: "ich hätte"
    back: "eu teria"
    example: "Ich hätte gern mehr Freizeit."
    example_translation: "Eu gostaria de ter mais tempo livre."
  - front: "ich wäre"
    back: "eu seria; eu estaria"
    example: "Ich wäre gern am Meer."
    example_translation: "Eu gostaria de estar no mar."
  - front: "ich würde + infinitivo"
    back: "eu faria/iria; forma condicional"
    example: "Ich würde mehr Sport machen."
    example_translation: "Eu faria mais esporte."
  - front: "Wenn ich Zeit hätte, ..."
    back: "Se eu tivesse tempo, ..."
    example: "Wenn ich Zeit hätte, würde ich dich besuchen."
    example_translation: "Se eu tivesse tempo, eu visitaria você."
  - front: "Ich wäre gern ..."
    back: "Eu gostaria de estar/ser ..."
    example: "Ich wäre gern in Wien."
    example_translation: "Eu gostaria de estar em Viena."
  - front: "Ich hätte gern ..."
    back: "Eu gostaria de ter/receber ..."
    example: "Ich hätte gern eine ruhigere Wohnung."
    example_translation: "Eu gostaria de ter um apartamento mais tranquilo."
  - front: "Ich würde gern ..."
    back: "Eu gostaria de ..."
    example: "Ich würde gern mit dir sprechen."
    example_translation: "Eu gostaria de falar com você."
  - front: "lieber"
    back: "preferiria; de preferência"
    example: "Ich würde lieber später fahren."
    example_translation: "Eu preferiria viajar mais tarde."
  - front: "ich könnte"
    back: "eu poderia"
    example: "Ich könnte am Samstag helfen."
    example_translation: "Eu poderia ajudar no sábado."
  - front: "ich müsste"
    back: "eu teria que; eu precisaria"
    example: "Ich müsste zuerst meine Eltern fragen."
    example_translation: "Eu teria que perguntar aos meus pais primeiro."
  - front: "An deiner Stelle würde ich ..."
    back: "No seu lugar, eu ..."
    example: "An deiner Stelle würde ich früher schlafen."
    example_translation: "No seu lugar, eu dormiria mais cedo."
  - front: "würdest du ...?"
    back: "você faria/iria...?"
    example: "Würdest du mitkommen?"
    example_translation: "Você iria junto?"
