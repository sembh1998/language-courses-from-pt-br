topic: Resumo, opinião e relato
level: B1
cards:
  - front: In dem Text geht es um ...
    back: O texto trata de ...
    example: In dem Text geht es um gesundes Essen in der Schule.
    example_translation: O texto trata de alimentação saudável na escola.
  - front: Der Autor erklärt, dass ...
    back: O autor explica que ...
    example: Der Autor erklärt, dass Bewegung im Alltag wichtig ist.
    example_translation: O autor explica que movimento no dia a dia é importante.
  - front: Zusammenfassend kann man sagen, dass ...
    back: Em resumo, pode-se dizer que ...
    example: Zusammenfassend kann man sagen, dass das Projekt erfolgreich war.
    example_translation: Em resumo, pode-se dizer que o projeto foi bem-sucedido.
  - front: Meiner Meinung nach ...
    back: Na minha opinião ...
    example: Meiner Meinung nach sollten Jugendliche mehr mitbestimmen.
    example_translation: Na minha opinião, os jovens deveriam participar mais das decisões.
  - front: Ich finde das wichtig, weil ...
    back: Acho isso importante porque ...
    example: Ich finde das wichtig, weil man dadurch selbstständiger wird.
    example_translation: Acho isso importante porque assim a pessoa se torna mais independente.
  - front: Zum Beispiel ...
    back: Por exemplo ...
    example: Zum Beispiel kann man mit dem Fahrrad zur Arbeit fahren.
    example_translation: Por exemplo, pode-se ir de bicicleta para o trabalho.
  - front: Außerdem ...
    back: Além disso ...
    example: Außerdem lernt man neue Menschen kennen.
    example_translation: Além disso, conhece-se novas pessoas.
  - front: Jedoch ...
    back: Porém ...
    example: Jedoch braucht man dafür viel Zeit.
    example_translation: Porém, precisa-se de muito tempo para isso.
  - front: Trotzdem ...
    back: Apesar disso ...
    example: Trotzdem hat mir die Reise gefallen.
    example_translation: Apesar disso, gostei da viagem.
  - front: Zuerst ..., dann ..., danach ...
    back: Primeiro ..., depois ..., em seguida ...
    example: Zuerst habe ich angerufen, dann habe ich eine E-Mail geschrieben.
    example_translation: Primeiro eu liguei, depois escrevi um e-mail.
  - front: Am Ende ...
    back: No final ...
    example: Am Ende war ich stolz auf meine Arbeit.
    example_translation: No final, fiquei orgulhoso do meu trabalho.
  - front: Diese Erfahrung war für mich ...
    back: Essa experiência foi para mim ...
    example: Diese Erfahrung war für mich sehr lehrreich.
    example_translation: Essa experiência foi muito instrutiva para mim.
