topic: "Verbos com preposições fixas"
level: "B1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com a preposição correta."
    items:
      - question: "Ich warte ___ meine Freundin vor dem Kino."
        answer: "auf"
      - question: "Paul träumt ___ einem Job im Ausland."
        answer: "von"
      - question: "Denkst du noch ___ den Termin morgen?"
        answer: "an"
      - question: "Im Kurs sprechen wir ___ deutsche Filme."
        answer: "über"
      - question: "Ich freue mich ___ das Wochenende."
        answer: "auf"
      - question: "Sie freut sich ___ die gute Nachricht."
        answer: "über"
  - type: "multiple_choice"
    instruction: "Escolha a frase correta."
    items:
      - question: "Qual frase usa corretamente warten?"
        options:
          - "Ich warte auf den Arzt."
          - "Ich warte an den Arzt."
          - "Ich warte von dem Arzt."
        answer: "Ich warte auf den Arzt."
      - question: "Qual frase usa corretamente träumen?"
        options:
          - "Mira träumt über ein Haus."
          - "Mira träumt von einem Haus."
          - "Mira träumt auf ein Haus."
        answer: "Mira träumt von einem Haus."
      - question: "Qual frase usa corretamente sprechen?"
        options:
          - "Wir sprechen an die Reise."
          - "Wir sprechen von die Reise."
          - "Wir sprechen über die Reise."
        answer: "Wir sprechen über die Reise."
      - question: "Qual frase diferencia corretamente auf e über com sich freuen?"
        options:
          - "Ich freue mich auf den Urlaub nächsten Monat."
          - "Ich freue mich von den Urlaub nächsten Monat."
          - "Ich freue mich an den Urlaub nächsten Monat."
        answer: "Ich freue mich auf den Urlaub nächsten Monat."
      - question: "Qual pergunta é correta para uma coisa com denken an?"
        options:
          - "Wovon denkst du?"
          - "Woran denkst du?"
          - "Worauf denkst du?"
        answer: "Woran denkst du?"
      - question: "Qual frase mostra alegria por algo já recebido?"
        options:
          - "Tom freut sich auf das Geschenk von gestern."
          - "Tom freut sich an das Geschenk von gestern."
          - "Tom freut sich über das Geschenk von gestern."
        answer: "Tom freut sich über das Geschenk von gestern."
  - type: "case_choice"
    instruction: "Complete com a forma correta do artigo ou possessivo."
    items:
      - question: "Ich warte auf ___ Bus."
        answer: "den"
      - question: "Sie träumt von ___ neuen Wohnung."
        answer: "einer"
      - question: "Wir sprechen über ___ Chef."
        answer: "den"
      - question: "Denk bitte an ___ Reisepass."
        answer: "deinen"
      - question: "Ich freue mich auf ___ Konzert."
        answer: "das"
      - question: "Er freut sich über ___ Einladung."
        answer: "die"
  - type: "correction"
    instruction: "Corrija a preposição, o caso ou o pronome reflexivo."
    items:
      - question: "Ich warte für den Zug."
        answer: "Ich warte auf den Zug."
      - question: "Sie träumt über einem ruhigen Leben."
        answer: "Sie träumt von einem ruhigen Leben."
      - question: "Wir sprechen über dem Problem."
        answer: "Wir sprechen über das Problem."
      - question: "Ich freue auf die Ferien."
        answer: "Ich freue mich auf die Ferien."
      - question: "Er denkt von seine Eltern."
        answer: "Er denkt an seine Eltern."
  - type: "translation"
    instruction: "Traduza para o alemão usando o verbo com preposição fixa."
    items:
      - question: "Estou esperando pelo e-mail."
        answer: "Ich warte auf die E-Mail."
      - question: "Ela sonha com uma vida tranquila."
        answer: "Sie träumt von einem ruhigen Leben."
      - question: "Nós falamos sobre o novo projeto."
        answer: "Wir sprechen über das neue Projekt."
      - question: "Você está pensando na prova?"
        answer: "Denkst du an die Prüfung?"
      - question: "Estou animado pela visita amanhã."
        answer: "Ich freue mich auf den Besuch morgen."
  - type: "short_answer"
    instruction: "Responda em alemão com uma frase curta usando a expressão indicada."
    items:
      - question: "Worauf wartest du gerade? Use: warten auf"
        answer: "Ich warte auf eine Nachricht."
      - question: "Wovon träumst du beruflich? Use: träumen von"
        answer: "Ich träume von einem interessanten Job."
      - question: "Woran denkst du vor einer Reise? Use: denken an"
        answer: "Ich denke an meinen Pass."
      - question: "Worüber sprichst du gern? Use: sprechen über"
        answer: "Ich spreche gern über Musik."
      - question: "Worauf freust du dich dieses Jahr? Use: sich freuen auf"
        answer: "Ich freue mich auf meinen Urlaub."
