topic: "Caso genitivo: posse"
level: "B1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com a forma correta do artigo definido no genitivo."
    items:
      - question: "Der Name ___ Mannes ist schwer zu schreiben."
        answer: "des"
      - question: "Die Farbe ___ Tasche gefällt mir."
        answer: "der"
      - question: "Die Fenster ___ Hauses sind groß."
        answer: "des"
      - question: "Die Eltern ___ Kinder wohnen in Berlin."
        answer: "der"
      - question: "Das Büro ___ Chefin ist im zweiten Stock."
        answer: "der"
  - type: "fill_blank"
    instruction: "Complete com o possessivo correto no genitivo."
    items:
      - question: "Das Fahrrad ___ Sohnes ist kaputt. (meu)"
        answer: "meines"
      - question: "Die Wohnung ___ Schwester ist sehr hell. (minha)"
        answer: "meiner"
      - question: "Die Nummer ___ Vaters habe ich nicht. (dele)"
        answer: "seines"
      - question: "Der Computer ___ Kollegin ist neu. (dela)"
        answer: "ihrer"
      - question: "Die Adresse ___ Freunde steht im Handy. (nossos)"
        answer: "unserer"
  - type: "multiple_choice"
    instruction: "Escolha a frase correta em alemão formal."
    items:
      - question: "Qual frase significa 'o carro do meu irmão'?"
        options:
          - "das Auto meines Bruders"
          - "das Auto meiner Bruder"
          - "das Auto meinem Bruder"
        answer: "das Auto meines Bruders"
      - question: "Qual frase significa 'a porta da casa'?"
        options:
          - "die Tür der Haus"
          - "die Tür des Hauses"
          - "die Tür dem Haus"
        answer: "die Tür des Hauses"
      - question: "Qual frase significa 'os nomes das crianças'?"
        options:
          - "die Namen den Kindern"
          - "die Namen des Kinder"
          - "die Namen der Kinder"
        answer: "die Namen der Kinder"
      - question: "Qual frase significa 'a opinião da professora'?"
        options:
          - "die Meinung der Lehrerin"
          - "die Meinung des Lehrerin"
          - "die Meinung die Lehrerin"
        answer: "die Meinung der Lehrerin"
  - type: "transformation"
    instruction: "Reescreva usando genitivo em vez de von + dativo."
    items:
      - question: "der Schlüssel von dem Vater"
        answer: "der Schlüssel des Vaters"
      - question: "die Idee von meiner Kollegin"
        answer: "die Idee meiner Kollegin"
      - question: "das Zimmer von dem Kind"
        answer: "das Zimmer des Kindes"
      - question: "die Telefonnummer von unseren Freunden"
        answer: "die Telefonnummer unserer Freunde"
      - question: "der Preis von dem Fahrrad"
        answer: "der Preis des Fahrrads"
  - type: "correction"
    instruction: "Corrija o erro de genitivo na frase."
    items:
      - question: "Der Name der Mann ist Paul."
        answer: "Der Name des Mannes ist Paul."
      - question: "Die Tür des Haus ist offen."
        answer: "Die Tür des Hauses ist offen."
      - question: "Das Handy meiner Bruder liegt hier."
        answer: "Das Handy meines Bruders liegt hier."
      - question: "Die Freundin des Schwester kommt heute."
        answer: "Die Freundin der Schwester kommt heute."
  - type: "translation"
    instruction: "Traduza para o alemão usando genitivo."
    items:
      - question: "O nome do professor é Müller."
        answer: "Der Name des Lehrers ist Müller."
      - question: "A bolsa da minha mãe é vermelha."
        answer: "Die Tasche meiner Mutter ist rot."
      - question: "Por causa da chuva, vamos de ônibus."
        answer: "Wegen des Regens fahren wir mit dem Bus."
      - question: "Apesar do problema, ele está calmo."
        answer: "Trotz des Problems ist er ruhig."
