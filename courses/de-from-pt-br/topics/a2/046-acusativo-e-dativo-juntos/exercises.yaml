topic: "Acusativo e dativo juntos"
level: "A2"
exercises:
  - type: "fill_blank"
    instruction: "Complete com o pronome ou artigo correto."
    items:
      - question: "Ich gebe ___ das Heft."
        answer: "dir"
      - question: "Sie zeigt dem Kind ___ Hund."
        answer: "den"
      - question: "Wir schicken ___ eine Karte."
        answer: "ihm"
      - question: "Paul kauft seiner Mutter ___ Geschenk."
        answer: "ein"

  - type: "multiple_choice"
    instruction: "Escolha a frase correta em alemão."
    items:
      - question: "Como dizer: Eu dou a bolsa à mulher?"
        options:
          - "Ich gebe der Frau die Tasche."
          - "Ich gebe die Frau der Tasche."
          - "Ich gebe den Frau die Tasche."
        answer: "Ich gebe der Frau die Tasche."
      - question: "Como dizer: Ela mostra o quarto a ele?"
        options:
          - "Sie zeigt ihn das Zimmer."
          - "Sie zeigt ihm das Zimmer."
          - "Sie zeigt das Zimmer ihm."
        answer: "Sie zeigt ihm das Zimmer."
      - question: "Qual frase usa dois pronomes na ordem comum?"
        options:
          - "Ich gebe dir es."
          - "Ich gebe dem Kind es."
          - "Ich gebe es dir."
        answer: "Ich gebe es dir."

  - type: "transformation"
    instruction: "Substitua o objeto indicado por um pronome e mantenha uma ordem natural."
    items:
      - question: "Ich gebe dem Lehrer das Buch. Substitua 'dem Lehrer' por 'ihm'."
        answer: "Ich gebe ihm das Buch."
      - question: "Maria zeigt ihrer Freundin die Fotos. Substitua 'die Fotos' por 'sie'."
        answer: "Maria zeigt sie ihrer Freundin."
      - question: "Wir schicken dem Chef die E-Mail. Substitua 'die E-Mail' por 'sie'."
        answer: "Wir schicken sie dem Chef."
      - question: "Tobias bringt seiner Oma den Kuchen. Substitua 'seiner Oma' por 'ihr'."
        answer: "Tobias bringt ihr den Kuchen."

  - type: "ordering"
    instruction: "Coloque as palavras na ordem correta."
    items:
      - question: "gibt / dem Kind / den Ball / der Vater"
        answer: "Der Vater gibt dem Kind den Ball."
      - question: "mir / erklärt / die Aufgabe / Anna"
        answer: "Anna erklärt mir die Aufgabe."
      - question: "es / zeigt / uns / der Lehrer"
        answer: "Der Lehrer zeigt es uns."
      - question: "einen Tee / bringt / ihr / Lukas"
        answer: "Lukas bringt ihr einen Tee."

  - type: "classification"
    instruction: "Identifique o dativo e o acusativo. Responda no formato: dativo = ..., acusativo = ..."
    items:
      - question: "Ich sende meiner Tante das Paket."
        answer: "dativo = meiner Tante, acusativo = das Paket"
      - question: "Der Arzt erklärt dem Patienten das Problem."
        answer: "dativo = dem Patienten, acusativo = das Problem"
      - question: "Kannst du mir den Termin nennen?"
        answer: "dativo = mir, acusativo = den Termin"
      - question: "Sie bringt ihrem Bruder die Schuhe."
        answer: "dativo = ihrem Bruder, acusativo = die Schuhe"

  - type: "translation"
    instruction: "Traduza para o alemão usando dativo e acusativo."
    items:
      - question: "Eu envio a você a foto."
        answer: "Ich schicke dir das Foto."
      - question: "Nós compramos um presente para ela."
        answer: "Wir kaufen ihr ein Geschenk."
      - question: "Você me mostra isso?"
        answer: "Zeigst du es mir?"
      - question: "Ele explica a regra aos alunos."
        answer: "Er erklärt den Schülern die Regel."

  - type: "correction"
    instruction: "Corrija a frase mantendo o sentido."
    items:
      - question: "Ich gebe dich das Handy."
        answer: "Ich gebe dir das Handy."
      - question: "Sie zeigt mir es."
        answer: "Sie zeigt es mir."
      - question: "Wir schicken dem Frau eine Karte."
        answer: "Wir schicken der Frau eine Karte."
      - question: "Kannst du ihm den Schlüssel geben?"
        answer: "Kannst du ihm den Schlüssel geben?"
