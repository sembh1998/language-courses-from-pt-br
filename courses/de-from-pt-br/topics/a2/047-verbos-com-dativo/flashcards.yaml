topic: Verbos com Dativo
level: A2
cards:
  - front: helfen + Dativ
    back: ajudar alguém; a pessoa ajudada fica no dativo
    example: Ich helfe dir morgen.
    example_translation: Eu ajudo você amanhã.
  - front: danken + Dativ
    back: agradecer a alguém; a pessoa fica no dativo
    example: Wir danken dem Fahrer.
    example_translation: Nós agradecemos ao motorista.
  - front: gefallen + Dativ
    back: agradar a alguém; usado como “gostar de”
    example: Die Wohnung gefällt ihr.
    example_translation: Ela gosta do apartamento.
  - front: gehören + Dativ
    back: pertencer a alguém; o dono fica no dativo
    example: Der Rucksack gehört meinem Sohn.
    example_translation: A mochila pertence ao meu filho.
  - front: passen + Dativ
    back: servir ou cair bem em alguém; a pessoa fica no dativo
    example: Das Hemd passt mir nicht.
    example_translation: A camisa não serve em mim.
  - front: fehlen + Dativ
    back: faltar ou fazer falta para alguém; a pessoa fica no dativo
    example: Meine Familie fehlt mir.
    example_translation: Minha família faz falta para mim.
  - front: antworten + Dativ
    back: responder a alguém; a pessoa fica no dativo
    example: Ich antworte der Chefin.
    example_translation: Eu respondo à chefe.
  - front: Wem?
    back: a quem? para quem? pergunta típica do dativo
    example: Wem gehört das Buch?
    example_translation: A quem pertence o livro?
  - front: mir, dir, ihm, ihr
    back: formas de dativo para ich, du, er, sie
    example: Der Film gefällt mir, aber er gefällt ihr nicht.
    example_translation: Eu gosto do filme, mas ela não gosta dele.
  - front: den Kindern
    back: às crianças; plural no dativo geralmente recebe den + -n
    example: Der Lehrer hilft den Kindern.
    example_translation: O professor ajuda as crianças.
