    example_translation: Nós agradecemos à médica.
  - german: gefallen
    translation: agradar, ser do agrado de alguém
    type: verb
    gender: null
    plural: null
    example: Der Pullover gefällt mir.
    example_translation: Eu gosto do suéter.
  - german: gehören
    translation: pertencer
    type: verb
    gender: null
    plural: null
    example: Das Handy gehört meinem Bruder.
    example_translation: O celular pertence ao meu irmão.
  - german: passen
    translation: servir, caber, cair bem
    type: verb
    gender: null
    plural: null
