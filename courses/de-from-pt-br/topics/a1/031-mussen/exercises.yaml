topic: Müssen
level: A1
exercises:
- type: fill_blank
  instruction: Complete com a forma correta de Müssen.
  items:
  - question: Ich ___ heute arbeiten.
    answer: muss
    explanation: Ich usa a forma singular.
  - question: Du ___ Deutsch lernen.
    answer: musst
    explanation: Du recebe -st.
  - question: Er ___ nach Hause gehen.
    answer: muss
    explanation: Er usa a mesma forma de ich.
  - question: Wir ___ früh kommen.
    answer: müssen
    explanation: Wir usa a forma plural.
- type: multiple_choice
  instruction: Escolha a frase com ordem correta.
  items:
  - question: 'Frase correta com ich:'
    answer: Ich muss heute arbeiten.
    explanation: O infinitivo vai ao fim.
    options:
    - Ich arbeiten muss heute.
    - Ich muss heute arbeiten.
    - Ich heute arbeiten muss.
  - question: 'Frase correta com du:'
    answer: Du musst Deutsch lernen.
    explanation: O modal fica na segunda posição.
    options:
    - Du musst Deutsch lernen.
    - Du lernen musst Deutsch.
    - Du Deutsch musst lernst.
  - question: 'Frase correta com plural:'
    answer: Wir müssen morgen kommen.
    explanation: Wir usa forma plural e infinitivo no fim.
    options:
    - Wir kommen müssen morgen.
    - Wir morgen müssen kommen.
    - Wir müssen morgen kommen.
- type: translation
  instruction: Traduza para o alemão.
  items:
  - question: Eu precisar / ter que estudar.
    answer: Ich muss lernen.
    explanation: Conjugue só o modal.
  - question: Você precisar / ter que ir.
    answer: Du musst gehen.
    explanation: Du usa a forma própria.
  - question: Nós precisar / ter que trabalhar.
    answer: Wir müssen arbeiten.
    explanation: Wir usa forma plural.
- type: rewrite
  instruction: Reordene a frase.
  items:
  - question: arbeiten / ich / heute / muss
    answer: Ich muss heute arbeiten.
    explanation: Modal em segunda posição.
  - question: lernen / du / Deutsch / musst
    answer: Du musst Deutsch lernen.
    explanation: Infinitivo no fim.
  - question: gehen / wir / morgen / müssen
    answer: Wir müssen morgen gehen.
    explanation: Wir + modal + tempo + infinitivo.
- type: fill_blank
  instruction: Complete com o verbo principal no infinitivo.
  items:
  - question: Ich muss heute ___.
    answer: arbeiten
    explanation: Depois do modal, use infinitivo.
  - question: Du musst viel ___.
    answer: lernen
    explanation: O verbo principal não é conjugado.
  - question: Er muss jetzt ___.
    answer: gehen
    explanation: Infinitivo no fim.
  - question: Wir müssen morgen ___.
    answer: kommen
    explanation: Infinitivo para plural também.
