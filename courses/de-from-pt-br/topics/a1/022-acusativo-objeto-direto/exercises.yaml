topic: "Acusativo: objeto direto"
level: "A1"
exercises:
  - type: "fill_blank"
    instruction: "Complete com den, die ou das no acusativo."
    items:
      - question: "Ich sehe ___ Mann."
        answer: "den"
      - question: "Sie liest ___ Buch."
        answer: "das"
      - question: "Tom trinkt ___ Kaffee."
        answer: "den"
      - question: "Wir sehen ___ Frau."
        answer: "die"
      - question: "Anna macht ___ Aufgabe."
        answer: "die"
      - question: "Du kaufst ___ Apfel."
        answer: "den"
  - type: "fill_blank"
    instruction: "Complete com einen, eine ou ein no acusativo."
    items:
      - question: "Ich habe ___ Hund."
        answer: "einen"
      - question: "Lena kauft ___ Tasche."
        answer: "eine"
      - question: "Er liest ___ Buch."
        answer: "ein"
      - question: "Wir essen ___ Kuchen."
        answer: "einen"
      - question: "Sie braucht ___ Stift."
        answer: "einen"
      - question: "Du trinkst ___ Wasser."
        answer: "ein"
  - type: "multiple_choice"
    instruction: "Escolha a frase correta."
    items:
      - question: "Qual frase usa corretamente o acusativo masculino?"
        options:
          - "Ich sehe den Lehrer."
          - "Ich sehe der Lehrer."
          - "Ich sehe dem Lehrer."
        answer: "Ich sehe den Lehrer."
      - question: "Qual frase está correta com artigo indefinido?"
        options:
          - "Mia kauft ein Apfel."
          - "Mia kauft einen Apfel."
          - "Mia kauft eine Apfel."
        answer: "Mia kauft einen Apfel."
      - question: "Qual frase mostra que o neutro não muda?"
        options:
          - "Ben liest den Buch."
          - "Ben liest die Buch."
          - "Ben liest das Buch."
        answer: "Ben liest das Buch."
      - question: "Qual frase está correta para feminino?"
        options:
          - "Wir kaufen der Tasche."
          - "Wir kaufen den Tasche."
          - "Wir kaufen die Tasche."
        answer: "Wir kaufen die Tasche."
      - question: "Qual frase está correta para plural?"
        options:
          - "Anna sieht die Kinder."
          - "Anna sieht den Kinder."
          - "Anna sieht der Kinder."
        answer: "Anna sieht die Kinder."
      - question: "Qual frase está correta com der Kaffee no acusativo?"
        options:
          - "Du trinkst der Kaffee."
          - "Du trinkst den Kaffee."
          - "Du trinkst das Kaffee."
        answer: "Du trinkst den Kaffee."
  - type: "classification"
    instruction: "Classifique o termo destacado como sujeito ou objeto direto."
    items:
      - question: "Ich sehe den Hund. -> den Hund"
        answer: "objeto direto"
      - question: "Der Mann liest ein Buch. -> Der Mann"
        answer: "sujeito"
      - question: "Lena kauft eine Tasche. -> eine Tasche"
        answer: "objeto direto"
      - question: "Das Kind isst einen Apfel. -> Das Kind"
        answer: "sujeito"
      - question: "Wir trinken den Kaffee. -> den Kaffee"
        answer: "objeto direto"
  - type: "correction"
    instruction: "Corrija somente o artigo quando necessário."
    items:
      - question: "Ich kaufe der Stift."
        answer: "Ich kaufe den Stift."
      - question: "Sie hat ein Hund."
        answer: "Sie hat einen Hund."
      - question: "Tom liest den Buch."
        answer: "Tom liest das Buch."
      - question: "Wir sehen der Lehrer."
        answer: "Wir sehen den Lehrer."
      - question: "Mia kauft einen Tasche."
        answer: "Mia kauft eine Tasche."
  - type: "translation"
    instruction: "Traduza para o alemão usando o acusativo."
    items:
      - question: "Eu vejo o homem."
        answer: "Ich sehe den Mann."
      - question: "Ela compra uma maçã."
        answer: "Sie kauft einen Apfel."
      - question: "Nós lemos o livro."
        answer: "Wir lesen das Buch."
      - question: "Ele tem um cachorro."
        answer: "Er hat einen Hund."
      - question: "Eu compro uma bolsa."
        answer: "Ich kaufe eine Tasche."
  - type: "sentence_transformation"
    instruction: "Transforme o grupo nominal para o acusativo."
    items:
      - question: "der Mann"
        answer: "den Mann"
      - question: "ein Lehrer"
        answer: "einen Lehrer"
      - question: "die Frau"
        answer: "die Frau"
      - question: "das Brot"
        answer: "das Brot"
      - question: "ein Kaffee"
        answer: "einen Kaffee"
      - question: "eine Aufgabe"
        answer: "eine Aufgabe"
