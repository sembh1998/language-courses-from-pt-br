topic: "Acusativo: objeto direto"
level: "A1"
cards:
  - front: "der → den"
    back: "mudança do artigo definido masculino no acusativo"
    example: "Ich sehe den Mann."
    example_translation: "Eu vejo o homem."
  - front: "ein → einen"
    back: "mudança do artigo indefinido masculino no acusativo"
    example: "Ich habe einen Hund."
    example_translation: "Eu tenho um cachorro."
  - front: "der Mann"
    back: "o homem; no acusativo: den Mann"
    example: "Sie sieht den Mann."
    example_translation: "Ela vê o homem."
  - front: "der Hund"
    back: "o cachorro; no acusativo: den Hund / einen Hund"
    example: "Ben hat einen Hund."
    example_translation: "Ben tem um cachorro."
  - front: "der Apfel"
    back: "a maçã; no acusativo: den Apfel / einen Apfel"
    example: "Ich kaufe einen Apfel."
    example_translation: "Eu compro uma maçã."
  - front: "die Frau"
    back: "a mulher; no acusativo continua die Frau"
    example: "Ich sehe die Frau."
    example_translation: "Eu vejo a mulher."
  - front: "das Buch"
    back: "o livro; no acusativo continua das Buch"
    example: "Er liest das Buch."
    example_translation: "Ele lê o livro."
  - front: "eine Tasche"
    back: "uma bolsa; feminino não muda no acusativo básico"
    example: "Sie kauft eine Tasche."
    example_translation: "Ela compra uma bolsa."
  - front: "ein Brot"
    back: "um pão; neutro não muda no acusativo básico"
    example: "Ich esse ein Brot."
    example_translation: "Eu como um pão."
  - front: "die Kinder"
    back: "as crianças; plural com die no acusativo"
    example: "Wir sehen die Kinder."
    example_translation: "Nós vemos as crianças."
  - front: "sehen + acusativo"
    back: "ver alguém ou algo"
    example: "Ich sehe den Lehrer."
    example_translation: "Eu vejo o professor."
  - front: "kaufen + acusativo"
    back: "comprar algo"
    example: "Mia kauft einen Kaffee."
    example_translation: "Mia compra um café."
