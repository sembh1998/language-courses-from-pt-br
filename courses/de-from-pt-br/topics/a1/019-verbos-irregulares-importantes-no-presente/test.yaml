    question: "Qual forma combina com Sie formal?"
    options:
      - "liest"
      - "lest"
      - "lesen"
    answer: "lesen"
  - type: "translation"
    question: "Traduza: Eu vejo a escola."
    answer: "Ich sehe die Schule."
  - type: "fill_blank"
    question: "Complete: Sprichst du Deutsch? Ja, ich ___ Deutsch. (sprechen)"
    answer: "spreche"
