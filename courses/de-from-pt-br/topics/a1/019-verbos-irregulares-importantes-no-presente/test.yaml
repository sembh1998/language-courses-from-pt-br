    question: "Qual frase está correta?"
    options:
      - "Du sieht den Film."
      - "Du sehst den Film."
      - "Du siehst den Film."
    answer: "Du siehst den Film."
  - type: "short_answer"
    question: "Qual é a forma de sprechen com sie singular?"
    answer: "sie spricht"
