    question: "Escolha a forma correta para du + nehmen."
    options:
      - "nehmst"
      - "nimmst"
      - "nimmt"
    answer: "nimmst"
  - type: "translation"
    question: "Traduza: Ela dorme pouco."
    answer: "Sie schläft wenig."
  - type: "fill_blank"
    question: "Complete: Wir ___ heute nach München. (fahren)"
    answer: "fahren"
