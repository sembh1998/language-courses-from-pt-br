topic: "Verbos irregulares importantes no presente"
level: "A1"
questions:
  - type: "multiple_choice"
    question: "Qual forma completa a frase: Paul ___ einen Apfel?"
    options:
      - "isst"
      - "esst"
      - "esse"
    answer: "isst"
  - type: "fill_blank"
    question: "Complete: Du ___ eine SMS. (lesen)"
    answer: "liest"
