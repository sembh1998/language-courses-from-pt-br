    type: pronoun
    gender: null
    plural: null
    example: Ich lerne Deutsch.
    example_translation: Eu aprendo alemão.
  - german: du
    translation: você; tu
    type: pronoun
    gender: null
    plural: null
    example: Du kommst aus Brasilien.
