topic: Can/can't para habilidades e permissões
level: A1
cards:
  - front: "I can fix it."
    back: "Eu consigo corrigir isso."
    example: "I can fix it today."
    example_translation: "Eu consigo corrigir isso hoje."
  - front: "Can you join?"
    back: "Você pode entrar?"
    example: "Can you join the call now?"
    example_translation: "Você pode entrar na chamada agora?"
  - front: "We can't deploy now."
    back: "Nós não podemos fazer deploy agora."
    example: "We can't deploy now because the test failed."
    example_translation: "Nós não podemos fazer deploy agora porque o teste falhou."
  - front: "She can access the system."
    back: "Ela pode acessar o sistema."
    example: "She can access the system with her account."
    example_translation: "Ela pode acessar o sistema com a conta dela."
