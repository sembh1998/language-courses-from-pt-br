topic: "Can/can't para habilidades e permissões"
level: "A1"
exercises:
  - title: "Escolha a frase correta"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase está correta?"
        options:
          - "I can fix it."
          - "I can to fix it."
          - "I can fixes it."
        answer: "I can fix it."
      - id: "1.2"
        question: "Qual frase é uma pergunta natural?"
        options:
          - "You can join?"
          - "Can you join?"
          - "Can join you?"
        answer: "Can you join?"
      - id: "1.3"
        question: "Qual frase indica impossibilidade agora?"
        options:
          - "We can deploy now."
          - "We deploy can now."
          - "We can't deploy now."
        answer: "We can't deploy now."
  - title: "Complete"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: She can ___ the dashboard."
        answer: "access"
      - id: "2.2"
        question: "Complete: They can't ___ this file."
        answer: "edit"
      - id: "2.3"
        question: "Complete: Can you ___ me?"
        answer: "help"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza: Eu posso testar o aplicativo."
        answer: "I can test the app."
      - id: "3.2"
        question: "Traduza: Nós não podemos fazer deploy hoje."
        answer: "We can't deploy today."
      - id: "3.3"
        question: "Traduza: Você pode me ajudar?"
        answer: "Can you help me?"
  - title: "Correção"
    type: "correction"
    items:
      - id: "4.1"
        question: "Corrija: She can accesses the system."
        answer: "She can access the system."
      - id: "4.2"
        question: "Corrija: We don't can't delete files."
        answer: "We can't delete files."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase sobre algo que você consegue fazer no trabalho usando `can`."
        answer: "I can fix bugs."
