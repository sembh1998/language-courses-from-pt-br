topic: "Can/can't para habilidades e permissões"
level: "A1"
words:
  - english: "can"
    translation: "poder, conseguir"
    example: "I can fix it."
    example_translation: "Eu consigo corrigir isso."
  - english: "can't"
    translation: "não poder, não conseguir"
    example: "We can't deploy now."
    example_translation: "Nós não podemos fazer deploy agora."
  - english: "fix"
    translation: "corrigir"
    example: "I can fix the bug."
    example_translation: "Eu consigo corrigir o bug."
  - english: "join"
    translation: "entrar, participar"
    example: "Can you join the call?"
    example_translation: "Você pode entrar na chamada?"
  - english: "deploy"
    translation: "fazer deploy, implantar"
    example: "We can deploy after the test."
    example_translation: "Nós podemos fazer deploy depois do teste."
  - english: "access"
    translation: "acessar"
    example: "She can access the system."
    example_translation: "Ela pode acessar o sistema."
  - english: "edit"
    translation: "editar"
    example: "The user can edit the file."
    example_translation: "O usuário pode editar o arquivo."
  - english: "delete"
    translation: "apagar, deletar"
    example: "They can't delete files."
    example_translation: "Eles não podem apagar arquivos."
  - english: "permission"
    translation: "permissão"
    example: "I don't have permission."
    example_translation: "Eu não tenho permissão."
  - english: "help"
    translation: "ajudar, ajuda"
    example: "Can you help me?"
    example_translation: "Você pode me ajudar?"
