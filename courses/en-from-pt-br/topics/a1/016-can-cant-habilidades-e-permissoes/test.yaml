topic: "Can/can't para habilidades e permissões"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase usa o verbo na forma básica depois de `can`?"
    options:
      - "He can open the file."
      - "He can opens the file."
      - "He can to open the file."
    answer: "He can open the file."
  - id: "2"
    type: "multiple_choice"
    question: "Qual pergunta pede ajuda?"
    options:
      - "You can help me?"
      - "Can you help me?"
      - "Can help you me?"
    answer: "Can you help me?"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase mostra falta de permissão?"
    options:
      - "The admin can reset it."
      - "The user can see it."
      - "The guest can't edit it."
    answer: "The guest can't edit it."
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: We can ___ the app after lunch."
    answer: "test"
  - id: "5"
    type: "translation"
    question: "Traduza: Ela pode acessar o relatório."
    answer: "She can access the report."
  - id: "6"
    type: "translation"
    question: "Traduza: Eu não consigo abrir o painel."
    answer: "I can't open the dashboard."
  - id: "7"
    type: "correction"
    question: "Corrija: Can you to join the meeting?"
    answer: "Can you join the meeting?"
  - id: "8"
    type: "short_answer"
    question: "Escreva uma frase com `can't delete`."
    answer: "I can't delete this file."
