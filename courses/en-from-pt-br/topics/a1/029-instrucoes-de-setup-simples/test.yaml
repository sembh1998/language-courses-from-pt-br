topic: "Instruções de setup simples"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase pede para instalar uma ferramenta?"
    options:
      - "Install Node."
      - "Open GitHub."
      - "Close the app."
    answer: "Install Node."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa: ___, open the folder."
    options:
      - "Command"
      - "Then"
      - "Repository"
    answer: "Then"
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção significa 'rodar npm install'?"
    options:
      - "open npm install"
      - "clone npm install"
      - "run npm install"
    answer: "run npm install"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: ___ the repository from GitHub."
    answer: "Clone"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Depois, abra a pasta."
    answer: "Then, open the folder."
  - id: "6"
    type: "ordering"
    question: "Ordene as palavras: command / the / run"
    answer: "Run the command."
  - id: "7"
    type: "short_production"
    question: "Escreva uma instrução de setup em inglês com 'finally'."
    answer: "Finally, start the app."
