topic: "Instruções de setup simples"
level: "A1"
exercises:
  - title: "Reconhecimento de instruções"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "O que significa 'Open the terminal'?"
        options:
          - "Abra o terminal"
          - "Instale o terminal"
          - "Feche o terminal"
        answer: "Abra o terminal"
      - id: "1.2"
        question: "Qual opção significa 'clonar o repositório'?"
        options:
          - "run the repository"
          - "clone the repository"
          - "open the command"
        answer: "clone the repository"
      - id: "1.3"
        question: "Qual palavra marca o último passo?"
        options:
          - "first"
          - "then"
          - "finally"
        answer: "finally"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: First, ___ Node."
        answer: "install"
      - id: "2.2"
        question: "Complete: Then, ___ the terminal."
        answer: "open"
      - id: "2.3"
        question: "Complete: Finally, ___ the command."
        answer: "run"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Primeiro, instale o Node."
        answer: "First, install Node."
      - id: "3.2"
        question: "Traduza para o inglês: Em seguida, clone o repositório."
        answer: "Next, clone the repository."
      - id: "3.3"
        question: "Traduza para o inglês: Finalmente, rode o comando."
        answer: "Finally, run the command."
  - title: "Ordene a sequência"
    type: "ordering"
    items:
      - id: "4.1"
        question: "Ordene os passos: Finally, run the command. / First, install Node. / Then, open the terminal."
        answer: "First, install Node. Then, open the terminal. Finally, run the command."
      - id: "4.2"
        question: "Ordene as palavras: the / repository / clone"
        answer: "Clone the repository."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva dois passos de setup em inglês usando 'first' e 'then'."
        answer: "First, open the terminal. Then, run the command."
