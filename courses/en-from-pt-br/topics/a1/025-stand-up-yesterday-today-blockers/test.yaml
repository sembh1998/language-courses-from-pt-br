topic: "Stand-up A1: yesterday, today, blockers"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase é apropriada para progresso de ontem?"
    options:
      - "Yesterday I reviewed a pull request."
      - "Today I will deploy the app."
      - "I need the password."
    answer: "Yesterday I reviewed a pull request."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa: Today I ___ update the documentation."
    options:
      - "worked"
      - "will"
      - "blocker"
    answer: "will"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase pede acompanhamento sobre um impedimento?"
    options:
      - "Yesterday I fixed it."
      - "Today I will check it."
      - "Do you need help?"
    answer: "Do you need help?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: I have a ___: the server is down."
    answer: "blocker"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Hoje eu vou trabalhar no ticket."
    answer: "Today I will work on the ticket."
  - id: "6"
    type: "sentence_transformation"
    question: "Corrija a frase: I need help the error."
    answer: "I need help with the error."
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: worked / I / yesterday / on / the bug"
    answer: "Yesterday I worked on the bug."
  - id: "8"
    type: "short_production"
    question: "Escreva um mini stand-up com duas frases: ontem e hoje."
    answer: "Yesterday I fixed a bug. Today I will test the page."
