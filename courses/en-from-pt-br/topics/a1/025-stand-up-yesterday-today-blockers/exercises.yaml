topic: "Stand-up A1: yesterday, today, blockers"
level: "A1"
exercises:
  - title: "Reconhecimento de frases de stand-up"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase fala sobre ontem?"
        options:
          - "Yesterday I worked on the API."
          - "Today I will test the API."
          - "I have a blocker."
        answer: "Yesterday I worked on the API."
      - id: "1.2"
        question: "Qual frase fala sobre plano para hoje?"
        options:
          - "I need access."
          - "Today I will update the ticket."
          - "Yesterday I fixed a bug."
        answer: "Today I will update the ticket."
      - id: "1.3"
        question: "Qual frase comunica um impedimento?"
        options:
          - "I reviewed the code."
          - "I will join the meeting."
          - "I have a blocker."
        answer: "I have a blocker."
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'Yesterday': ___ I worked on the login."
        answer: "Yesterday"
      - id: "2.2"
        question: "Complete com 'will': Today I ___ test the feature."
        answer: "will"
      - id: "2.3"
        question: "Complete com 'blocker': I have a ___."
        answer: "blocker"
      - id: "2.4"
        question: "Complete com 'access': I need ___ to the repository."
        answer: "access"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Ontem eu corrigi um bug."
        answer: "Yesterday I fixed a bug."
      - id: "3.2"
        question: "Traduza para o inglês: Hoje eu vou revisar o código."
        answer: "Today I will review the code."
      - id: "3.3"
        question: "Traduza para o inglês: Eu preciso de ajuda com o erro."
        answer: "I need help with the error."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija a frase: Yesterday I worked the ticket."
        answer: "Yesterday I worked on the ticket."
      - id: "4.2"
        question: "Transforme em plano para hoje: I test the feature."
        answer: "Today I will test the feature."
      - id: "4.3"
        question: "Faça uma pergunta de acompanhamento para blocker usando 'what'."
        answer: "What is the blocker?"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase de stand-up sobre ontem."
        answer: "Yesterday I worked on the dashboard."
      - id: "5.2"
        question: "Escreva uma frase dizendo que você precisa de acesso."
        answer: "I need access to the server."
