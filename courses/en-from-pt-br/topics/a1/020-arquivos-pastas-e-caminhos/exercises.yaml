topic: "Arquivos, pastas e caminhos"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Localização"
    instruction: "Escolha a melhor opção."
    items:
      - id: "1.1"
        question: "Como dizer 'O arquivo está na pasta raiz'?"
        options:
          - "The file is in the root folder."
          - "The folder is in the file."
          - "The path is root file."
        answer: "The file is in the root folder."
      - id: "1.2"
        question: "Qual palavra significa 'caminho'?"
        options:
          - "folder"
          - "path"
          - "file"
        answer: "path"
      - id: "1.3"
        question: "Qual pergunta está correta?"
        options:
          - "What the file is?"
          - "Where file is?"
          - "Where is the file?"
        answer: "Where is the file?"
  - type: "fill_in_the_blank"
    title: "Complete com preposição"
    instruction: "Use in, under ou at."
    items:
      - id: "2.1"
        question: "The README is ___ the root folder."
        answer: "in"
      - id: "2.2"
        question: "The file is ___ src/components."
        answer: "under"
      - id: "2.3"
        question: "The config is ___ /app/config.yaml."
        answer: "at"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza as frases."
    items:
      - id: "3.1"
        question: "Abra a pasta de testes."
        answer: "Open the test folder."
      - id: "3.2"
        question: "O caminho está correto."
        answer: "The path is correct."
      - id: "3.3"
        question: "Atualize o arquivo de configuração."
        answer: "Update the config file."
  - type: "transformation"
    title: "Corrija a frase"
    instruction: "Escreva a versão correta."
    items:
      - id: "4.1"
        question: "The file in the folder."
        answer: "The file is in the folder."
      - id: "4.2"
        question: "Where the path is?"
        answer: "Where is the path?"
  - type: "short_production"
    title: "Produção curta"
    instruction: "Escreva uma localização simples."
    items:
      - id: "5.1"
        question: "Diga que um arquivo está em src."
        answer: "The file is in src."
