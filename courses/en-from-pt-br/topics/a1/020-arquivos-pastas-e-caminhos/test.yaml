topic: "Arquivos, pastas e caminhos"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual opção significa 'arquivo de configuração'?"
    options:
      - "config file"
      - "folder path"
      - "root name"
    answer: "config file"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase está correta?"
    options:
      - "The folder are empty."
      - "The folder is empty."
      - "The folder empty."
    answer: "The folder is empty."
  - id: "3"
    type: "multiple_choice"
    question: "Como perguntar 'Onde está a pasta?'"
    options:
      - "What is the folder?"
      - "Where the folder is?"
      - "Where is the folder?"
    answer: "Where is the folder?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: The extension is ___."
    answer: ".js"
  - id: "5"
    type: "fill_in_the_blank"
    question: "Complete: The file is ___ the docs folder."
    answer: "in"
  - id: "6"
    type: "translation"
    question: "Traduza: O nome do arquivo é test.py."
    answer: "The file name is test.py."
  - id: "7"
    type: "translation"
    question: "Traduza: A pasta raiz está aberta."
    answer: "The root folder is open."
  - id: "8"
    type: "transformation"
    question: "Corrija: The path correct."
    answer: "The path is correct."
  - id: "9"
    type: "short_answer"
    question: "Responda em inglês: Where is the config file?"
    answer: "It is in the root folder."
