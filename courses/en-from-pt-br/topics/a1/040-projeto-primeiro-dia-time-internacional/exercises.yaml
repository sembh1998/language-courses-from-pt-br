topic: "Projeto A1: primeiro dia em um time internacional"
level: "A1"
exercises:
  - title: "Cenário do primeiro dia"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase serve para se apresentar no primeiro dia?"
        options:
          - "Hi, I am new on the team."
          - "Run the tests now."
          - "Error: token missing."
        answer: "Hi, I am new on the team."
      - id: "1.2"
        question: "Qual frase é uma instrução de setup?"
        options:
          - "I like APIs."
          - "Install the packages."
          - "I am from Brazil."
        answer: "Install the packages."
      - id: "1.3"
        question: "Qual frase pede ajuda?"
        options:
          - "The app is faster."
          - "Open the repository."
          - "Can you help me?"
        answer: "Can you help me?"
  - title: "Complete mensagens"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: Today is my first ___."
        answer: "day"
      - id: "2.2"
        question: "Complete: I need help ___ the error."
        answer: "with"
      - id: "2.3"
        question: "Complete: The setup ___."
        answer: "failed"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Abra o repositório."
        answer: "Open the repository."
      - id: "3.2"
        question: "Traduza para o inglês: Eu preciso de ajuda com o erro."
        answer: "I need help with the error."
  - title: "Leitura de erro"
    type: "short_answer"
    items:
      - id: "4.1"
        question: "Explique em português: Package not found."
        answer: "O pacote não foi encontrado."
      - id: "4.2"
        question: "Explique em português: API key is required."
        answer: "A chave de API é obrigatória."
  - title: "Produção do projeto"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva um update de três frases sobre seu primeiro dia."
        answer: "I read the README. I installed the packages. I need help with the tests."
