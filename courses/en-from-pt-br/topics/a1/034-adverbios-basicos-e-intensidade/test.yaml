topic: "Adverbs básicos e intensidade"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual opção significa 'corretamente'?"
    options:
      - "correctly"
      - "quickly"
      - "really"
    answer: "correctly"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase tem ordem natural?"
    options:
      - "The app is slow too."
      - "The app is too slow."
      - "The app too is slow."
    answer: "The app is too slow."
  - id: "3"
    type: "multiple_choice"
    question: "Qual palavra intensifica 'simple' com sentido moderado?"
    options:
      - "slowly"
      - "correctly"
      - "quite"
    answer: "quite"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: The deploy is ___ hard."
    answer: "really"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: O script inicia lentamente."
    answer: "The script starts slowly."
  - id: "6"
    type: "sentence_transformation"
    question: "Adicione 'very' na posição correta: The task is simple."
    answer: "The task is very simple."
  - id: "7"
    type: "short_production"
    question: "Escreva uma frase em inglês sobre um comando usando 'correctly'."
    answer: "Run the command correctly."
