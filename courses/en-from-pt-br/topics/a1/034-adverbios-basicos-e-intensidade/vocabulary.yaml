topic: "Adverbs básicos e intensidade"
level: "A1"
words:
  - english: "very"
    translation: "muito"
    example: "The app is very slow."
    example_translation: "O app está muito lento."
  - english: "really"
    translation: "realmente; muito"
    example: "The API is really fast."
    example_translation: "A API é realmente rápida."
  - english: "quite"
    translation: "bastante"
    example: "The setup is quite simple."
    example_translation: "O setup é bastante simples."
  - english: "too"
    translation: "demais"
    example: "The build is too slow."
    example_translation: "O build está lento demais."
  - english: "quickly"
    translation: "rapidamente"
    example: "The test runs quickly."
    example_translation: "O teste roda rapidamente."
  - english: "slowly"
    translation: "lentamente"
    example: "The script starts slowly."
    example_translation: "O script inicia lentamente."
  - english: "correctly"
    translation: "corretamente"
    example: "Run the command correctly."
    example_translation: "Rode o comando corretamente."
  - english: "fast"
    translation: "rápido"
    example: "The server is fast."
    example_translation: "O servidor é rápido."
  - english: "simple"
    translation: "simples"
    example: "The task is simple."
    example_translation: "A tarefa é simples."
  - english: "hard"
    translation: "difícil"
    example: "This bug is hard."
    example_translation: "Este bug é difícil."
