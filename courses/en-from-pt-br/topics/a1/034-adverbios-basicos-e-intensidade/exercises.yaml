topic: "Adverbs básicos e intensidade"
level: "A1"
exercises:
  - title: "Reconhecimento de advérbios"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "O que significa 'too slow'?"
        options:
          - "lento demais"
          - "muito rápido"
          - "bastante simples"
        answer: "lento demais"
      - id: "1.2"
        question: "Qual palavra significa 'rapidamente'?"
        options:
          - "slowly"
          - "quickly"
          - "correctly"
        answer: "quickly"
      - id: "1.3"
        question: "Qual opção está na ordem correta?"
        options:
          - "slow very"
          - "fast really"
          - "very slow"
        answer: "very slow"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: The API is ___ fast."
        answer: "really"
      - id: "2.2"
        question: "Complete: The script starts ___."
        answer: "slowly"
      - id: "2.3"
        question: "Complete: Run the command ___."
        answer: "correctly"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: O app está muito lento."
        answer: "The app is very slow."
      - id: "3.2"
        question: "Traduza para o inglês: O teste roda rapidamente."
        answer: "The test runs quickly."
      - id: "3.3"
        question: "Traduza para o inglês: O setup é bastante simples."
        answer: "The setup is quite simple."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Adicione intensidade com 'very': The server is fast."
        answer: "The server is very fast."
      - id: "4.2"
        question: "Adicione modo com 'correctly': The command runs."
        answer: "The command runs correctly."
      - id: "4.3"
        question: "Adicione ideia negativa com 'too': The build is slow."
        answer: "The build is too slow."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês sobre um teste usando 'quickly' ou 'slowly'."
        answer: "The test runs quickly."
