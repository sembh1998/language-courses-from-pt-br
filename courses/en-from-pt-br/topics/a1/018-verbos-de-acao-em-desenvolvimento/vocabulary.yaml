topic: "Verbos de ação em desenvolvimento"
level: "A1"
words:
  - english: "write"
    translation: "escrever"
    example: "I write code in the morning."
    example_translation: "Eu escrevo código de manhã."
  - english: "read"
    translation: "ler"
    example: "We read the documentation."
    example_translation: "Nós lemos a documentação."
  - english: "review"
    translation: "revisar"
    example: "They review pull requests."
    example_translation: "Eles revisam pull requests."
  - english: "merge"
    translation: "fazer merge; mesclar"
    example: "I merge the branch after the review."
    example_translation: "Eu faço merge da branch depois da revisão."
  - english: "push"
    translation: "enviar alterações"
    example: "You push code to the repository."
    example_translation: "Você envia código para o repositório."
  - english: "pull"
    translation: "puxar; baixar alterações"
    example: "I pull the latest changes."
    example_translation: "Eu puxo as alterações mais recentes."
  - english: "build"
    translation: "compilar; gerar build"
    example: "We build the app before the demo."
    example_translation: "Nós geramos o build do app antes da demonstração."
  - english: "test"
    translation: "testar"
    example: "They test the login page."
    example_translation: "Eles testam a página de login."
  - english: "fix"
    translation: "corrigir; consertar"
    example: "She fixes small bugs."
    example_translation: "Ela corrige bugs pequenos."
  - english: "update"
    translation: "atualizar"
    example: "I update the ticket."
    example_translation: "Eu atualizo o ticket."
  - english: "install"
    translation: "instalar"
    example: "Do you install this package?"
    example_translation: "Você instala este pacote?"
