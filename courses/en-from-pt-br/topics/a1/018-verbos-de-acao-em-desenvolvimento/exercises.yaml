topic: "Verbos de ação em desenvolvimento"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Escolha o verbo"
    instruction: "Escolha a melhor opção."
    items:
      - id: "1.1"
        question: "Como dizer 'Eu escrevo código'?"
        options:
          - "I write code."
          - "I read code."
          - "I install code."
        answer: "I write code."
      - id: "1.2"
        question: "Qual frase negativa está correta?"
        options:
          - "They no merge today."
          - "They don't merge today."
          - "They doesn't merge today."
        answer: "They don't merge today."
      - id: "1.3"
        question: "Qual pergunta está correta?"
        options:
          - "You push changes?"
          - "Does you push changes?"
          - "Do you push changes?"
        answer: "Do you push changes?"
  - type: "fill_in_the_blank"
    title: "Complete o verbo"
    instruction: "Use o verbo correto da lista: read, test, install, update."
    items:
      - id: "2.1"
        question: "I ___ the documentation before the task."
        answer: "read"
      - id: "2.2"
        question: "We ___ the app after the build."
        answer: "test"
      - id: "2.3"
        question: "Do you ___ this package?"
        answer: "install"
      - id: "2.4"
        question: "They ___ the ticket every day."
        answer: "update"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza as frases."
    items:
      - id: "3.1"
        question: "Nós revisamos código."
        answer: "We review code."
      - id: "3.2"
        question: "Ela corrige bugs pequenos."
        answer: "She fixes small bugs."
      - id: "3.3"
        question: "Você faz merge da branch?"
        answer: "Do you merge the branch?"
  - type: "transformation"
    title: "Mude a frase"
    instruction: "Transforme conforme indicado."
    items:
      - id: "4.1"
        question: "I push changes. Passe para a negativa."
        answer: "I don't push changes."
      - id: "4.2"
        question: "She reviews code. Passe para pergunta."
        answer: "Does she review code?"
      - id: "4.3"
        question: "He builds the app. Passe para a negativa."
        answer: "He doesn't build the app."
  - type: "short_production"
    title: "Produção curta"
    instruction: "Escreva uma frase simples em inglês."
    items:
      - id: "5.1"
        question: "Diga uma ação que você faz com código."
        answer: "I write code."
      - id: "5.2"
        question: "Pergunte se um colega testa o app."
        answer: "Do you test the app?"
