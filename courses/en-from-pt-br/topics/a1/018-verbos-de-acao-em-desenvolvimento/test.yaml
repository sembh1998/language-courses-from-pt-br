topic: "Verbos de ação em desenvolvimento"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Escolha a tradução de 'puxar alterações'."
    options:
      - "pull changes"
      - "push changes"
      - "build changes"
    answer: "pull changes"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase está correta com `she`?"
    options:
      - "She review tickets."
      - "She reviews tickets."
      - "She do review tickets."
    answer: "She reviews tickets."
  - id: "3"
    type: "multiple_choice"
    question: "Como perguntar 'Ele instala pacotes?'"
    options:
      - "Do he install packages?"
      - "Does he installs packages?"
      - "Does he install packages?"
    answer: "Does he install packages?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: We ___ the app before the meeting."
    answer: "build"
  - id: "5"
    type: "fill_in_the_blank"
    question: "Complete: He ___ the old bug."
    answer: "fixes"
  - id: "6"
    type: "translation"
    question: "Traduza: Eu não atualizo esse arquivo."
    answer: "I don't update this file."
  - id: "7"
    type: "translation"
    question: "Traduza: Eles leem a documentação."
    answer: "They read the documentation."
  - id: "8"
    type: "transformation"
    question: "Transforme em negativa: We push to main."
    answer: "We don't push to main."
  - id: "9"
    type: "short_answer"
    question: "Responda em inglês: Do you review code?"
    answer: "Yes, I do."
