topic: "Verbos de ação em desenvolvimento"
level: "A1"
cards:
  - front: "write code"
    back: "escrever código"
    example: "I write code every day."
    example_translation: "Eu escrevo código todos os dias."
  - front: "read the documentation"
    back: "ler a documentação"
    example: "We read the documentation first."
    example_translation: "Nós lemos a documentação primeiro."
  - front: "review code"
    back: "revisar código"
    example: "They review code on Friday."
    example_translation: "Eles revisam código na sexta-feira."
  - front: "merge the branch"
    back: "fazer merge da branch"
    example: "I merge the branch today."
    example_translation: "Eu faço merge da branch hoje."
  - front: "push changes"
    back: "enviar alterações"
    example: "You push changes to Git."
    example_translation: "Você envia alterações para o Git."
  - front: "pull changes"
    back: "puxar alterações"
    example: "I pull changes from main."
    example_translation: "Eu puxo alterações da main."
  - front: "build the app"
    back: "gerar o build do app"
    example: "We build the app now."
    example_translation: "Nós geramos o build do app agora."
  - front: "fix a bug"
    back: "corrigir um bug"
    example: "She fixes a bug."
    example_translation: "Ela corrige um bug."
