topic: "Reuniões simples e calendário"
level: "A1"
words:
  - english: "join a meeting"
    translation: "entrar em uma reunião; participar de uma reunião"
    example: "I will join the meeting at ten."
    example_translation: "Eu vou entrar na reunião às dez."
  - english: "schedule"
    translation: "agendar"
    example: "Can we schedule a meeting?"
    example_translation: "Podemos agendar uma reunião?"
  - english: "cancel"
    translation: "cancelar"
    example: "We need to cancel the meeting."
    example_translation: "Nós precisamos cancelar a reunião."
  - english: "invite"
    translation: "convite; convidar"
    example: "Please send the invite."
    example_translation: "Por favor, envie o convite."
  - english: "link"
    translation: "link"
    example: "The link is in the calendar."
    example_translation: "O link está no calendário."
  - english: "agenda"
    translation: "pauta"
    example: "The agenda has three topics."
    example_translation: "A pauta tem três tópicos."
    note: "Em reunião, não significa agenda física."
  - english: "available"
    translation: "disponível"
    example: "I am available after lunch."
    example_translation: "Estou disponível depois do almoço."
  - english: "late"
    translation: "atrasado"
    example: "I am late for the meeting."
    example_translation: "Estou atrasado para a reunião."
  - english: "reschedule"
    translation: "remarcar"
    example: "Can we reschedule the call?"
    example_translation: "Podemos remarcar a chamada?"
  - english: "calendar"
    translation: "calendário"
    example: "The meeting is on my calendar."
    example_translation: "A reunião está no meu calendário."
  - english: "call"
    translation: "chamada; ligação"
    example: "The call starts at nine."
    example_translation: "A chamada começa às nove."
  - english: "in five minutes"
    translation: "em cinco minutos"
    example: "I will join in five minutes."
    example_translation: "Eu vou entrar em cinco minutos."
