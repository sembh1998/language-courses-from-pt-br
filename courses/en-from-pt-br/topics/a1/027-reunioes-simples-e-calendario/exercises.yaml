topic: "Reuniões simples e calendário"
level: "A1"
exercises:
  - title: "Vocabulário de reunião"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual expressão significa entrar/participar de uma reunião?"
        options:
          - "join a meeting"
          - "open a meeting"
          - "write a meeting"
        answer: "join a meeting"
      - id: "1.2"
        question: "Qual palavra significa disponível?"
        options:
          - "late"
          - "available"
          - "agenda"
        answer: "available"
      - id: "1.3"
        question: "Qual frase pede o link?"
        options:
          - "Can you cancel the link?"
          - "Can you test the link?"
          - "Can you share the link?"
        answer: "Can you share the link?"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'join': I will ___ the meeting at nine."
        answer: "join"
      - id: "2.2"
        question: "Complete com 'available': I am ___ after lunch."
        answer: "available"
      - id: "2.3"
        question: "Complete com 'late': I am ___ for the call."
        answer: "late"
      - id: "2.4"
        question: "Complete com 'invite': Please send the ___."
        answer: "invite"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Eu vou entrar em cinco minutos."
        answer: "I will join in five minutes."
      - id: "3.2"
        question: "Traduza para o inglês: Podemos remarcar a reunião?"
        answer: "Can we reschedule the meeting?"
      - id: "3.3"
        question: "Traduza para o inglês: Estou disponível às duas."
        answer: "I am available at two."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija a frase: I enter in the meeting at ten."
        answer: "I join the meeting at ten."
      - id: "4.2"
        question: "Transforme em negativa: I can join today."
        answer: "I can't join today."
      - id: "4.3"
        question: "Faça um pedido com 'share the link'."
        answer: "Can you share the link?"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma mensagem dizendo que você está atrasado."
        answer: "I am late. I will join in five minutes."
      - id: "5.2"
        question: "Escreva uma frase aceitando participar de uma reunião."
        answer: "I can join the meeting."
