topic: "Reuniões simples e calendário"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase está correta para dizer que você vai entrar na reunião?"
    options:
      - "I will join the meeting."
      - "I will enter in the meeting."
      - "I will write the meeting."
    answer: "I will join the meeting."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção significa pauta de reunião?"
    options:
      - "calendar"
      - "agenda"
      - "invite"
    answer: "agenda"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase recusa uma reunião hoje?"
    options:
      - "I can join now."
      - "I am available today."
      - "I can't join today."
    answer: "I can't join today."
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: Can we ___ the call?"
    answer: "reschedule"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Por favor, envie o convite."
    answer: "Please send the invite."
  - id: "6"
    type: "sentence_transformation"
    question: "Corrija a frase: I late for the meeting."
    answer: "I am late for the meeting."
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: available / I / after lunch / am"
    answer: "I am available after lunch."
  - id: "8"
    type: "short_production"
    question: "Escreva uma pergunta em inglês para agendar uma reunião."
    answer: "Can we schedule a meeting?"
