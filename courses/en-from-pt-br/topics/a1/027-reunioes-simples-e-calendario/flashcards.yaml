cards:
  - front: "join a meeting"
    back: "entrar em uma reunião; participar de uma reunião"
    example: "I will join the meeting."
    example_translation: "Eu vou entrar na reunião."
  - front: "schedule a meeting"
    back: "agendar uma reunião"
    example: "Can we schedule a meeting?"
    example_translation: "Podemos agendar uma reunião?"
  - front: "cancel the meeting"
    back: "cancelar a reunião"
    example: "We need to cancel the meeting."
    example_translation: "Nós precisamos cancelar a reunião."
  - front: "send the invite"
    back: "enviar o convite"
    example: "Please send the invite."
    example_translation: "Por favor, envie o convite."
  - front: "share the link"
    back: "compartilhar o link"
    example: "Can you share the link?"
    example_translation: "Você pode compartilhar o link?"
  - front: "I am available."
    back: "Estou disponível."
    example: "I am available at 3 p.m."
    example_translation: "Estou disponível às 15h."
  - front: "I am late."
    back: "Estou atrasado."
    example: "I am late for the meeting."
    example_translation: "Estou atrasado para a reunião."
