cards:
  - front: "What is the task?"
    back: "Qual é a tarefa?"
    example: "What is the task for today?"
    example_translation: "Qual é a tarefa de hoje?"
  - front: "Where is the file?"
    back: "Onde está o arquivo?"
    example: "Where is the config file?"
    example_translation: "Onde está o arquivo de configuração?"
  - front: "When is the meeting?"
    back: "Quando é a reunião?"
    example: "When is the team meeting?"
    example_translation: "Quando é a reunião da equipe?"
  - front: "Who can help?"
    back: "Quem pode ajudar?"
    example: "Who can help with this bug?"
    example_translation: "Quem pode ajudar com este bug?"
