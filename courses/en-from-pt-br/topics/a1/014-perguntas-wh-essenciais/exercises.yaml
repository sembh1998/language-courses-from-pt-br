topic: "Perguntas WH essenciais"
level: "A1"
exercises:
  - title: "Escolha a palavra WH"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Para perguntar lugar, use:"
        options:
          - "where"
          - "when"
          - "who"
        answer: "where"
      - id: "1.2"
        question: "Para perguntar pessoa, use:"
        options:
          - "why"
          - "who"
          - "how"
        answer: "who"
      - id: "1.3"
        question: "Para perguntar motivo, use:"
        options:
          - "what"
          - "where"
          - "why"
        answer: "why"
  - title: "Complete"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: ___ is the meeting? At ten."
        answer: "When"
      - id: "2.2"
        question: "Complete: ___ is the file? In the folder."
        answer: "Where"
      - id: "2.3"
        question: "Complete: ___ is it slow? Because the server is old."
        answer: "Why"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza: Qual é o problema?"
        answer: "What is the problem?"
      - id: "3.2"
        question: "Traduza: Quem é o responsável?"
        answer: "Who is the owner?"
      - id: "3.3"
        question: "Traduza: Como está o aplicativo?"
        answer: "How is the app?"
  - title: "Resposta curta"
    type: "short_answer"
    items:
      - id: "4.1"
        question: "Responda em inglês: Where is the report?"
        answer: "In the folder."
      - id: "4.2"
        question: "Responda em inglês: When is the call?"
        answer: "At three."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma pergunta em inglês com `what` sobre uma tarefa."
        answer: "What is the task?"
