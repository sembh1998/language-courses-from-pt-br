topic: "E-mails e mensagens muito simples"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual é um assunto curto de e-mail?"
    options:
      - "Subject: Test results"
      - "Thanks for everything"
      - "Hello Pedro,"
    answer: "Subject: Test results"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase avisa disponibilidade?"
    options:
      - "Can you open the file?"
      - "I am free at eleven."
      - "Best regards, Sofia"
    answer: "I am free at eleven."
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção é adequada para chat curto?"
    options:
      - "Subject: Chat"
      - "Best regards, team"
      - "Hi Max, can you join?"
    answer: "Hi Max, can you join?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: Hello ___,"
    answer: "team"
  - id: "5"
    type: "translation"
    question: "Traduza: Você pode enviar o relatório?"
    answer: "Can you send the report?"
  - id: "6"
    type: "translation"
    question: "Traduza: Não estou disponível agora."
    answer: "I am not available now."
  - id: "7"
    type: "short_answer"
    question: "Escreva um encerramento simples para e-mail."
    answer: "Best regards,"
  - id: "8"
    type: "short_production"
    question: "Escreva uma mensagem curta avisando que você está livre às duas."
    answer: "Hi team, I am free at two. Thanks."
