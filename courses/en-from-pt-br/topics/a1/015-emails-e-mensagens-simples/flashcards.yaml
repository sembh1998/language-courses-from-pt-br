cards:
  - front: "Hi Ana,"
    back: "Oi, Ana,"
    example: "Hi Ana, can you check this?"
    example_translation: "Oi, Ana, você pode verificar isto?"
  - front: "Can you send the file?"
    back: "Você pode enviar o arquivo?"
    example: "Can you send the file today?"
    example_translation: "Você pode enviar o arquivo hoje?"
  - front: "I am available at three."
    back: "Estou disponível às três."
    example: "I am available at three for a call."
    example_translation: "Estou disponível às três para uma chamada."
  - front: "Best regards"
    back: "Atenciosamente"
    example: "Best regards, Marina"
    example_translation: "Atenciosamente, Marina"
