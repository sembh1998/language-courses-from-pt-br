topic: "E-mails e mensagens muito simples"
level: "A1"
exercises:
  - title: "Escolha a opção adequada"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual opção é uma saudação simples?"
        options:
          - "Hi Bruno,"
          - "Thanks."
          - "Best regards,"
        answer: "Hi Bruno,"
      - id: "1.2"
        question: "Qual opção é um encerramento formal simples?"
        options:
          - "Subject: Report"
          - "Best regards,"
          - "Can you join?"
        answer: "Best regards,"
      - id: "1.3"
        question: "Qual opção pede uma informação?"
        options:
          - "I am free now."
          - "Hello team,"
          - "Can you send the link?"
        answer: "Can you send the link?"
  - title: "Complete"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: Subject: ___ question"
        answer: "Deploy"
      - id: "2.2"
        question: "Complete: I am ___ at four."
        answer: "available"
      - id: "2.3"
        question: "Complete: ___ for your help."
        answer: "Thanks"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza: Oi, Ana, você pode verificar o ticket?"
        answer: "Hi Ana, can you check the ticket?"
      - id: "3.2"
        question: "Traduza: Estou disponível depois do almoço."
        answer: "I am available after lunch."
      - id: "3.3"
        question: "Traduza: Obrigado pela ajuda."
        answer: "Thanks for your help."
  - title: "Organização"
    type: "ordering"
    items:
      - id: "4.1"
        question: "Ordene uma mensagem: pedido, saudação, agradecimento."
        answer: "Hi Leo, can you send the report? Thanks."
      - id: "4.2"
        question: "Ordene um e-mail: assunto, saudação, corpo, encerramento."
        answer: "Subject: Meeting; Hello team,; I am available at two.; Best regards."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma mensagem curta pedindo um link."
        answer: "Hi Ana, can you send the link? Thanks."
