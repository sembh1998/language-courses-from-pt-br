topic: "Likes, preferences e escolhas de ferramentas"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Preferências simples"
    instruction: "Escolha a frase correta."
    items:
      - id: "1.1"
        question: "Como dizer 'Eu gosto de Python'?"
        options:
          - "I like Python."
          - "I like of Python."
          - "I am like Python."
        answer: "I like Python."
      - id: "1.2"
        question: "Qual frase significa 'Eu prefiro Linux'?"
        options:
          - "I use Linux."
          - "I prefer Linux."
          - "I better Linux."
        answer: "I prefer Linux."
      - id: "1.3"
        question: "Qual frase está correta para opinião simples?"
        options:
          - "This editor easier."
          - "This editor is more easy."
          - "This editor is easier."
        answer: "This editor is easier."
  - type: "fill_in_the_blank"
    title: "Complete a frase"
    instruction: "Use like, prefer, use, better ou easier."
    items:
      - id: "2.1"
        question: "I ___ JavaScript."
        answer: "like"
      - id: "2.2"
        question: "I ___ this editor every day."
        answer: "use"
      - id: "2.3"
        question: "This framework is ___."
        answer: "easier"
      - id: "2.4"
        question: "For me, Linux is ___."
        answer: "better"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza as frases."
    items:
      - id: "3.1"
        question: "Eu uso VS Code."
        answer: "I use VS Code."
      - id: "3.2"
        question: "Para mim, este framework é mais fácil."
        answer: "For me, this framework is easier."
      - id: "3.3"
        question: "Eu prefiro este sistema operacional."
        answer: "I prefer this operating system."
  - type: "transformation"
    title: "Corrija a preferência"
    instruction: "Escreva a frase correta."
    items:
      - id: "4.1"
        question: "I like of Java."
        answer: "I like Java."
      - id: "4.2"
        question: "I prefer more this editor."
        answer: "I prefer this editor."
  - type: "short_production"
    title: "Sua escolha"
    instruction: "Escreva uma preferência simples."
    items:
      - id: "5.1"
        question: "Diga uma linguagem de que você gosta."
        answer: "I like Python."
      - id: "5.2"
        question: "Diga uma ferramenta que você usa."
        answer: "I use Git."
