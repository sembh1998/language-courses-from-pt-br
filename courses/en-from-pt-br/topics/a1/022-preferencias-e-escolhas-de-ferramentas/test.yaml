topic: "Likes, preferences e escolhas de ferramentas"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Como dizer 'Eu prefiro TypeScript'?"
    options:
      - "I prefer TypeScript."
      - "I prefer more TypeScript."
      - "I am prefer TypeScript."
    answer: "I prefer TypeScript."
  - id: "2"
    type: "multiple_choice"
    question: "Como dizer 'Este editor é melhor para mim'?"
    options:
      - "This editor better for me."
      - "This editor is better for me."
      - "This editor is easier for me."
    answer: "This editor is better for me."
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase fala de uso, não preferência?"
    options:
      - "I prefer Linux."
      - "I like Linux."
      - "I use Linux."
    answer: "I use Linux."
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: I ___ this framework."
    answer: "prefer"
  - id: "5"
    type: "fill_in_the_blank"
    question: "Complete: This tool is ___ for beginners."
    answer: "easier"
  - id: "6"
    type: "translation"
    question: "Traduza: Eu gosto deste editor."
    answer: "I like this editor."
  - id: "7"
    type: "translation"
    question: "Traduza: Eu uso este sistema operacional."
    answer: "I use this operating system."
  - id: "8"
    type: "transformation"
    question: "Corrija: This framework better."
    answer: "This framework is better."
  - id: "9"
    type: "short_answer"
    question: "Responda em inglês: What language do you like?"
    answer: "I like Python."
