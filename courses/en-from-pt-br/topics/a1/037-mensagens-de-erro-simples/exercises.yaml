topic: "Leitura de mensagens de erro simples"
level: "A1"
exercises:
  - title: "Reconhecimento de mensagens"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "O que significa 'required' em uma mensagem de formulário?"
        options:
          - "obrigatório"
          - "rápido"
          - "encontrado"
        answer: "obrigatório"
      - id: "1.2"
        question: "Qual mensagem indica que algo não foi encontrado?"
        options:
          - "Invalid email"
          - "File not found"
          - "Password required"
        answer: "File not found"
      - id: "1.3"
        question: "Qual palavra indica aviso, não necessariamente erro bloqueante?"
        options:
          - "failed"
          - "missing"
          - "warning"
        answer: "warning"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: Login ___."
        answer: "failed"
      - id: "2.2"
        question: "Complete: ___ email."
        answer: "Invalid"
      - id: "2.3"
        question: "Complete: Token is ___."
        answer: "required"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o português: Missing password."
        answer: "Senha ausente."
      - id: "3.2"
        question: "Traduza para o português: Page not found."
        answer: "Página não encontrada."
  - title: "Explicação curta"
    type: "short_answer"
    items:
      - id: "4.1"
        question: "Explique em português a mensagem: Email is required."
        answer: "O e-mail é obrigatório; o usuário precisa preencher o e-mail."
      - id: "4.2"
        question: "Explique em português a mensagem: Invalid token."
        answer: "O token é inválido; é preciso verificar ou trocar o token."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma mensagem simples em inglês para dizer que o arquivo não foi encontrado."
        answer: "File not found."
