cards:
  - front: "error"
    back: "erro"
    example: "Error: file not found."
    example_translation: "Erro: arquivo não encontrado."
  - front: "warning"
    back: "aviso; alerta"
    example: "Warning: storage is low."
    example_translation: "Aviso: o armazenamento está baixo."
  - front: "failed"
    back: "falhou"
    example: "Build failed."
    example_translation: "A build falhou."
  - front: "missing"
    back: "ausente; faltando"
    example: "Missing name."
    example_translation: "Nome ausente."
  - front: "invalid"
    back: "inválido"
    example: "Invalid email."
    example_translation: "E-mail inválido."
  - front: "required"
    back: "obrigatório"
    example: "Email is required."
    example_translation: "E-mail é obrigatório."
  - front: "not found"
    back: "não encontrado"
    example: "User not found."
    example_translation: "Usuário não encontrado."
