topic: "Leitura de mensagens de erro simples"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual opção traduz 'Build failed'?"
    options:
      - "A build falhou."
      - "A build é obrigatória."
      - "A build foi encontrada."
    answer: "A build falhou."
  - id: "2"
    type: "multiple_choice"
    question: "Em 'Name is required', qual é a ação provável?"
    options:
      - "Apagar o nome"
      - "Preencher o nome"
      - "Ignorar o campo"
    answer: "Preencher o nome"
  - id: "3"
    type: "multiple_choice"
    question: "Qual palavra indica valor errado ou formato errado?"
    options:
      - "missing"
      - "required"
      - "invalid"
    answer: "invalid"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: User not ___."
    answer: "found"
  - id: "5"
    type: "translation"
    question: "Traduza para o português: Warning: disk is full."
    answer: "Aviso: o disco está cheio."
  - id: "6"
    type: "short_answer"
    question: "Explique em uma frase a mensagem: Missing API key."
    answer: "A chave de API está ausente; é preciso informar a chave."
