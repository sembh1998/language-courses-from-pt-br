topic: "Vocabulário de computador e ferramentas"
level: "A1"
words:
  - english: "laptop"
    translation: "notebook; laptop"
    example: "I use a laptop at work."
    example_translation: "Eu uso um laptop no trabalho."
  - english: "monitor"
    translation: "monitor"
    example: "She has two monitors."
    example_translation: "Ela tem dois monitores."
  - english: "terminal"
    translation: "terminal"
    example: "Open the terminal, please."
    example_translation: "Abra o terminal, por favor."
  - english: "browser"
    translation: "navegador"
    example: "The browser is open."
    example_translation: "O navegador está aberto."
  - english: "editor"
    translation: "editor"
    example: "I write code in an editor."
    example_translation: "Eu escrevo código em um editor."
  - english: "IDE"
    translation: "IDE; ambiente de desenvolvimento"
    example: "We use an IDE for Java."
    example_translation: "Nós usamos uma IDE para Java."
  - english: "repository"
    translation: "repositório"
    example: "The repository is on GitHub."
    example_translation: "O repositório está no GitHub."
  - english: "ticket"
    translation: "ticket; chamado; tarefa"
    example: "This ticket is urgent."
    example_translation: "Este ticket é urgente."
  - english: "board"
    translation: "quadro de tarefas"
    example: "The board has ten tickets."
    example_translation: "O quadro tem dez tickets."
  - english: "pipeline"
    translation: "pipeline; fluxo automatizado"
    example: "The pipeline is green."
    example_translation: "A pipeline está verde."
  - english: "software"
    translation: "software"
    example: "This software is slow."
    example_translation: "Este software está lento."
    note: "Em geral, não use `a software`; diga `software` ou `a software tool`."
  - english: "code"
    translation: "código"
    example: "The code is clean."
    example_translation: "O código está limpo."
