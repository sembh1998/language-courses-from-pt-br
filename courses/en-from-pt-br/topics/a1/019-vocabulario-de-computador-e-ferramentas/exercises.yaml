topic: "Vocabulário de computador e ferramentas"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Reconhecimento de vocabulário"
    instruction: "Escolha a melhor opção."
    items:
      - id: "1.1"
        question: "Qual palavra significa 'navegador'?"
        options:
          - "browser"
          - "board"
          - "branch"
        answer: "browser"
      - id: "1.2"
        question: "Qual frase usa plural corretamente?"
        options:
          - "She has two monitor."
          - "She has two monitors."
          - "She has a monitors."
        answer: "She has two monitors."
      - id: "1.3"
        question: "Qual opção evita o erro com `software`?"
        options:
          - "I use a software."
          - "I use two software."
          - "I use software."
        answer: "I use software."
  - type: "fill_in_the_blank"
    title: "Complete a ferramenta"
    instruction: "Complete com uma palavra em inglês."
    items:
      - id: "2.1"
        question: "Open the ___ to run a command."
        answer: "terminal"
      - id: "2.2"
        question: "The ___ has tickets."
        answer: "board"
      - id: "2.3"
        question: "The ___ is on GitHub."
        answer: "repository"
      - id: "2.4"
        question: "I write code in an ___."
        answer: "editor"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza as frases."
    items:
      - id: "3.1"
        question: "Eu uso um laptop."
        answer: "I use a laptop."
      - id: "3.2"
        question: "A pipeline está verde."
        answer: "The pipeline is green."
      - id: "3.3"
        question: "Este ticket é urgente."
        answer: "This ticket is urgent."
  - type: "transformation"
    title: "Singular e plural"
    instruction: "Transforme conforme indicado."
    items:
      - id: "4.1"
        question: "a monitor. Passe para plural com `two`."
        answer: "two monitors"
      - id: "4.2"
        question: "a ticket. Passe para plural com `three`."
        answer: "three tickets"
  - type: "short_production"
    title: "Produção curta"
    instruction: "Escreva uma frase simples."
    items:
      - id: "5.1"
        question: "Diga uma ferramenta que você usa."
        answer: "I use a browser."
