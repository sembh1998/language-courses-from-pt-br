topic: "Comparativos simples"
level: "A1"
exercises:
  - title: "Reconhecimento de comparativos"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual opção significa 'mais rápido'?"
        options:
          - "faster"
          - "harder"
          - "worse"
        answer: "faster"
      - id: "1.2"
        question: "Qual opção é o comparativo de 'good'?"
        options:
          - "gooder"
          - "better"
          - "best"
        answer: "better"
      - id: "1.3"
        question: "Qual palavra completa uma comparação direta?"
        options:
          - "then"
          - "that"
          - "than"
        answer: "than"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: This page is ___ than the old page."
        answer: "faster"
      - id: "2.2"
        question: "Complete com 'mais fácil': The setup is ___ than the first setup."
        answer: "easier"
      - id: "2.3"
        question: "Complete com 'pior': This error is ___ than the warning."
        answer: "worse"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Esta ferramenta é mais lenta do que aquela ferramenta."
        answer: "This tool is slower than that tool."
      - id: "3.2"
        question: "Traduza para o inglês: A nova solução é melhor do que a antiga solução."
        answer: "The new solution is better than the old solution."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Reescreva usando 'harder than': This task is difficult. The last task is easy."
        answer: "This task is harder than the last task."
      - id: "4.2"
        question: "Corrija a frase: This screen is more easy than the old screen."
        answer: "This screen is easier than the old screen."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase comparando duas ferramentas com 'better than'."
        answer: "This tool is better than the old tool."
