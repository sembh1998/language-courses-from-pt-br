topic: "Comparativos simples"
level: "A1"
words:
  - english: "faster"
    translation: "mais rápido"
    example: "This app is faster than the old app."
    example_translation: "Este aplicativo é mais rápido do que o aplicativo antigo."
    note: "Comparativo de `fast`."
  - english: "slower"
    translation: "mais lento"
    example: "The report page is slower than the dashboard."
    example_translation: "A página de relatório é mais lenta do que o painel."
  - english: "easier"
    translation: "mais fácil"
    example: "This setup is easier than the first setup."
    example_translation: "Esta configuração é mais fácil do que a primeira configuração."
  - english: "harder"
    translation: "mais difícil"
    example: "This bug is harder than the last bug."
    example_translation: "Este bug é mais difícil do que o último bug."
  - english: "better"
    translation: "melhor"
    example: "The new solution is better than the old solution."
    example_translation: "A nova solução é melhor do que a solução antiga."
    note: "Comparativo irregular de `good`."
  - english: "worse"
    translation: "pior"
    example: "This error is worse than the warning."
    example_translation: "Este erro é pior do que o aviso."
    note: "Comparativo irregular de `bad`."
  - english: "than"
    translation: "do que"
    example: "The new screen is easier than the old screen."
    example_translation: "A nova tela é mais fácil do que a tela antiga."
