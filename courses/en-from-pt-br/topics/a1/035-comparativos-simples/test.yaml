topic: "Comparativos simples"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase está correta para comparar velocidade?"
    options:
      - "The new site is faster than the old site."
      - "The new site is fast than old."
      - "The new site is more fast the old site."
    answer: "The new site is faster than the old site."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa: This ticket is ___ than the last ticket."
    options:
      - "hard"
      - "harder"
      - "hardest"
    answer: "harder"
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção significa 'pior'?"
    options:
      - "better"
      - "slower"
      - "worse"
    answer: "worse"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: The new menu is easier ___ the old menu."
    answer: "than"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Esta correção é melhor do que a primeira correção."
    answer: "This fix is better than the first fix."
  - id: "6"
    type: "short_production"
    question: "Escreva uma frase em inglês comparando duas telas com 'slower than'."
    answer: "The settings screen is slower than the home screen."
