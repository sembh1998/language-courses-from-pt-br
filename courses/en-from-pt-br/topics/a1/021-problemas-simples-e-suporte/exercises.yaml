topic: "Problemas simples e suporte"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Frases de suporte"
    instruction: "Escolha a frase correta."
    items:
      - id: "1.1"
        question: "Como dizer 'Não funciona'?"
        options:
          - "It doesn't work."
          - "It don't work."
          - "It not work."
        answer: "It doesn't work."
      - id: "1.2"
        question: "Qual frase está correta?"
        options:
          - "I have a error."
          - "I have an error."
          - "I has an error."
        answer: "I have an error."
      - id: "1.3"
        question: "Como pedir ajuda?"
        options:
          - "You help me?"
          - "Help me you?"
          - "Can you help me?"
        answer: "Can you help me?"
  - type: "fill_in_the_blank"
    title: "Complete a mensagem"
    instruction: "Complete com a palavra correta."
    items:
      - id: "2.1"
        question: "The page is ___."
        answer: "slow"
      - id: "2.2"
        question: "I need a password ___."
        answer: "reset"
      - id: "2.3"
        question: "I have a login ___."
        answer: "problem"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza de forma clara."
    items:
      - id: "3.1"
        question: "A página está lenta."
        answer: "The page is slow."
      - id: "3.2"
        question: "Eu preciso de suporte."
        answer: "I need support."
      - id: "3.3"
        question: "Você pode redefinir minha senha?"
        answer: "Can you reset my password?"
  - type: "transformation"
    title: "Melhore a frase"
    instruction: "Corrija a frase em inglês."
    items:
      - id: "4.1"
        question: "It don't work."
        answer: "It doesn't work."
      - id: "4.2"
        question: "I need help this error."
        answer: "I need help with this error."
  - type: "short_production"
    title: "Pedido curto"
    instruction: "Escreva uma mensagem simples de suporte."
    items:
      - id: "5.1"
        question: "Diga que você tem um erro e peça ajuda."
        answer: "I have an error. Can you help me?"
