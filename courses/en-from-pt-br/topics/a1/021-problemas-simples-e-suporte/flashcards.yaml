topic: "Problemas simples e suporte"
level: "A1"
cards:
  - front: "It doesn't work."
    back: "Não funciona."
    example: "The link doesn't work."
    example_translation: "O link não funciona."
  - front: "I have an error."
    back: "Eu tenho um erro."
    example: "I have an error in the app."
    example_translation: "Eu tenho um erro no aplicativo."
  - front: "The page is slow."
    back: "A página está lenta."
    example: "The page is slow after login."
    example_translation: "A página está lenta depois do login."
  - front: "Can you help me?"
    back: "Você pode me ajudar?"
    example: "Can you help me with this error?"
    example_translation: "Você pode me ajudar com este erro?"
  - front: "I need a password reset."
    back: "Eu preciso de uma redefinição de senha."
    example: "I need a password reset today."
    example_translation: "Eu preciso de uma redefinição de senha hoje."
  - front: "Please try again."
    back: "Por favor, tente de novo."
    example: "Please try again in one minute."
    example_translation: "Por favor, tente de novo em um minuto."
