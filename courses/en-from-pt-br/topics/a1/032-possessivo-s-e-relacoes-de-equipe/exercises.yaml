topic: "Possessivo com 's e relações de equipe"
level: "A1"
exercises:
  - title: "Reconhecimento do possessivo"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "O que significa 'Ana's branch'?"
        options:
          - "a branch da Ana"
          - "Ana é uma branch"
          - "a equipe da Ana"
        answer: "a branch da Ana"
      - id: "1.2"
        question: "Qual opção significa 'a senha do usuário'?"
        options:
          - "the user password's"
          - "the user's password"
          - "the password user"
        answer: "the user's password"
      - id: "1.3"
        question: "Qual frase está correta?"
        options:
          - "The backlog's team is full."
          - "The team backlog's is full."
          - "The team's backlog is full."
        answer: "The team's backlog is full."
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: ___ branch is ready."
        answer: "Ana's"
      - id: "2.2"
        question: "Complete: The ___ password is safe."
        answer: "user's"
      - id: "2.3"
        question: "Complete: The ___ page is slow."
        answer: "product's"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: O backlog da equipe está pronto."
        answer: "The team's backlog is ready."
      - id: "3.2"
        question: "Traduza para o inglês: A tarefa da Ana é urgente."
        answer: "Ana's task is urgent."
      - id: "3.3"
        question: "Traduza para o inglês: O nome do produto é curto."
        answer: "The product's name is short."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Transforme em possessivo com 's: the branch of Ana"
        answer: "Ana's branch"
      - id: "4.2"
        question: "Transforme em possessivo com 's: the password of the user"
        answer: "the user's password"
      - id: "4.3"
        question: "Transforme em possessivo com 's: the backlog of the team"
        answer: "the team's backlog"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês usando 'team's'."
        answer: "The team's backlog is full."
