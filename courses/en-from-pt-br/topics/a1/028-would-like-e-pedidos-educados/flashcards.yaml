topic: Modal would like e pedidos educados
level: A1
cards:
  - front: "I would like to ask a question."
    back: "Eu gostaria de fazer uma pergunta."
    example: "I would like to ask a question."
    example_translation: "Eu gostaria de fazer uma pergunta."
  - front: "Could you help me?"
    back: "Você poderia me ajudar?"
