    example_translation: "Você poderia me ajudar com este erro?"
  - front: "Can I ask a question?"
    back: "Posso fazer uma pergunta?"
    example: "Can I ask a question now?"
    example_translation: "Posso fazer uma pergunta agora?"
  - front: "Could you check this file?"
    back: "Você poderia verificar este arquivo?"
    example: "Could you check this file?"
    example_translation: "Você poderia verificar este arquivo?"
  - front: "Can you send the link?"
    back: "Você pode enviar o link?"
    example: "Can you send the link?"
    example_translation: "Você pode enviar o link?"
  - front: "I'd like to join the meeting."
    back: "Eu gostaria de participar da reunião."
    example: "I'd like to join the meeting."
    example_translation: "Eu gostaria de participar da reunião."
