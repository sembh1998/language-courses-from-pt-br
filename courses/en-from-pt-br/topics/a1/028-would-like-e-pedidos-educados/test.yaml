topic: "Modal would like e pedidos educados"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase é a mais educada para pedir ajuda?"
    options:
      - "Could you help me, please?"
      - "You help me."
      - "I help you."
    answer: "Could you help me, please?"
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa corretamente: I would like ___ understand the problem."
    options:
      - "for"
      - "to"
      - "with"
    answer: "to"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase pede para enviar o link?"
    options:
      - "Could you open the meeting?"
      - "Would like send link?"
      - "Could you send the link?"
    answer: "Could you send the link?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: ___ I ask one question?"
    answer: "Can"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Eu gostaria de perguntar sobre o ticket."
    answer: "I would like to ask about the ticket."
  - id: "6"
    type: "sentence_transformation"
    question: "Deixe mais educado: Check this line."
    answer: "Could you check this line?"
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: like / would / to ask / I / a question"
    answer: "I would like to ask a question."
  - id: "8"
    type: "short_production"
    question: "Escreva uma pergunta educada pedindo ajuda com um arquivo."
    answer: "Could you help me with this file?"
