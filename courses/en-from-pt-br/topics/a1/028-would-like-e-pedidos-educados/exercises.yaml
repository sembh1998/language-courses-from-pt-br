topic: "Modal would like e pedidos educados"
level: "A1"
exercises:
  - title: "Reconhecimento de tom"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase é um pedido educado de ajuda?"
        options:
          - "Could you help me?"
          - "I am a developer."
          - "This file is old."
        answer: "Could you help me?"
      - id: "1.2"
        question: "Qual frase significa 'Eu gostaria de fazer uma pergunta'?"
        options:
          - "I can the question."
          - "I would like to ask a question."
          - "I have the ask."
        answer: "I would like to ask a question."
      - id: "1.3"
        question: "Qual frase pede permissão para perguntar?"
        options:
          - "Could you check this file?"
          - "I would like this file."
          - "Can I ask a question?"
        answer: "Can I ask a question?"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'to': I would like ___ ask a question."
        answer: "to"
      - id: "2.2"
        question: "Complete com 'Could': ___ you check this file?"
        answer: "Could"
      - id: "2.3"
        question: "Complete com 'Can': ___ I ask a question?"
        answer: "Can"
      - id: "2.4"
        question: "Complete com 'like': I'd ___ to join the meeting."
        answer: "like"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Você poderia verificar este arquivo?"
        answer: "Could you check this file?"
      - id: "3.2"
        question: "Traduza para o inglês: Eu gostaria de entender este erro."
        answer: "I would like to understand this error."
      - id: "3.3"
        question: "Traduza para o inglês: Posso fazer uma pergunta?"
        answer: "Can I ask a question?"
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Deixe mais educado: Help me with this ticket."
        answer: "Could you help me with this ticket?"
      - id: "4.2"
        question: "Transforme usando 'would like': I want to ask about the bug."
        answer: "I would like to ask about the bug."
      - id: "4.3"
        question: "Corrija a frase: I would like ask a question."
        answer: "I would like to ask a question."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva um pedido educado de ajuda com um erro."
        answer: "Could you help me with this error?"
      - id: "5.2"
        question: "Escreva uma frase dizendo que você gostaria de entrar na reunião."
        answer: "I would like to join the meeting."
