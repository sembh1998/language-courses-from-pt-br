topic: "Conjunções básicas: and, but, or, because"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual opção soma duas ideias?"
    options:
      - "and"
      - "but"
      - "because"
    answer: "and"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase mostra contraste?"
    options:
      - "Use Git or SVN."
      - "The UI is nice, but slow."
      - "The API is fast and stable."
    answer: "The UI is nice, but slow."
  - id: "3"
    type: "multiple_choice"
    question: "Qual palavra completa: The deploy fails ___ the token is old."
    options:
      - "or"
      - "and"
      - "because"
    answer: "because"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: Choose React ___ Vue."
    answer: "or"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: O serviço é novo, mas instável."
    answer: "The service is new, but unstable."
  - id: "6"
    type: "sentence_transformation"
    question: "Una com 'and': The command is short. The command is clear."
    answer: "The command is short and clear."
  - id: "7"
    type: "short_production"
    question: "Escreva uma escolha técnica simples em inglês usando 'or'."
    answer: "Use Docker or Node."
