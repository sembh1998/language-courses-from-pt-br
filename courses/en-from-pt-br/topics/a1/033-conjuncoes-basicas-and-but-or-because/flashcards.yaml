topic: "Conjunções básicas: and, but, or, because"
level: "A1"
cards:
  - front: "and"
    back: "e"
    example: "The API is fast and stable."
    example_translation: "A API é rápida e estável."
  - front: "but"
    back: "mas"
    example: "The command is simple, but slow."
    example_translation: "O comando é simples, mas lento."
  - front: "or"
    back: "ou"
    example: "Use npm or yarn."
    example_translation: "Use npm ou yarn."
  - front: "because"
    back: "porque"
    example: "The app fails because the config is wrong."
    example_translation: "O app falha porque a configuração está errada."
  - front: "The file is missing."
    back: "O arquivo está ausente."
    example: "The test fails because the file is missing."
    example_translation: "O teste falha porque o arquivo está ausente."
