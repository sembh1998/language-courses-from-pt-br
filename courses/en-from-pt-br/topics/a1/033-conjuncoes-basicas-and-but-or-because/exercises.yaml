topic: "Conjunções básicas: and, but, or, because"
level: "A1"
exercises:
  - title: "Escolha a conjunção"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual palavra significa 'mas'?"
        options:
          - "but"
          - "and"
          - "or"
        answer: "but"
      - id: "1.2"
        question: "Qual conjunção indica causa?"
        options:
          - "or"
          - "because"
          - "and"
        answer: "because"
      - id: "1.3"
        question: "Qual opção completa uma escolha: Use npm ___ yarn."
        options:
          - "but"
          - "because"
          - "or"
        answer: "or"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: The app is fast ___ simple."
        answer: "and"
      - id: "2.2"
        question: "Complete: The build works, ___ it is slow."
        answer: "but"
      - id: "2.3"
        question: "Complete: The test fails ___ the file is missing."
        answer: "because"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: A API é rápida e estável."
        answer: "The API is fast and stable."
      - id: "3.2"
        question: "Traduza para o inglês: Use Docker ou Node."
        answer: "Use Docker or Node."
      - id: "3.3"
        question: "Traduza para o inglês: O app falha porque a configuração está errada."
        answer: "The app fails because the config is wrong."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Una com 'and': The server is small. The server is fast."
        answer: "The server is small and fast."
      - id: "4.2"
        question: "Una com 'but': The tool is old. The tool works."
        answer: "The tool is old, but it works."
      - id: "4.3"
        question: "Una com 'because': The login fails. The password is wrong."
        answer: "The login fails because the password is wrong."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês explicando um bug com 'because'."
        answer: "The bug happens because the file is missing."
