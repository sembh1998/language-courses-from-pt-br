topic: Escrever perfil profissional básico
level: A1
cards:
  - front: "I am a developer."
    back: "Eu sou desenvolvedor/desenvolvedora."
    example: "I am a backend developer."
    example_translation: "Eu sou desenvolvedor backend."
  - front: "I am based in Brazil."
    back: "Eu estou baseado no Brasil."
    example: "I am based in Porto Alegre."
    example_translation: "Eu estou baseado em Porto Alegre."
  - front: "I work with APIs."
    back: "Eu trabalho com APIs."
    example: "I work with Python and APIs."
    example_translation: "Eu trabalho com Python e APIs."
  - front: "I like automation."
    back: "Eu gosto de automação."
    example: "I like tests and automation."
    example_translation: "Eu gosto de testes e automação."
  - front: "I am learning English for work."
    back: "Eu estou aprendendo inglês para o trabalho."
    example: "I am learning English for work."
    example_translation: "Eu estou aprendendo inglês para o trabalho."
