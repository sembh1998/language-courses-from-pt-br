topic: "Escrever perfil profissional básico"
level: "A1"
exercises:
  - title: "Reconhecimento de perfil"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase apresenta um cargo corretamente?"
        options:
          - "I am a developer."
          - "I developer."
          - "I am developer."
        answer: "I am a developer."
      - id: "1.2"
        question: "Qual frase fala de localização profissional?"
        options:
          - "I like tests."
          - "I am based in Brazil."
          - "I work with React."
        answer: "I am based in Brazil."
      - id: "1.3"
        question: "Qual expressão significa 'trabalho com'?"
        options:
          - "based in"
          - "learning for"
          - "work with"
        answer: "work with"
  - title: "Complete a bio"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: I ___ a frontend developer."
        answer: "am"
      - id: "2.2"
        question: "Complete: I work ___ Python and APIs."
        answer: "with"
      - id: "2.3"
        question: "Complete: I am based ___ Brazil."
        answer: "in"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Eu gosto de testes."
        answer: "I like tests."
      - id: "3.2"
        question: "Traduza para o inglês: Eu estou aprendendo inglês para o trabalho."
        answer: "I am learning English for work."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija a frase: I am backend developer."
        answer: "I am a backend developer."
      - id: "4.2"
        question: "Transforme em frase com 'can': I read simple documentation."
        answer: "I can read simple documentation."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma mini bio com duas frases em inglês."
        answer: "I am a software developer. I work with JavaScript."
