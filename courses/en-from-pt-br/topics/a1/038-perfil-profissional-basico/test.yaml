topic: "Escrever perfil profissional básico"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase é adequada para uma bio profissional?"
    options:
      - "I am a QA engineer."
      - "I QA engineer."
      - "I am QA engineer without a."
    answer: "I am a QA engineer."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa: I work ___ Java and Spring."
    options:
      - "in"
      - "with"
      - "at"
    answer: "with"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase fala de interesse profissional?"
    options:
      - "I am based in Belo Horizonte."
      - "I can use Git."
      - "I like cloud tools."
    answer: "I like cloud tools."
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: I am ___ in Brazil."
    answer: "based"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Eu trabalho com React."
    answer: "I work with React."
  - id: "6"
    type: "short_production"
    question: "Escreva uma frase em inglês dizendo sua localização profissional."
    answer: "I am based in Brazil."
