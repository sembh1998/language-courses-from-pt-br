topic: "Escrever perfil profissional básico"
level: "A1"
words:
  - english: "bio"
    translation: "biografia curta; perfil"
    example: "My bio is short."
    example_translation: "Minha bio é curta."
  - english: "based in"
    translation: "baseado em; localizada em"
    example: "I am based in Brazil."
    example_translation: "Eu estou baseado no Brasil."
  - english: "stack"
    translation: "conjunto de tecnologias"
    example: "My stack is JavaScript and React."
    example_translation: "Minha stack é JavaScript e React."
  - english: "work with"
    translation: "trabalhar com"
    example: "I work with APIs."
    example_translation: "Eu trabalho com APIs."
  - english: "interests"
    translation: "interesses"
    example: "My interests are tests and automation."
    example_translation: "Meus interesses são testes e automação."
  - english: "learning"
    translation: "aprendendo"
    example: "I am learning English."
    example_translation: "Eu estou aprendendo inglês."
  - english: "for work"
    translation: "para o trabalho"
    example: "I use English for work."
    example_translation: "Eu uso inglês para o trabalho."
