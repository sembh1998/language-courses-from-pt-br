topic: "Leitura de documentação básica"
level: "A1"
exercises:
  - title: "Reconhecimento de seções"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "O que significa 'Requirements'?"
        options:
          - "requisitos"
          - "uso"
          - "nota"
        answer: "requisitos"
      - id: "1.2"
        question: "Qual seção normalmente ensina como instalar?"
        options:
          - "Overview"
          - "Installation"
          - "Usage"
        answer: "Installation"
      - id: "1.3"
        question: "Qual palavra indica um aviso importante?"
        options:
          - "Note"
          - "Title"
          - "Warning"
        answer: "Warning"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: Read the ___ first."
        answer: "overview"
      - id: "2.2"
        question: "Complete: The ___ section has commands."
        answer: "usage"
      - id: "2.3"
        question: "Complete: ___: this step is optional."
        answer: "Note"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Verifique os requisitos."
        answer: "Check the requirements."
      - id: "3.2"
        question: "Traduza para o inglês: Leia os passos de instalação."
        answer: "Read the installation steps."
      - id: "3.3"
        question: "Traduza para o inglês: Passe os olhos procurando comandos."
        answer: "Skim for commands."
  - title: "Identificação rápida"
    type: "short_answer"
    items:
      - id: "4.1"
        question: "Em uma documentação, onde você procuraria o comando para começar a usar a ferramenta: 'Overview' ou 'Usage'?"
        answer: "Usage"
      - id: "4.2"
        question: "Qual palavra em inglês você procura antes de executar algo arriscado: 'Warning' ou 'Overview'?"
        answer: "Warning"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase simples em inglês com 'requirements'."
        answer: "Check the requirements."
