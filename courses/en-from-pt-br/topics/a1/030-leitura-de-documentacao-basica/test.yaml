topic: "Leitura de documentação básica"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual título indica visão geral?"
    options:
      - "Overview"
      - "Warning"
      - "Step"
    answer: "Overview"
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção significa 'uso' em documentação?"
    options:
      - "Note"
      - "Usage"
      - "Requirements"
    answer: "Usage"
  - id: "3"
    type: "multiple_choice"
    question: "Qual item você deve ler com atenção por indicar risco?"
    options:
      - "List"
      - "Title"
      - "Warning"
    answer: "Warning"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: The ___ are Node and Git."
    answer: "requirements"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: A instalação é simples."
    answer: "The installation is simple."
  - id: "6"
    type: "short_answer"
    question: "Se você quer achar comandos rapidamente, qual técnica simples em inglês pode usar?"
    answer: "skim"
  - id: "7"
    type: "short_production"
    question: "Escreva uma linha curta de documentação com 'Note'."
    answer: "Note: restart the server."
