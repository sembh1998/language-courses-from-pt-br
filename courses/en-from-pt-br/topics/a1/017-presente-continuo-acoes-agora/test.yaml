topic: "Presente contínuo: o que está acontecendo agora"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Escolha a frase correta para 'Eu estou corrigindo um erro'."
    options:
      - "I am fixing an error."
      - "I fixing an error."
      - "I fix an error now."
    answer: "I am fixing an error."
  - id: "2"
    type: "multiple_choice"
    question: "Como dizer 'A página está carregando'?"
    options:
      - "The page are loading."
      - "The page is loading."
      - "The page loading."
    answer: "The page is loading."
  - id: "3"
    type: "multiple_choice"
    question: "Qual pergunta está correta?"
    options:
      - "Do they reviewing the code?"
      - "They are reviewing the code?"
      - "Are they reviewing the code?"
    answer: "Are they reviewing the code?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: We ___ updating the app now."
    answer: "are"
  - id: "5"
    type: "fill_in_the_blank"
    question: "Complete: He ___ checking the logs."
    answer: "is"
  - id: "6"
    type: "translation"
    question: "Traduza: Eles estão esperando a pipeline."
    answer: "They are waiting for the pipeline."
  - id: "7"
    type: "translation"
    question: "Traduza: Eu não estou revisando agora."
    answer: "I am not reviewing now."
  - id: "8"
    type: "transformation"
    question: "Transforme em pergunta: You are testing the login."
    answer: "Are you testing the login?"
  - id: "9"
    type: "short_answer"
    question: "Responda em inglês: What are you doing now?"
    answer: "I am debugging."
