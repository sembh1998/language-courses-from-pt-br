topic: "Presente contínuo: o que está acontecendo agora"
level: "A1"
exercises:
  - type: "multiple_choice"
    title: "Ação acontecendo agora"
    instruction: "Escolha a frase correta em inglês."
    items:
      - id: "1.1"
        question: "Como dizer 'Eu estou depurando agora'?"
        options:
          - "I am debugging now."
          - "I debugging now."
          - "I debug every day."
        answer: "I am debugging now."
      - id: "1.2"
        question: "Qual frase está correta para 'O build está rodando'?"
        options:
          - "The build are running."
          - "The build is running."
          - "The build running."
        answer: "The build is running."
      - id: "1.3"
        question: "Escolha a pergunta correta."
        options:
          - "You are testing?"
          - "Do you testing?"
          - "Are you testing?"
        answer: "Are you testing?"
  - type: "fill_in_the_blank"
    title: "Complete com am, is ou are"
    instruction: "Use o verbo auxiliar correto."
    items:
      - id: "2.1"
        question: "I ___ fixing a bug."
        answer: "am"
      - id: "2.2"
        question: "They ___ reviewing the code."
        answer: "are"
      - id: "2.3"
        question: "The pipeline ___ running."
        answer: "is"
      - id: "2.4"
        question: "We ___ waiting for the test."
        answer: "are"
  - type: "translation"
    title: "Tradução para o inglês"
    instruction: "Traduza usando presente contínuo."
    items:
      - id: "3.1"
        question: "Nós estamos testando a correção."
        answer: "We are testing the fix."
      - id: "3.2"
        question: "Ela está revisando meu código."
        answer: "She is reviewing my code."
      - id: "3.3"
        question: "Eu não estou fazendo deploy agora."
        answer: "I am not deploying now."
  - type: "transformation"
    title: "Rotina ou agora"
    instruction: "Transforme a frase para uma ação acontecendo agora."
    items:
      - id: "4.1"
        question: "I debug the app. Use 'now'."
        answer: "I am debugging the app now."
      - id: "4.2"
        question: "They test the page. Use 'now'."
        answer: "They are testing the page now."
      - id: "4.3"
        question: "The build runs. Use 'now'."
        answer: "The build is running now."
  - type: "short_production"
    title: "Status curto"
    instruction: "Escreva respostas simples em inglês. Outras respostas corretas são possíveis."
    items:
      - id: "5.1"
        question: "Diga que você está trabalhando em um ticket."
        answer: "I am working on a ticket."
      - id: "5.2"
        question: "Diga que sua equipe está testando agora."
        answer: "My team is testing now."
