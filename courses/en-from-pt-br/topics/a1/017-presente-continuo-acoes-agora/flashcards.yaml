topic: "Presente contínuo: o que está acontecendo agora"
level: "A1"
cards:
  - front: "I am debugging."
    back: "Eu estou depurando."
    example: "I am debugging the login page."
    example_translation: "Eu estou depurando a página de login."
  - front: "The build is running."
    back: "O build está rodando."
    example: "The build is running now."
    example_translation: "O build está rodando agora."
  - front: "They are testing."
    back: "Eles estão testando."
    example: "They are testing the fix."
    example_translation: "Eles estão testando a correção."
  - front: "We are reviewing."
    back: "Nós estamos revisando."
    example: "We are reviewing the pull request."
    example_translation: "Nós estamos revisando o pull request."
  - front: "Are you working now?"
    back: "Você está trabalhando agora?"
    example: "Are you working on the ticket now?"
    example_translation: "Você está trabalhando no ticket agora?"
  - front: "I am not deploying now."
    back: "Eu não estou fazendo deploy agora."
    example: "I am not deploying now; I am testing."
    example_translation: "Eu não estou fazendo deploy agora; estou testando."
