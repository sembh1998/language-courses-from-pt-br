topic: "Presente contínuo: o que está acontecendo agora"
level: "A1"
words:
  - english: "debugging"
    translation: "depurando; investigando um erro"
    example: "I am debugging the login page."
    example_translation: "Eu estou depurando a página de login."
  - english: "running"
    translation: "rodando; em execução"
    example: "The build is running now."
    example_translation: "O build está rodando agora."
  - english: "testing"
    translation: "testando"
    example: "They are testing the new fix."
    example_translation: "Eles estão testando a nova correção."
  - english: "reviewing"
    translation: "revisando"
    example: "She is reviewing my code."
    example_translation: "Ela está revisando meu código."
  - english: "deploying"
    translation: "fazendo deploy; publicando"
    example: "We are deploying a small update."
    example_translation: "Nós estamos fazendo deploy de uma pequena atualização."
  - english: "waiting"
    translation: "esperando"
    example: "I am waiting for the pipeline."
    example_translation: "Eu estou esperando a pipeline."
  - english: "now"
    translation: "agora"
    example: "The team is working now."
    example_translation: "A equipe está trabalhando agora."
  - english: "at the moment"
    translation: "no momento"
    example: "At the moment, I am fixing a bug."
    example_translation: "No momento, eu estou corrigindo um bug."
  - english: "stand-up"
    translation: "reunião rápida de status"
    example: "In the stand-up, I am sharing my status."
    example_translation: "Na stand-up, eu estou compartilhando meu status."
  - english: "status"
    translation: "status; situação atual"
    example: "My status is simple: I am testing."
    example_translation: "Meu status é simples: eu estou testando."
