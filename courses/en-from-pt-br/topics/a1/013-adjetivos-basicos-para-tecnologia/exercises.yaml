topic: "Adjetivos básicos para tecnologia"
level: "A1"
exercises:
  - title: "Reconhecimento"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual opção significa `rápido`?"
        options:
          - "fast"
          - "slow"
          - "old"
        answer: "fast"
      - id: "1.2"
        question: "Qual opção significa `privado`?"
        options:
          - "public"
          - "private"
          - "simple"
        answer: "private"
      - id: "1.3"
        question: "Qual frase tem ordem correta?"
        options:
          - "a tool new"
          - "a file private"
          - "a new tool"
        answer: "a new tool"
  - title: "Complete"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com `easy`: This task is ___."
        answer: "easy"
      - id: "2.2"
        question: "Complete com `complex`: It is a ___ problem."
        answer: "complex"
      - id: "2.3"
        question: "Complete com `safe`: This password is ___."
        answer: "safe"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza: um sistema lento"
        answer: "a slow system"
      - id: "3.2"
        question: "Traduza: uma ferramenta simples"
        answer: "a simple tool"
      - id: "3.3"
        question: "Traduza: O arquivo é público."
        answer: "The file is public."
  - title: "Correção"
    type: "correction"
    items:
      - id: "4.1"
        question: "Corrija: a server old"
        answer: "an old server"
      - id: "4.2"
        question: "Corrija: privates files"
        answer: "private files"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês sobre um aplicativo lento."
        answer: "The app is slow."
