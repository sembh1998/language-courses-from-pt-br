topic: This, that, these, those na interface
level: A1
cards:
  - front: "this file"
    back: "este arquivo"
    example: "This file is open."
    example_translation: "Este arquivo está aberto."
  - front: "that button"
    back: "aquele botão"
    example: "Click that button."
    example_translation: "Clique naquele botão."
  - front: "these lines"
    back: "estas linhas"
    example: "These lines are important."
    example_translation: "Estas linhas são importantes."
  - front: "those logs"
    back: "aqueles logs"
    example: "Those logs are old."
    example_translation: "Aqueles logs são antigos."
  - front: "this bug"
    back: "este bug"
    example: "This bug is urgent."
    example_translation: "Este bug é urgente."
  - front: "that document"
    back: "aquele documento"
    example: "That document is useful."
    example_translation: "Aquele documento é útil."
