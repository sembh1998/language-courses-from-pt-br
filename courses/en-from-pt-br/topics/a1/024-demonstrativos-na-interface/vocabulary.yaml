topic: "This, that, these, those na interface"
level: "A1"
words:
  - english: "this"
    translation: "este; esta; isto"
    example: "This file is open."
    example_translation: "Este arquivo está aberto."
    note: "Singular e perto."
  - english: "that"
    translation: "aquele; aquela; isso"
    example: "That button is blue."
    example_translation: "Aquele botão é azul."
    note: "Singular e mais longe ou já mencionado."
  - english: "these"
    translation: "estes; estas"
    example: "These lines are new."
    example_translation: "Estas linhas são novas."
    note: "Plural e perto."
  - english: "those"
    translation: "aqueles; aquelas"
    example: "Those logs are old."
    example_translation: "Aqueles logs são antigos."
    note: "Plural e mais longe."
  - english: "bug"
    translation: "bug; erro de software"
    example: "This bug is important."
    example_translation: "Este bug é importante."
  - english: "line"
    translation: "linha"
    example: "These lines are in the function."
    example_translation: "Estas linhas estão na função."
  - english: "button"
    translation: "botão"
    example: "Click that button."
    example_translation: "Clique naquele botão."
  - english: "logs"
    translation: "logs; registros"
    example: "Those logs show an error."
    example_translation: "Aqueles logs mostram um erro."
  - english: "screen"
    translation: "tela"
    example: "This screen is simple."
    example_translation: "Esta tela é simples."
  - english: "document"
    translation: "documento"
    example: "That document is in the folder."
    example_translation: "Aquele documento está na pasta."
  - english: "selected"
    translation: "selecionado"
    example: "These selected lines are important."
    example_translation: "Estas linhas selecionadas são importantes."
  - english: "open"
    translation: "aberto"
    example: "This file is open."
    example_translation: "Este arquivo está aberto."
