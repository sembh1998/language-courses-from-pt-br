topic: "This, that, these, those na interface"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase está correta para um arquivo perto?"
    options:
      - "This file is new."
      - "These file is new."
      - "Those file is new."
    answer: "This file is new."
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa corretamente: ___ errors are from the server."
    options:
      - "That"
      - "Those"
      - "This"
    answer: "Those"
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção combina com singular e longe?"
    options:
      - "these buttons"
      - "this buttons"
      - "that button"
    answer: "that button"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: ___ lines are selected."
    answer: "These"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Aquele bug é urgente."
    answer: "That bug is urgent."
  - id: "6"
    type: "sentence_transformation"
    question: "Transforme para plural perto: This test is slow."
    answer: "These tests are slow."
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: are / old / Those / files"
    answer: "Those files are old."
  - id: "8"
    type: "short_production"
    question: "Escreva uma instrução curta em inglês com 'this button'."
    answer: "Click this button."
