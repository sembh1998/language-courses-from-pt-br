topic: "This, that, these, those na interface"
level: "A1"
exercises:
  - title: "Escolha o demonstrativo"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual opção combina com singular e perto?"
        options:
          - "this file"
          - "these file"
          - "those file"
        answer: "this file"
      - id: "1.2"
        question: "Qual opção combina com plural e perto?"
        options:
          - "that lines"
          - "these lines"
          - "this lines"
        answer: "these lines"
      - id: "1.3"
        question: "Qual opção combina com plural e longe?"
        options:
          - "this logs"
          - "that logs"
          - "those logs"
        answer: "those logs"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'this': ___ button is green."
        answer: "This"
      - id: "2.2"
        question: "Complete com 'those': ___ files are old."
        answer: "Those"
      - id: "2.3"
        question: "Complete com 'these': ___ tests are failing."
        answer: "These"
      - id: "2.4"
        question: "Complete com 'that': ___ bug is in production."
        answer: "That"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Este arquivo está aberto."
        answer: "This file is open."
      - id: "3.2"
        question: "Traduza para o inglês: Aquelas linhas são antigas."
        answer: "Those lines are old."
      - id: "3.3"
        question: "Traduza para o inglês: Estes logs são úteis."
        answer: "These logs are useful."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Transforme para plural perto: This line is important."
        answer: "These lines are important."
      - id: "4.2"
        question: "Transforme para singular longe: These buttons are blue."
        answer: "That button is blue."
      - id: "4.3"
        question: "Corrija a frase: This logs are useful."
        answer: "These logs are useful."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês apontando para um botão perto."
        answer: "This button is important."
      - id: "5.2"
        question: "Escreva uma frase em inglês apontando para logs longe."
        answer: "Those logs are from yesterday."
