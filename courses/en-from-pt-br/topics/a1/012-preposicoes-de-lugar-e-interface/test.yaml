topic: "Preposições de lugar e interface"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase é natural para localização em uma pasta?"
    options:
      - "The image is in the folder."
      - "The image is on the folder."
      - "The image is at the folder."
    answer: "The image is in the folder."
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase localiza um link em uma página?"
    options:
      - "The link is in the page."
      - "The link is on the page."
      - "The link is under the page."
    answer: "The link is on the page."
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção significa `entre dois campos`?"
    options:
      - "next to two fields"
      - "under two fields"
      - "between two fields"
    answer: "between two fields"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: The footer is ___ the bottom."
    answer: "at"
  - id: "5"
    type: "translation"
    question: "Traduza: O botão está ao lado do campo."
    answer: "The button is next to the field."
  - id: "6"
    type: "translation"
    question: "Traduza: O notebook está embaixo da mesa."
    answer: "The laptop is under the desk."
  - id: "7"
    type: "correction"
    question: "Corrija: The title is in the top."
    answer: "The title is at the top."
  - id: "8"
    type: "short_answer"
    question: "Escreva uma frase com `between` sobre um menu."
    answer: "The menu is between the logo and the button."
