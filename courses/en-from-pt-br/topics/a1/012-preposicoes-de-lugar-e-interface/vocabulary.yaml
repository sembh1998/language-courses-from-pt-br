topic: "Preposições de lugar e interface"
level: "A1"
words:
  - english: "in"
    translation: "em, dentro de"
    example: "The file is in the folder."
    example_translation: "O arquivo está na pasta."
  - english: "on"
    translation: "em, sobre"
    example: "The button is on the page."
    example_translation: "O botão está na página."
  - english: "at"
    translation: "em, no ponto de"
    example: "The menu is at the top."
    example_translation: "O menu está no topo."
  - english: "under"
    translation: "embaixo de"
    example: "The cable is under the desk."
    example_translation: "O cabo está embaixo da mesa."
  - english: "next to"
    translation: "ao lado de"
    example: "The icon is next to the button."
    example_translation: "O ícone está ao lado do botão."
  - english: "between"
    translation: "entre"
    example: "The text is between two images."
    example_translation: "O texto está entre duas imagens."
  - english: "top"
    translation: "topo"
    example: "The title is at the top."
    example_translation: "O título está no topo."
  - english: "page"
    translation: "página"
    example: "There is a form on the page."
    example_translation: "Há um formulário na página."
  - english: "button"
    translation: "botão"
    example: "The button is next to the field."
    example_translation: "O botão está ao lado do campo."
  - english: "search bar"
    translation: "barra de busca"
    example: "The icon is in the search bar."
    example_translation: "O ícone está na barra de busca."
