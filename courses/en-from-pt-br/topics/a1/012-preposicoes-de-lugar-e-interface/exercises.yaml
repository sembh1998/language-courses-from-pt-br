topic: "Preposições de lugar e interface"
level: "A1"
exercises:
  - title: "Escolha a preposição"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual opção completa: The file is ___ the folder?"
        options:
          - "in"
          - "on"
          - "under"
        answer: "in"
      - id: "1.2"
        question: "Qual opção completa: The button is ___ the page?"
        options:
          - "at"
          - "on"
          - "between"
        answer: "on"
      - id: "1.3"
        question: "Qual opção completa: The title is ___ the top?"
        options:
          - "in"
          - "under"
          - "at"
        answer: "at"
  - title: "Complete"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: The cable is ___ the desk."
        answer: "under"
      - id: "2.2"
        question: "Complete: The icon is ___ to the button."
        answer: "next"
      - id: "2.3"
        question: "Complete: The menu is ___ the logo and the form."
        answer: "between"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza: O arquivo está na pasta."
        answer: "The file is in the folder."
      - id: "3.2"
        question: "Traduza: O botão está na página."
        answer: "The button is on the page."
      - id: "3.3"
        question: "Traduza: O menu está no topo."
        answer: "The menu is at the top."
  - title: "Correção"
    type: "correction"
    items:
      - id: "4.1"
        question: "Corrija: The file is on the folder."
        answer: "The file is in the folder."
      - id: "4.2"
        question: "Corrija: The button is in the page."
        answer: "The button is on the page."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase sobre um ícone usando `next to`."
        answer: "The icon is next to the button."
