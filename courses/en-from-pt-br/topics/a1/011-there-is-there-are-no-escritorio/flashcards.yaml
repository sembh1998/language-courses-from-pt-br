cards:
  - front: "There is a bug."
    back: "Há um bug."
    example: "There is a bug in the login page."
    example_translation: "Há um bug na página de login."
  - front: "There are three files."
    back: "Há três arquivos."
    example: "There are three files in this folder."
    example_translation: "Há três arquivos nesta pasta."
  - front: "Are there any errors?"
    back: "Há algum erro?"
    example: "Are there any errors in the report?"
    example_translation: "Há algum erro no relatório?"
  - front: "There aren't any tickets."
    back: "Não há tickets."
    example: "There aren't any tickets today."
    example_translation: "Não há tickets hoje."
