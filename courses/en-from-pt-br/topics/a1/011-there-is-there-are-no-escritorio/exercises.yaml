topic: "There is/there are no escritório e no sistema"
level: "A1"
exercises:
  - title: "Escolha a forma correta"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase está correta para uma coisa?"
        options:
          - "There is a bug."
          - "There are a bug."
          - "There be a bug."
        answer: "There is a bug."
      - id: "1.2"
        question: "Qual frase está correta para plural?"
        options:
          - "There is two files."
          - "There are two files."
          - "There has two files."
        answer: "There are two files."
      - id: "1.3"
        question: "Qual pergunta usa `any` naturalmente?"
        options:
          - "Is there some error?"
          - "Are there some errors?"
          - "Are there any errors?"
        answer: "Are there any errors?"
  - title: "Complete"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: There ___ a printer in the room."
        answer: "is"
      - id: "2.2"
        question: "Complete: There ___ five tickets today."
        answer: "are"
      - id: "2.3"
        question: "Complete: There aren't ___ warnings now."
        answer: "any"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza: Há um arquivo na pasta."
        answer: "There is a file in the folder."
      - id: "3.2"
        question: "Traduza: Há alguns comentários no código."
        answer: "There are some comments in the code."
      - id: "3.3"
        question: "Traduza: Não há erros."
        answer: "There aren't any errors."
  - title: "Transformação"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Transforme em pergunta: There is a meeting room."
        answer: "Is there a meeting room?"
      - id: "4.2"
        question: "Transforme em negativa: There are bugs."
        answer: "There aren't any bugs."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase sobre sua tela usando `There is`."
        answer: "There is a browser on my screen."
