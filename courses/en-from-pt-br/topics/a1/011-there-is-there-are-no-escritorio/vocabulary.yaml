topic: "There is/there are no escritório e no sistema"
level: "A1"
words:
  - english: "there is"
    translation: "há, existe"
    example: "There is a bug."
    example_translation: "Há um bug."
    note: "Use com singular."
  - english: "there are"
    translation: "há, existem"
    example: "There are three files."
    example_translation: "Há três arquivos."
    note: "Use com plural."
  - english: "bug"
    translation: "erro de software, bug"
    example: "There is a bug in the app."
    example_translation: "Há um bug no aplicativo."
  - english: "file"
    translation: "arquivo"
    example: "There is a file in the folder."
    example_translation: "Há um arquivo na pasta."
  - english: "folder"
    translation: "pasta"
    example: "There are some files in the folder."
    example_translation: "Há alguns arquivos na pasta."
  - english: "error"
    translation: "erro"
    example: "There aren't any errors."
    example_translation: "Não há erros."
  - english: "some"
    translation: "alguns, algumas"
    example: "There are some tickets."
    example_translation: "Há alguns tickets."
    note: "Comum em afirmativas."
  - english: "any"
    translation: "algum, alguns, nenhum"
    example: "Are there any tests?"
    example_translation: "Há testes?"
    note: "Comum em perguntas e negativas."
  - english: "office"
    translation: "escritório"
    example: "There are two desks in the office."
    example_translation: "Há duas mesas no escritório."
  - english: "meeting room"
    translation: "sala de reunião"
    example: "Is there a meeting room?"
    example_translation: "Há uma sala de reunião?"
