topic: "There is/there are no escritório e no sistema"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase descreve um problema no singular?"
    options:
      - "There is an issue."
      - "There are an issue."
      - "There issue is."
    answer: "There is an issue."
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase usa plural corretamente?"
    options:
      - "There is four tabs."
      - "There are four tabs."
      - "There be four tabs."
    answer: "There are four tabs."
  - id: "3"
    type: "multiple_choice"
    question: "Qual negativa está natural?"
    options:
      - "There aren't some tests."
      - "There are not some tests."
      - "There aren't any tests."
    answer: "There aren't any tests."
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: ___ there any messages?"
    answer: "Are"
  - id: "5"
    type: "translation"
    question: "Traduza: Há duas reuniões hoje."
    answer: "There are two meetings today."
  - id: "6"
    type: "translation"
    question: "Traduza: Não há impressora aqui."
    answer: "There isn't a printer here."
  - id: "7"
    type: "short_answer"
    question: "Escreva uma pergunta sobre arquivos usando `any`."
    answer: "Are there any files?"
  - id: "8"
    type: "sentence_transformation"
    question: "Passe para o plural: There is a monitor."
    answer: "There are monitors."
