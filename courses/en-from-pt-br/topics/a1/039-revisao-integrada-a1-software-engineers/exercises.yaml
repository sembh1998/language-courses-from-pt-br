topic: "Revisão integrada A1 para software engineers"
level: "A1"
exercises:
  - title: "Revisão de estruturas"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase apresenta uma pessoa corretamente?"
        options:
          - "I am a software engineer."
          - "I a software engineer."
          - "I am work engineer."
        answer: "I am a software engineer."
      - id: "1.2"
        question: "Qual frase pede ajuda?"
        options:
          - "Open the terminal."
          - "Can you help me?"
          - "The app is online."
        answer: "Can you help me?"
      - id: "1.3"
        question: "Qual frase é um imperativo?"
        options:
          - "I can read docs."
          - "The build is green."
          - "Check the logs."
        answer: "Check the logs."
  - title: "Complete o onboarding"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: I ___ new on the team."
        answer: "am"
      - id: "2.2"
        question: "Complete: I ___ with Python."
        answer: "work"
      - id: "2.3"
        question: "Complete: Can you ___ me?"
        answer: "help"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Execute o comando."
        answer: "Run the command."
      - id: "3.2"
        question: "Traduza para o inglês: A build falhou."
        answer: "The build failed."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija: I am work with JavaScript."
        answer: "I work with JavaScript."
      - id: "4.2"
        question: "Transforme em pergunta com 'can': You help me."
        answer: "Can you help me?"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva três frases de onboarding: apresentação, stack e pedido de ajuda."
        answer: "I am a developer. I work with React. Can you help me?"
