topic: "Revisão integrada A1 para software engineers"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual opção completa: The server ___ online."
    options:
      - "is"
      - "can"
      - "run"
    answer: "is"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase descreve rotina de trabalho?"
    options:
      - "Push the code."
      - "I review pull requests."
      - "Can I join?"
    answer: "I review pull requests."
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção é uma instrução de setup?"
    options:
      - "I am from Brazil."
      - "The password is invalid."
      - "Install the package."
    answer: "Install the package."
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: I can ___ simple documentation."
    answer: "read"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Verifique os logs."
    answer: "Check the logs."
  - id: "6"
    type: "short_answer"
    question: "Explique em português a frase: The token is missing."
    answer: "O token está ausente; é preciso informar ou configurar o token."
