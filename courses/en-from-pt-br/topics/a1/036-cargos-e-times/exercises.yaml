topic: "Vocabulário de cargos e times"
level: "A1"
exercises:
  - title: "Reconhecimento de cargos"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Quem geralmente escreve código?"
        options:
          - "a developer"
          - "a customer"
          - "a stakeholder"
        answer: "a developer"
      - id: "1.2"
        question: "Qual cargo normalmente planeja o roadmap?"
        options:
          - "QA"
          - "a product manager"
          - "support"
        answer: "a product manager"
      - id: "1.3"
        question: "Quem geralmente cria telas?"
        options:
          - "DevOps"
          - "support"
          - "a designer"
        answer: "a designer"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: A ___ writes code."
        answer: "developer"
      - id: "2.2"
        question: "Complete: Support helps ___."
        answer: "customers"
      - id: "2.3"
        question: "Complete: QA ___ the app."
        answer: "tests"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Um designer cria telas."
        answer: "A designer creates screens."
      - id: "3.2"
        question: "Traduza para o inglês: Um stakeholder dá feedback."
        answer: "A stakeholder gives feedback."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija a frase: She is developer."
        answer: "She is a developer."
      - id: "4.2"
        question: "Transforme para singular: Developers write code."
        answer: "A developer writes code."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês explicando o que DevOps faz."
        answer: "DevOps manages the deploy."
