topic: "Have/has e partes de sistemas"
level: "A1"
exercises:
  - title: "Escolha have ou has"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase está correta?"
        options:
          - "The app has a login page."
          - "The app have a login page."
          - "The app does has a login page."
        answer: "The app has a login page."
      - id: "1.2"
        question: "Qual opção completa: We ___ two services."
        options:
          - "has"
          - "have"
          - "does have"
        answer: "have"
      - id: "1.3"
        question: "Qual pergunta está correta?"
        options:
          - "Does it has a cache?"
          - "Has it a cache?"
          - "Does it have a cache?"
        answer: "Does it have a cache?"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete: They ___ access."
        answer: "have"
      - id: "2.2"
        question: "Complete: The server ___ a problem."
        answer: "has"
      - id: "2.3"
        question: "Complete: Does the API ___ an error?"
        answer: "have"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Nós temos um backup."
        answer: "We have a backup."
      - id: "3.2"
        question: "Traduza para o inglês: O componente tem um problema."
        answer: "The component has a problem."
      - id: "3.3"
        question: "Traduza para o inglês: O sistema não tem cache."
        answer: "The system does not have a cache."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Transforme em pergunta: The app has a new feature."
        answer: "Does the app have a new feature?"
      - id: "4.2"
        question: "Transforme em negativa: We have a test server."
        answer: "We do not have a test server."
      - id: "4.3"
        question: "Transforme para 'they': It has access."
        answer: "They have access."
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês sobre um app usando 'has'."
        answer: "The app has a login page."
