topic: "Have/has e partes de sistemas"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual opção completa: The database ___ a backup."
    options:
      - "has"
      - "have"
      - "do have"
    answer: "has"
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase negativa está correta?"
    options:
      - "The API does not has logs."
      - "The API does not have logs."
      - "The API not have logs."
    answer: "The API does not have logs."
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção completa: Do you ___ access?"
    options:
      - "has"
      - "having"
      - "have"
    answer: "have"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: The project ___ three components."
    answer: "has"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Eles têm dois problemas."
    answer: "They have two problems."
  - id: "6"
    type: "sentence_transformation"
    question: "Transforme em pergunta: The app has dark mode."
    answer: "Does the app have dark mode?"
  - id: "7"
    type: "short_production"
    question: "Escreva uma frase em inglês sobre um serviço usando 'have'."
    answer: "We have a payment service."
