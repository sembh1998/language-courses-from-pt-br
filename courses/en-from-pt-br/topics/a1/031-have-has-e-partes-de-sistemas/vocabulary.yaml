topic: "Have/has e partes de sistemas"
level: "A1"
words:
  - english: "have"
    translation: "ter"
    example: "We have two services."
    example_translation: "Nós temos dois serviços."
  - english: "has"
    translation: "tem"
    example: "The app has a login page."
    example_translation: "O app tem uma página de login."
  - english: "login page"
    translation: "página de login"
    example: "The system has a login page."
    example_translation: "O sistema tem uma página de login."
  - english: "service"
    translation: "serviço"
    example: "We have a payment service."
    example_translation: "Nós temos um serviço de pagamento."
  - english: "component"
    translation: "componente"
    example: "This component has a problem."
    example_translation: "Este componente tem um problema."
  - english: "feature"
    translation: "recurso; funcionalidade"
    example: "The app has a new feature."
    example_translation: "O app tem uma nova funcionalidade."
  - english: "problem"
    translation: "problema"
    example: "The server has a problem."
    example_translation: "O servidor tem um problema."
  - english: "backup"
    translation: "cópia de segurança; backup"
    example: "Do we have a backup?"
    example_translation: "Nós temos um backup?"
  - english: "access"
    translation: "acesso"
    example: "They do not have access."
    example_translation: "Eles não têm acesso."
  - english: "cache"
    translation: "cache"
    example: "The system has a cache."
    example_translation: "O sistema tem cache."
