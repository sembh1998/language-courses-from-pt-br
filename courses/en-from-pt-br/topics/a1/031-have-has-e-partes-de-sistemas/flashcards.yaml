topic: "Have/has e partes de sistemas"
level: "A1"
cards:
  - front: "We have two services."
    back: "Nós temos dois serviços."
    example: "We have two services and one API."
    example_translation: "Nós temos dois serviços e uma API."
  - front: "The app has a login page."
    back: "O app tem uma página de login."
    example: "The app has a login page."
    example_translation: "O app tem uma página de login."
  - front: "Does it have a bug?"
    back: "Isso tem um bug?"
    example: "Does it have a bug today?"
    example_translation: "Isso tem um bug hoje?"
  - front: "It does not have access."
    back: "Isso não tem acesso."
    example: "It does not have access to the database."
    example_translation: "Isso não tem acesso ao banco de dados."
  - front: "feature"
    back: "recurso; funcionalidade"
    example: "This feature is ready."
    example_translation: "Esta funcionalidade está pronta."
