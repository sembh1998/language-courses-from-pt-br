topic: "Pedir repetição, esclarecimento e ajuda"
level: "A1"
exercises:
  - title: "Reconhecimento de intenção"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual frase pede repetição?"
        options:
          - "Can you repeat?"
          - "I have a laptop."
          - "The file is open."
        answer: "Can you repeat?"
      - id: "1.2"
        question: "Qual frase pede para a pessoa falar devagar?"
        options:
          - "Can you write code?"
          - "Can you speak slowly?"
          - "Can you join now?"
        answer: "Can you speak slowly?"
      - id: "1.3"
        question: "Qual frase pergunta significado?"
        options:
          - "I need a ticket."
          - "This file is old."
          - "What does it mean?"
        answer: "What does it mean?"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'repeat': Can you ___?"
        answer: "repeat"
      - id: "2.2"
        question: "Complete com 'slowly': Can you speak ___?"
        answer: "slowly"
      - id: "2.3"
        question: "Complete com 'understand': I don't ___ this error."
        answer: "understand"
      - id: "2.4"
        question: "Complete com 'help': Can you ___ me?"
        answer: "help"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Você pode repetir?"
        answer: "Can you repeat?"
      - id: "3.2"
        question: "Traduza para o inglês: Eu não entendo este erro."
        answer: "I don't understand this error."
      - id: "3.3"
        question: "Traduza para o inglês: Você pode escrever isso no chat?"
        answer: "Can you write it in the chat?"
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija a pergunta: What means deploy?"
        answer: "What does deploy mean?"
      - id: "4.2"
        question: "Deixe mais educado: Repeat."
        answer: "Can you repeat, please?"
      - id: "4.3"
        question: "Transforme em pedido de ajuda com erro: Help me."
        answer: "Can you help me with this error?"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase pedindo para falar devagar."
        answer: "Can you speak slowly, please?"
      - id: "5.2"
        question: "Escreva uma frase perguntando o significado de 'branch'."
        answer: "What does branch mean?"
