topic: "Pedir repetição, esclarecimento e ajuda"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase é uma forma curta de pedir repetição?"
    options:
      - "Sorry?"
      - "Today?"
      - "Ready?"
    answer: "Sorry?"
  - id: "2"
    type: "multiple_choice"
    question: "Qual opção completa: Can you ___ slowly?"
    options:
      - "repeat"
      - "speak"
      - "help"
    answer: "speak"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase é correta para perguntar significado de 'merge'?"
    options:
      - "What means merge?"
      - "What merge does mean?"
      - "What does merge mean?"
    answer: "What does merge mean?"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete: I don't ___ this message."
    answer: "understand"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: Você pode me ajudar com esta tarefa?"
    answer: "Can you help me with this task?"
  - id: "6"
    type: "sentence_transformation"
    question: "Deixe mais específico: I need help."
    answer: "I need help with this error."
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: write / Can / in the chat / it / you"
    answer: "Can you write it in the chat?"
  - id: "8"
    type: "short_production"
    question: "Escreva uma frase para ganhar tempo em uma reunião."
    answer: "One moment, please."
