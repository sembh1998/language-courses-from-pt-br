topic: Pedir repetição, esclarecimento e ajuda
level: A1
cards:
  - front: "Sorry?"
    back: "Desculpa? Pode repetir?"
    example: "Sorry? Can you repeat?"
    example_translation: "Desculpa? Você pode repetir?"
  - front: "Can you repeat?"
    back: "Você pode repetir?"
    example: "Can you repeat the question?"
    example_translation: "Você pode repetir a pergunta?"
  - front: "Can you speak slowly?"
    back: "Você pode falar devagar?"
    example: "Can you speak slowly, please?"
    example_translation: "Você pode falar devagar, por favor?"
  - front: "What does it mean?"
    back: "O que isso significa?"
    example: "What does this error mean?"
    example_translation: "O que este erro significa?"
  - front: "I don't understand this error."
    back: "Eu não entendo este erro."
    example: "I don't understand this error."
    example_translation: "Eu não entendo este erro."
  - front: "Can you help me?"
    back: "Você pode me ajudar?"
    example: "Can you help me with this task?"
    example_translation: "Você pode me ajudar com esta tarefa?"
