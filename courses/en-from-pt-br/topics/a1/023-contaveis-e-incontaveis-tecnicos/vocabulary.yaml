topic: "Countable e uncountable em contexto técnico"
level: "A1"
words:
  - english: "a file"
    translation: "um arquivo"
    example: "I opened a file."
    example_translation: "Eu abri um arquivo."
    note: "Contável; pode virar `files`."
  - english: "an issue"
    translation: "uma issue; um problema"
    example: "We have an issue in production."
    example_translation: "Nós temos um problema em produção."
    note: "Contável; pode virar `issues`."
  - english: "some code"
    translation: "algum código"
    example: "I need some code for the test."
    example_translation: "Eu preciso de algum código para o teste."
    note: "Normalmente incontável quando falamos de código em geral."
  - english: "information"
    translation: "informação; informações"
    example: "This information is useful."
    example_translation: "Esta informação é útil."
    note: "Não use `informations`."
  - english: "data"
    translation: "dados"
    example: "The data is in the database."
    example_translation: "Os dados estão no banco de dados."
    note: "Em A1, trate como incontável no uso técnico geral."
  - english: "software"
    translation: "software; programas"
    example: "This software is new."
    example_translation: "Este software é novo."
    note: "Não use `a software` nem `softwares`."
  - english: "many"
    translation: "muitos; muitas"
    example: "There are many files in the folder."
    example_translation: "Há muitos arquivos na pasta."
    note: "Use com contáveis no plural."
  - english: "much"
    translation: "muito; muita"
    example: "We do not have much information."
    example_translation: "Nós não temos muita informação."
    note: "Use com incontáveis."
  - english: "some"
    translation: "algum; alguns; um pouco de"
    example: "I have some data for the report."
    example_translation: "Eu tenho alguns dados para o relatório."
  - english: "line"
    translation: "linha"
    example: "There are many lines in this file."
    example_translation: "Há muitas linhas neste arquivo."
  - english: "button"
    translation: "botão"
    example: "The page has two buttons."
    example_translation: "A página tem dois botões."
  - english: "folder"
    translation: "pasta"
    example: "This folder has many files."
    example_translation: "Esta pasta tem muitos arquivos."
