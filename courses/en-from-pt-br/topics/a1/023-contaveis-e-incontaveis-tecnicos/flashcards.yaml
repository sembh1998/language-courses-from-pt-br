cards:
  - front: "a file"
    back: "um arquivo"
    example: "I opened a file."
    example_translation: "Eu abri um arquivo."
  - front: "an issue"
    back: "uma issue; um problema"
    example: "We have an issue."
    example_translation: "Nós temos um problema."
  - front: "some code"
    back: "algum código"
    example: "I need some code."
    example_translation: "Eu preciso de algum código."
  - front: "information"
    back: "informação; informações"
    example: "This information is useful."
    example_translation: "Esta informação é útil."
  - front: "software"
    back: "software; programas"
    example: "This software is free."
    example_translation: "Este software é gratuito."
  - front: "many files"
    back: "muitos arquivos"
    example: "There are many files."
    example_translation: "Há muitos arquivos."
  - front: "much data"
    back: "muitos dados; muita quantidade de dados"
    example: "We have much data."
    example_translation: "Nós temos muitos dados."
