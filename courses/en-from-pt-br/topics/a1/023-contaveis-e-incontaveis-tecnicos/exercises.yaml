topic: "Countable e uncountable em contexto técnico"
level: "A1"
exercises:
  - title: "Reconhecimento de contáveis e incontáveis"
    type: "multiple_choice"
    items:
      - id: "1.1"
        question: "Qual opção é contável em inglês?"
        options:
          - "file"
          - "information"
          - "software"
        answer: "file"
      - id: "1.2"
        question: "Qual opção completa corretamente: I need ___ information."
        options:
          - "a"
          - "some"
          - "many"
        answer: "some"
      - id: "1.3"
        question: "Qual opção é a forma correta?"
        options:
          - "many data"
          - "a software"
          - "much data"
        answer: "much data"
  - title: "Complete as frases"
    type: "fill_in_the_blank"
    items:
      - id: "2.1"
        question: "Complete com 'many' ou 'much': How ___ files are open?"
        answer: "many"
      - id: "2.2"
        question: "Complete com 'many' ou 'much': How ___ code do we need?"
        answer: "much"
      - id: "2.3"
        question: "Complete com 'some': We have ___ data in the database."
        answer: "some"
      - id: "2.4"
        question: "Complete com 'an': This is ___ issue."
        answer: "an"
  - title: "Tradução curta"
    type: "translation"
    items:
      - id: "3.1"
        question: "Traduza para o inglês: Eu tenho dois arquivos."
        answer: "I have two files."
      - id: "3.2"
        question: "Traduza para o inglês: Nós precisamos de informação."
        answer: "We need information."
      - id: "3.3"
        question: "Traduza para o inglês: Este software é novo."
        answer: "This software is new."
  - title: "Transformação de frase"
    type: "sentence_transformation"
    items:
      - id: "4.1"
        question: "Corrija a frase: I need many information."
        answer: "I need much information."
      - id: "4.2"
        question: "Corrija a frase: This is a software."
        answer: "This is software."
      - id: "4.3"
        question: "Transforme para plural: a file"
        answer: "files"
  - title: "Produção curta"
    type: "short_production"
    items:
      - id: "5.1"
        question: "Escreva uma frase em inglês com 'many issues'."
        answer: "We have many issues."
      - id: "5.2"
        question: "Escreva uma frase em inglês com 'some code'."
        answer: "I need some code."
