topic: "Countable e uncountable em contexto técnico"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase está correta?"
    options:
      - "I have three files."
      - "I have three information."
      - "I have three software."
    answer: "I have three files."
  - id: "2"
    type: "multiple_choice"
    question: "Qual palavra completa corretamente: How ___ issues are in the backlog?"
    options:
      - "much"
      - "many"
      - "some"
    answer: "many"
  - id: "3"
    type: "multiple_choice"
    question: "Qual opção evita o erro 'softwares'?"
    options:
      - "two softwares"
      - "a software"
      - "some software"
    answer: "some software"
  - id: "4"
    type: "fill_in_the_blank"
    question: "Complete com 'much' ou 'many': We do not have ___ time."
    answer: "much"
  - id: "5"
    type: "translation"
    question: "Traduza para o inglês: A informação está no arquivo."
    answer: "The information is in the file."
  - id: "6"
    type: "sentence_transformation"
    question: "Corrija a frase: There are many code in this branch."
    answer: "There is much code in this branch."
  - id: "7"
    type: "ordering"
    question: "Ordene as palavras: need / some / We / data"
    answer: "We need some data."
  - id: "8"
    type: "short_production"
    question: "Escreva uma frase em inglês com uma palavra contável técnica no plural."
    answer: "There are two buttons on the page."
