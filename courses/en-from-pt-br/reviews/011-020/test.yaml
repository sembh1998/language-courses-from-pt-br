topic: "Revisão 011-020: rotina, ambiente e ferramentas"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Qual frase descreve corretamente a situação no canal do time?"
    options:
      - "There are two new messages in the team channel."
      - "There is two new messages in the team channel."
      - "There two new messages are in the team channel."
    answer: "There are two new messages in the team channel."
  - id: "2"
    type: "multiple_choice"
    question: "Qual pergunta usa uma WH word adequada para perguntar o lugar do arquivo?"
    options:
      - "When is the file?"
      - "Where is the file?"
      - "Who is the file?"
    answer: "Where is the file?"
  - id: "3"
    type: "multiple_choice"
    question: "Qual frase é uma mensagem curta e natural de trabalho?"
    options:
      - "Best regards, the terminal is blue."
      - "Subject: I can't."
      - "Hi Ana, can you check the ticket?"
    answer: "Hi Ana, can you check the ticket?"
  - id: "4"
    type: "multiple_choice"
    question: "Qual frase está no presente contínuo para uma ação acontecendo agora?"
    options:
      - "I debug every day."
      - "The build is running now."
      - "They test on Friday."
    answer: "The build is running now."
  - id: "5"
    type: "multiple_choice"
    question: "Qual opção descreve uma permissão negativa?"
    options:
      - "We can't deploy today."
      - "We are deploying today."
      - "We deploy every day."
    answer: "We can't deploy today."
  - id: "6"
    type: "fill_in_the_blank"
    question: "Complete: There ___ a private repository for the project."
    answer: "is"
  - id: "7"
    type: "fill_in_the_blank"
    question: "Complete: The button is ___ the top of the page."
    answer: "at"
  - id: "8"
    type: "fill_in_the_blank"
    question: "Complete com um adjetivo adequado: This is a ___ tool for beginners."
    answer: "simple"
  - id: "9"
    type: "fill_in_the_blank"
    question: "Complete: ___ can update the config file?"
    answer: "Who"
  - id: "10"
    type: "fill_in_the_blank"
    question: "Complete: I am ___ the pull request now."
    answer: "reviewing"
  - id: "11"
    type: "translation"
    question: "Traduza: Há três arquivos na pasta docs."
    answer: "There are three files in the docs folder."
  - id: "12"
    type: "translation"
    question: "Traduza: O terminal está ao lado do navegador."
    answer: "The terminal is next to the browser."
  - id: "13"
    type: "translation"
    question: "Traduza: Você pode entrar na reunião agora?"
    answer: "Can you join the meeting now?"
  - id: "14"
    type: "translation"
    question: "Traduza: O pipeline está rodando agora."
    answer: "The pipeline is running now."
  - id: "15"
    type: "translation"
    question: "Traduza: O caminho está no arquivo de configuração."
    answer: "The path is in the config file."
  - id: "16"
    type: "ordering"
    question: "Ordene as palavras: is / a / safe / browser / This"
    answer: "This is a safe browser."
  - id: "17"
    type: "ordering"
    question: "Ordene as palavras: any / bugs / Are / there / today"
    answer: "Are there any bugs today?"
  - id: "18"
    type: "sentence_transformation"
    question: "Corrija a frase: The files is under the root folder."
    answer: "The files are under the root folder."
  - id: "19"
    type: "short_answer"
    question: "Responda em inglês com uma frase curta: What are you doing now?"
    answer: "I am updating the board."
  - id: "20"
    type: "short_production"
    question: "Escreva uma mensagem curta em inglês avisando que você está disponível às 10h."
    answer: "Hi team, I am available at ten. Thanks."
