topic: "Revisao 021-030: suporte, reunioes e setup"
level: "A1"
questions:
  - id: "1"
    type: "multiple_choice"
    question: "Em um chat de suporte, qual frase diz que a pagina esta lenta?"
    options:
      - "The page is slow."
      - "The page has slow."
      - "The page slow is."
    answer: "The page is slow."
  - id: "2"
    type: "multiple_choice"
    question: "Qual frase expressa preferencia por uma ferramenta em contexto profissional?"
    options:
      - "I use Docker."
      - "I prefer Docker."
      - "I am Docker."
    answer: "I prefer Docker."
  - id: "3"
    type: "multiple_choice"
    question: "Qual pergunta usa corretamente 'many' com um substantivo contavel?"
    options:
      - "How much tickets are open?"
      - "How many code do we have?"
      - "How many tickets are open?"
    answer: "How many tickets are open?"
  - id: "4"
    type: "multiple_choice"
    question: "Voce esta apontando para varios logs perto de voce. Qual frase esta correta?"
    options:
      - "That logs are important."
      - "These logs are important."
      - "This logs are important."
    answer: "These logs are important."
  - id: "5"
    type: "multiple_choice"
    question: "Qual frase combina melhor com a parte 'today' de um stand-up?"
    options:
      - "Yesterday I checked the logs."
      - "I have a blocker with access."
      - "Today I will update the ticket."
    answer: "Today I will update the ticket."
  - id: "6"
    type: "multiple_choice"
    question: "Em uma reuniao, qual frase pede esclarecimento de forma simples?"
    options:
      - "What does deploy mean?"
      - "What deploy means?"
      - "What means deploy?"
    answer: "What does deploy mean?"
  - id: "7"
    type: "multiple_choice"
    question: "Qual frase informa disponibilidade para uma reuniao depois das 3?"
    options:
      - "I available after 3."
      - "I am available after 3."
      - "I have available after 3."
    answer: "I am available after 3."
  - id: "8"
    type: "multiple_choice"
    question: "Qual pedido e o mais educado para revisar um arquivo?"
    options:
      - "Review this file now."
      - "You review this file."
      - "Could you review this file, please?"
    answer: "Could you review this file, please?"
  - id: "9"
    type: "multiple_choice"
    question: "Qual sequencia de setup esta mais natural?"
    options:
      - "First, clone the repository. Then, run the command."
      - "Finally, clone the repository. First, run the command."
      - "Next, requirements the repository."
    answer: "First, clone the repository. Then, run the command."
  - id: "10"
    type: "multiple_choice"
    question: "Em documentacao, qual secao normalmente mostra o que precisa existir antes de instalar?"
    options:
      - "Usage"
      - "Requirements"
      - "Overview"
    answer: "Requirements"
  - id: "11"
    type: "fill_in_the_blank"
    question: "Complete: I have ___ error in the build."
    answer: "an"
  - id: "12"
    type: "fill_in_the_blank"
    question: "Complete com 'much' ou 'many': We need ___ data for the report."
    answer: "much"
  - id: "13"
    type: "fill_in_the_blank"
    question: "Complete: ___ button opens the settings."
    answer: "This"
  - id: "14"
    type: "translation"
    question: "Traduza para o ingles: Ontem eu trabalhei no bug de login."
    answer: "Yesterday I worked on the login bug."
  - id: "15"
    type: "translation"
    question: "Traduza para o ingles: Voce pode falar devagar, por favor?"
    answer: "Can you speak slowly, please?"
  - id: "16"
    type: "translation"
    question: "Traduza para o ingles: Eu gostaria de perguntar sobre a agenda."
    answer: "I would like to ask about the agenda."
  - id: "17"
    type: "sentence_transformation"
    question: "Corrija a frase: I have two information about the issue."
    answer: "I have some information about the issue."
  - id: "18"
    type: "ordering"
    question: "Ordene as palavras: the / open / terminal / Next"
    answer: "Next, open the terminal."
  - id: "19"
    type: "short_answer"
    question: "Responda em ingles com uma frase curta: What editor do you prefer?"
    answer: "I prefer VS Code."
  - id: "20"
    type: "short_production"
    question: "Escreva uma linha curta de documentacao em ingles usando 'Warning'."
    answer: "Warning: do not share your password."
