    type: "short_answer"
    question: "Explique em português a mensagem: Invalid workspace ID."
    answer: "O ID do workspace é inválido; é preciso verificar ou corrigir esse ID."
  - id: 19
    type: "short_production"
    question: "Escreva uma mensagem curta em inglês para o Slack: diga que você é novo no time e precisa de ajuda com o setup."
    answer: "Resposta possível: Hello, I am new here. Can you help me with setup?"
  - id: 20
    type: "short_production"
    question: "Escreva uma frase em inglês comparando uma automação nova e um processo manual com 'easier than'."
    answer: "Resposta possível: The new automation is easier than the manual process."
