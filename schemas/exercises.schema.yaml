$schema: "https://json-schema.org/draft/2020-12/schema"
title: Exercícios de um tópico
type: object
required: [topic, level, exercises]
properties:
  topic:
    type: string
    minLength: 1
  level:
    type: string
    pattern: "^(A1|A2|B1|B2|C1|C2)$"
  exercises:
    type: array
    minItems: 1
    items:
      type: object
      required: [type, items]
      properties:
        type:
          type: string
          minLength: 1
        title:
          type: string
        instruction:
          type: string
        instructions:
          type: string
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [question, answer]
            properties:
              id: {}
              question:
                type: string
                minLength: 1
              options:
                type: array
                items:
                  type: string
                  minLength: 1
              answer:
                type: [string, number]
            additionalProperties: true
      additionalProperties: true
additionalProperties: true
