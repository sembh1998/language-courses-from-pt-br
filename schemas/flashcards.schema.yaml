$schema: "https://json-schema.org/draft/2020-12/schema"
title: Flashcards de um tópico
type: object
required: [topic, level, cards]
properties:
  topic:
    type: string
    minLength: 1
  level:
    type: string
    pattern: "^(A1|A2|B1|B2|C1|C2)$"
  note:
    type: string
    minLength: 1
  cards:
    type: array
    items:
      type: object
      required: [front, back, example, example_translation]
      properties:
        front:
          type: string
          minLength: 1
        back:
          type: string
          minLength: 1
        example:
          type: string
          minLength: 1
        example_translation:
          type: string
          minLength: 1
      additionalProperties: true
additionalProperties: true
